          {groupDates.length===0?(<div style={{color:C.muted,textAlign:"center",padding:30}}>No results</div>):groupDates.map(function(dateKey){
            return(<div key={dateKey}>
              <div style={{fontSize:11,color:C.muted,fontWeight:700,marginBottom:6,marginTop:10,paddingLeft:2}}>{fmtDD(dateKey)}</div>
              {groups[dateKey].map(function(inv){
                const invKey=tab+"||"+inv.id;const removed=removedRows[invKey]||{};
                return(
                  <div key={inv.id} style={{background:C.surf,borderRadius:12,marginBottom:14,border:"1px solid "+C.bdr,overflow:"hidden"}}>
                    <div style={{background:C.surf2,padding:"8px 12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <div style={{fontSize:11,color:C.accent,fontWeight:700}}>{inv.id}</div>
                      <div style={{fontSize:11,color:C.muted,fontFamily:"monospace"}}>MUR {fmt(inv.total)}</div>
                    </div>
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                        <thead><tr style={{background:C.surf2}}>
                          {(inv.cols||[]).map(function(col,ci){return <th key={ci} style={{padding:"6px 8px",textAlign:"left",color:C.muted,fontWeight:600,whiteSpace:"nowrap",borderBottom:"1px solid "+C.bdr}}>{col}</th>;})}
                          <th style={{padding:"6px 8px",textAlign:"right",color:C.rec,fontWeight:700,whiteSpace:"nowrap",borderBottom:"1px solid "+C.bdr}}>Buy+VAT</th>
                          <th style={{padding:"6px 8px",textAlign:"right",color:C.warn,fontWeight:700,whiteSpace:"nowrap",borderBottom:"1px solid "+C.bdr}}>Rec Price</th>
                          <th style={{padding:"6px 8px",textAlign:"right",color:C.accent,fontWeight:700,whiteSpace:"nowrap",borderBottom:"1px solid "+C.bdr}}>Selling</th>
                          <th style={{padding:"6px 8px",textAlign:"left",color:C.muted,fontWeight:600,whiteSpace:"nowrap",borderBottom:"1px solid "+C.bdr}}>Notes</th>
                          {editMode&&<th style={{padding:"6px 8px",borderBottom:"1px solid "+C.bdr}}></th>}
                        </tr></thead>
                        <tbody>
                          {inv.rows.map(function(row,ri){
                            if(removed[ri])return null;
                            const rec=calcRec(inv,ri,row,sup.meta);
                            // New-format invoices carry a pre-computed recPrice; use it if available
                            var rec20;if(inv._precomputed&&inv._precomputed[ri]&&inv._precomputed[ri].recPrice!=null){var rp=inv._precomputed[ri].recPrice;var _N=detectPackSize(String(row[0]||""));rec20=(_N&&_N>1)?rp/_N:rp;}else{rec20=rec!==null?rec*1.2:null;}
                            const spKey=invKey+"||"+ri+"||sp";const ntKey=invKey+"||"+ri+"||nt";
                            const spVal=cellEdits[spKey]!==undefined?cellEdits[spKey]:(rec20!==null?fmt(rec20):"");
                            const ntVal=cellEdits[ntKey]!==undefined?cellEdits[ntKey]:"";
                            return(
                              <tr key={ri} style={{borderBottom:"1px solid "+C.bdr,background:ri%2===0?"transparent":"rgba(255,255,255,0.02)"}}>
                                {row.map(function(cell,ci){
                                  const ck=invKey+"||"+ri+"||"+ci;
                                  const val=cellEdits[ck]!==undefined?cellEdits[ck]:String(cell);
                                  return(<td key={ci} style={{padding:"6px 8px",color:C.text,whiteSpace:ci===0?"nowrap":"normal"}}>{editMode?(<input value={val} onChange={function(e){setCE(ck,e.target.value);}} style={CISt}/>):(<span>{val}</span>)}</td>);
                                })}
                                <td style={{padding:"6px 8px",textAlign:"right",color:C.rec,fontWeight:700,whiteSpace:"nowrap"}}>{rec!==null?fmt(rec):"-"}</td>
                                <td style={{padding:"6px 8px",textAlign:"right",color:C.warn,whiteSpace:"nowrap"}}>{rec20!==null?fmt(rec20):"-"}</td>
                                <td style={{padding:"6px 8px",whiteSpace:"nowrap"}}><input value={spVal} onChange={function(e){setCE(spKey,e.target.value);}} style={Object.assign({},CISt,{color:C.accent,width:72,textAlign:"right"})}/></td>
                                <td style={{padding:"6px 8px"}}><input value={ntVal} onChange={function(e){setCE(ntKey,e.target.value);}} style={Object.assign({},CISt,{color:C.muted,width:90})}/></td>
                                {editMode&&(<td style={{padding:"6px 8px"}}><button onClick={function(){doRemoveRow(invKey,ri);}} style={{background:C.danger,border:"none",borderRadius:4,padding:"3px 8px",color:"#fff",fontSize:10,cursor:"pointer"}}>Del</button></td>)}
                              </tr>
                            );
                          })}
                        </tbody>
                        {(function(){
                          var totRows=inv.totals||[];
                          // Fallback: if the AI invoice has no totals but carries a total value, synthesise a row
                          if(totRows.length===0&&inv.total>0)totRows=[["Grand Total",inv.total]];
                          if(totRows.length===0)return null;
                          var lastTi=totRows.length-1;
                          return(
                            <tfoot>{totRows.map(function(t,ti){
                              var isLast=ti===lastTi;
                              return(
                                <tr key={ti} style={{background:isLast?"rgba(138,255,122,0.08)":C.surf2,borderTop:isLast?"2px solid rgba(138,255,122,0.32)":"none"}}>
                                  <td colSpan={(inv.cols||[]).length+3} style={{padding:isLast?"9px 10px":"5px 8px",textAlign:"right",color:isLast?C.text:C.muted,fontSize:isLast?12:11,fontWeight:isLast?700:400,letterSpacing:isLast?0.02:0}}>{t[0]}</td>
                                  <td style={{padding:isLast?"9px 10px":"5px 8px",textAlign:"right",color:C.accent,fontWeight:800,fontSize:isLast?14:12,fontFamily:"monospace",whiteSpace:"nowrap"}}>MUR {fmt(t[1])}</td>
                                  {editMode&&<td></td>}
                                </tr>
                              );
                            })}</tfoot>
                          );
                        })()}
                      </table>
                    </div>
                  </div>
                );
              })}
            </div>);
          })}
        </div>
      </div>
    );
  }

  // ── CATALOGUE: SUPPLIER PRODUCTS DRILL-DOWN ──────────────────────
  if(screen==="catalogue"&&subScreen==="cat-supplier"&&tab){
    const sup=SUPPLIERS[tab];
    if(!sup)return null;
    const lq=search.toLowerCase();
    let prods=getSupProducts(sup);
    if(lq)prods=prods.filter(function(p){return p.toLowerCase().includes(lq);});
    if(catSort==="az")prods=prods.slice().sort(function(a,b){return a.localeCompare(b);});
    else if(catSort==="za")prods=prods.slice().sort(function(a,b){return b.localeCompare(a);});
    return(
      <div style={{background:C.bg,minHeight:"100%",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",color:C.text,paddingBottom:40}}>
        <BackBar accent onBack={function(){setSubScreen(null);setTab(null);setSearch("");}} backLabel="Catalogue" title={tab}/>
        <div style={{padding:"12px 10px"}}>
          <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center"}}>
            <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Search products..." style={Object.assign({},ISt,{marginBottom:0,flex:1})}/>
            <div style={{fontSize:11,color:C.muted,flexShrink:0,fontWeight:700}}>{prods.length} items</div>
          </div>
          <SortPills value={catSort} onChange={setCatSort} color={C.warn} options={[["az","A-Z"],["za","Z-A"],["default","Invoice Order"]]}/>
          <div style={{background:C.surf,borderRadius:12,border:"1px solid "+C.bdr,overflow:"hidden"}}>
            {prods.length===0?(<div style={{padding:30,textAlign:"center",color:C.muted}}>No products found</div>):
            prods.map(function(p,pi){
              return(<div key={pi} style={{padding:"12px 14px",borderBottom:pi<prods.length-1?"1px solid "+C.bdr:"none",display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:28,height:28,borderRadius:8,background:C.surf2,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:11,color:C.muted,fontWeight:700}}>{pi+1}</div>
                <div style={{fontSize:13,color:C.text,flex:1}}>{p}</div>
              </div>);
            })}
          </div>
        </div>
      </div>
    );
  }

  // ── INVENTORY: SUPPLIER PRODUCTS DRILL-DOWN ──────────────────────
  if(screen==="inventory"&&subScreen==="inv-supplier"&&tab){
    const sup=SUPPLIERS[tab];
    if(!sup)return null;
    const lq=search.toLowerCase();
    const prods=getSupProducts(sup);
    const filtered=lq?prods.filter(function(p){return p.toLowerCase().includes(lq);}):prods;

    return(
      <div style={{background:C.bg,minHeight:"100%",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",color:C.text,paddingBottom:80}}>
        <BackBar accent onBack={function(){setSubScreen(null);setTab(null);setSearch("");}} backLabel="Inventory" title={tab}/>
        <div style={{padding:"12px 10px"}}>
          <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Search products..." style={ISt}/>
          {filtered.length===0?(<div style={{color:C.muted,textAlign:"center",padding:30}}>No products found</div>):
          filtered.map(function(p,pi){
            const stockKey=tab+"||"+p+"||stock";
            const reorderKey=tab+"||"+p+"||reorder";
            const stockVal=inventory[stockKey]!==undefined?inventory[stockKey]:"";
            const reorderVal=inventory[reorderKey]!==undefined?inventory[reorderKey]:"";
            const stock=parseFloat(stockVal);
            const reorder=parseFloat(reorderVal);
            const hasStock=!isNaN(stock);
            const hasReorder=!isNaN(reorder);
            const isLow=hasStock&&hasReorder&&stock<=reorder;
            const isOut=hasStock&&stock===0;
            const statusColor=isOut?C.danger:(isLow?C.warn:C.accent);
            const statusLabel=isOut?"OUT":(isLow?"LOW":"OK");
            return(
              <div key={pi} style={{background:C.surf,borderRadius:12,marginBottom:10,border:"1px solid "+(isLow||isOut?statusColor:C.bdr),overflow:"hidden"}}>
                <div style={{padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid "+C.bdr}}>
                  <div style={{flex:1,minWidth:0,marginRight:8}}>
                    <div style={{fontSize:13,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p}</div>
                    <div style={{fontSize:10,color:C.muted,marginTop:2}}>{tab}</div>
                  </div>
                  {hasStock&&(
                    <div style={{background:statusColor,borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:800,color:"#000",flexShrink:0}}>
                      {statusLabel}
                    </div>
                  )}
                </div>
                <div style={{padding:"10px 14px",display:"flex",gap:10}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:10,color:C.muted,marginBottom:4,fontWeight:600,textTransform:"uppercase"}}>Current Stock</div>
                    <input value={stockVal} onChange={function(e){setInvVal(stockKey,e.target.value);}}
                      placeholder="0"
                      style={{background:C.surf2,border:"1px solid "+(isOut?C.danger:isLow?C.warn:C.bdr),borderRadius:8,padding:"8px 12px",color:isOut?C.danger:isLow?C.warn:C.text,fontSize:16,fontWeight:800,width:"100%",outline:"none",textAlign:"center",boxSizing:"border-box"}}/>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:10,color:C.muted,marginBottom:4,fontWeight:600,textTransform:"uppercase"}}>Reorder At</div>
                    <input value={reorderVal} onChange={function(e){setInvVal(reorderKey,e.target.value);}}
                      placeholder="Min"
                      style={{background:C.surf2,border:"1px solid "+C.bdr,borderRadius:8,padding:"8px 12px",color:C.muted,fontSize:16,fontWeight:800,width:"100%",outline:"none",textAlign:"center",boxSizing:"border-box"}}/>
                  </div>
                </div>
                {isLow&&!isOut&&(
                  <div style={{padding:"6px 14px 10px",display:"flex",alignItems:"center",gap:6}}>
                    <div style={{width:6,height:6,borderRadius:"50%",background:C.warn,flexShrink:0}}></div>
                    <div style={{fontSize:11,color:C.warn,fontWeight:600}}>Reorder needed — only {stockVal} units remaining</div>
                  </div>
                )}
                {isOut&&(
                  <div style={{padding:"6px 14px 10px",display:"flex",alignItems:"center",gap:6}}>
                    <div style={{width:6,height:6,borderRadius:"50%",background:C.danger,flexShrink:0}}></div>
                    <div style={{fontSize:11,color:C.danger,fontWeight:600}}>Out of stock — add to reorder list</div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ── PRICE TRACKER ────────────────────────────────────────────────
  if(screen==="prices"){
    const lq=search.toLowerCase();

    // Build trackable products (≥2 purchases = real history)
    const flagged=[];
    Object.keys(priceHistory).forEach(function(sn){
      Object.keys(priceHistory[sn]).forEach(function(pn){
        const entries=priceHistory[sn][pn];
        if(entries.length<2)return;
        const latest=entries[entries.length-1];
        const previous=entries[entries.length-2];
        const first=entries[0];
        const diff=latest.price-previous.price;
        const changed=Math.abs(diff)>=0.01;
        const pct=previous.price>0?(diff/previous.price)*100:0;
        const trendDiff=latest.price-first.price;
        const trendPct=first.price>0?(trendDiff/first.price)*100:0;
        // Amendment key — tracks latest invoice for this product
        const amendKey=sn+"||"+pn+"||"+latest.invoiceId;
        const amend=amendments[amendKey];
        const isAmended=!!(amend&&amend.amended);

        if(lq&&!pn.toLowerCase().includes(lq)&&!sn.toLowerCase().includes(lq))return;
        if(priceFilter==="changed"&&!changed)return;
        if(priceAmendFilter==="pending"&&isAmended)return;
        if(priceAmendFilter==="amended"&&!isAmended)return;

        flagged.push({sn,pn,entries,latest,previous,first,diff,pct,changed,trendDiff,trendPct,amendKey,isAmended});
      });
    });

    // ── Sort ─────────────────────────────────────────────────────
    flagged.sort(function(a,b){
      // Amended items always sink to the bottom when viewing "all"
      if(priceAmendFilter==="all"&&a.isAmended!==b.isAmended)return a.isAmended?1:-1;
      if(priceSortBy==="date"){
        var dc=b.latest.date.localeCompare(a.latest.date);
        return priceSortDir==="asc"?-dc:dc;
      }
      if(priceSortBy==="price"){
        var pc=b.latest.price-a.latest.price;
        return priceSortDir==="asc"?-pc:pc;
      }
      if(priceSortBy==="name"){
        var nc=a.pn.localeCompare(b.pn);
        return priceSortDir==="desc"?-nc:nc;
      }
      if(priceSortBy==="supplier"){
        var sc=a.sn.localeCompare(b.sn);
        return priceSortDir==="desc"?-sc:sc;
      }
      // Default: price-up first → down → stable; within group by |pct|
      const rank=function(f){return f.changed?(f.diff>0?0:1):2;};
      if(rank(a)!==rank(b))return rank(a)-rank(b);
      return Math.abs(b.pct)-Math.abs(a.pct);
    });

    const upCount=flagged.filter(function(f){return f.changed&&f.diff>0;}).length;
    const downCount=flagged.filter(function(f){return f.changed&&f.diff<0;}).length;
    const pendingCount=flagged.filter(function(f){return!f.isAmended;}).length;
    const trackedTotal=Object.keys(priceHistory).reduce(function(a,sn){return a+Object.keys(priceHistory[sn]).length;},0);
    const filtersActive=priceSortBy!=="date"||priceSortDir!=="desc"||priceAmendFilter!=="all"||priceFilter!=="changed"||!!search;

    function dayLabel(iso){
      if(!iso)return"";
      var p=iso.split("-");if(p.length<3)return iso;
      var months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      return parseInt(p[2],10)+" "+months[parseInt(p[1],10)-1];
    }

    function toggleSort(field){
      if(priceSortBy===field){setPriceSortDir(function(d){return d==="asc"?"desc":"asc";});}
      else{
        setPriceSortBy(field);
        setPriceSortDir(field==="name"||field==="supplier"?"asc":"desc");
      }
    }

    function SortBtn(props){
      var active=priceSortBy===props.id;
      var arrow=active?(priceSortDir==="asc"?"↑":"↓"):"";
      return(
        <button onClick={function(){toggleSort(props.id);}}
          style={{minHeight:44,padding:"8px 14px",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",
            whiteSpace:"nowrap",border:"1px solid "+(active?C.warn:C.bdr),
            background:active?"rgba(245,179,74,0.18)":C.surf2,
            color:active?C.warn:C.muted,fontFamily:"-apple-system,sans-serif"}}>
          {props.label}{arrow?" "+arrow:""}
        </button>
      );
    }

    function toggleAmendment(f){
      var nowAmended=!f.isAmended;
      var nowAt=nowAmended?new Date().toISOString():null;
      setAmendments(function(prev){
        var next=Object.assign({},prev);
        next[f.amendKey]={amended:nowAmended,amendedAt:nowAt};
        return next;
      });
      upsertAmendment(f.sn,f.pn,f.latest.invoiceId,nowAmended,nowAt);
    }

    return(
      <div style={{background:C.bg,minHeight:"100%",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",color:C.text,paddingBottom:80}}>
        <BackBar onBack={goMenu} backLabel="Menu" title="Price Tracker"/>

        {/* Sticky control bar — sits immediately below the BackBar */}
        <div style={{position:"sticky",top:62,zIndex:150,background:C.surf,borderBottom:"1px solid "+C.bdr,padding:"8px 10px 6px",display:"flex",flexDirection:"column",gap:6}}>
          {/* Row 1: sort buttons + reset */}
          <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
            <span style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",flexShrink:0,minWidth:32,fontWeight:600}}>Sort</span>
            <SortBtn id="date" label="Date"/>
            <SortBtn id="price" label="Price"/>
            <SortBtn id="name" label="Name"/>
            <SortBtn id="supplier" label="Supplier"/>
            {filtersActive&&(
              <button onClick={function(){setPriceSortBy("date");setPriceSortDir("desc");setPriceAmendFilter("all");setPriceFilter("changed");setSearch("");}}
                style={{minHeight:44,marginLeft:"auto",padding:"8px 14px",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",
                  border:"1px solid rgba(255,111,111,0.5)",background:"rgba(255,111,111,0.1)",color:C.danger,whiteSpace:"nowrap",fontFamily:"-apple-system,sans-serif"}}>
                ✕ Reset
              </button>
            )}
          </div>
          {/* Row 2: amendment filter + summary counter */}
          <div style={{display:"flex",gap:6,alignItems:"center",flexWrap:"wrap"}}>
            <span style={{fontSize:10,color:C.muted,textTransform:"uppercase",letterSpacing:"0.1em",flexShrink:0,minWidth:32,fontWeight:600}}>Show</span>
            {[["all","All"],["pending","Pending"],["amended","Amended"]].map(function(opt){
              var active=priceAmendFilter===opt[0];
              return(
                <button key={opt[0]} onClick={function(){setPriceAmendFilter(opt[0]);}}
                  style={{minHeight:44,padding:"8px 14px",borderRadius:8,fontSize:12,fontWeight:700,cursor:"pointer",
                    whiteSpace:"nowrap",border:"1px solid "+(active?C.warn:C.bdr),
                    background:active?"rgba(245,179,74,0.18)":C.surf2,
                    color:active?C.warn:C.muted,fontFamily:"-apple-system,sans-serif"}}>
                  {opt[1]}
                </button>
              );
            })}
            <div style={{marginLeft:"auto",fontSize:12,color:C.muted,fontWeight:600,whiteSpace:"nowrap",display:"flex",alignItems:"center",gap:4}}>
              <span style={{color:C.text,fontFamily:"monospace"}}>{flagged.filter(function(f){return f.changed;}).length}</span>
              <span> changes —</span>
              <button onClick={function(){setPriceAmendFilter("pending");}}
                style={{background:"none",border:"none",padding:"4px 6px",cursor:"pointer",fontWeight:700,fontSize:12,fontFamily:"monospace",
                  color:pendingCount>0?C.warn:C.muted,minHeight:32}}>
                {pendingCount} pending
              </button>
            </div>
          </div>
        </div>

        <div style={{padding:"12px 10px"}}>

          {/* KPI strip */}
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            <div style={Object.assign({},SC,{borderColor:upCount>0?C.danger:C.bdr,flex:1})}>
              <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:2}}>Up</div>
              <div style={{fontSize:22,fontWeight:800,color:upCount>0?C.danger:C.muted,fontFamily:"monospace"}}>{upCount}</div>
              <div style={{fontSize:9,color:C.muted}}>price rises</div>
            </div>
            <div style={Object.assign({},SC,{borderColor:downCount>0?C.accent:C.bdr,flex:1})}>
              <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:2}}>Down</div>
              <div style={{fontSize:22,fontWeight:800,color:downCount>0?C.accent:C.muted,fontFamily:"monospace"}}>{downCount}</div>
              <div style={{fontSize:9,color:C.muted}}>price drops</div>
            </div>
            <div style={Object.assign({},SC,{flex:1})}>
              <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",letterSpacing:1,marginBottom:2}}>Tracked</div>
              <div style={{fontSize:22,fontWeight:800,color:C.text,fontFamily:"monospace"}}>{trackedTotal}</div>
              <div style={{fontSize:9,color:C.muted}}>products</div>
            </div>
          </div>

          <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Search products or suppliers…" style={ISt}/>
          <SortPills value={priceFilter} onChange={setPriceFilter} color={C.warn}
            options={[["changed","Changes Only"],["all","All Products"]]}/>

          {flagged.length===0?(
            <div style={{textAlign:"center",padding:"48px 20px",color:C.muted}}>
              <div style={{fontSize:36,marginBottom:12}}>✓</div>
              <div style={{fontSize:15,fontWeight:700,marginBottom:4,color:C.text}}>
                {priceFilter==="changed"?"No price changes since last purchase":"No products found"}
              </div>
              <div style={{fontSize:12}}>{priceFilter==="changed"?"All buying prices are stable":"Try a different search"}</div>
            </div>
          ):flagged.map(function(f,fi){
            const up=f.diff>0;
            const changeColor=f.changed?(up?C.danger:C.accent):C.muted;
            const borderColor=f.isAmended?"rgba(138,255,122,0.25)":(f.changed?(up?"rgba(255,111,111,0.4)":"rgba(138,255,122,0.3)"):C.bdr);

            return(
              <div key={fi} style={{background:C.surf,borderRadius:14,marginBottom:12,border:"1px solid "+borderColor,overflow:"hidden",opacity:f.isAmended?0.55:1,transition:"opacity .2s"}}>

                {/* Header band */}
                {f.changed&&(
                  <div style={{background:up?"rgba(255,111,111,0.1)":"rgba(138,255,122,0.08)",borderBottom:"1px solid "+borderColor,padding:"7px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div style={{fontSize:12,fontWeight:700,color:f.isAmended?C.muted:changeColor}}>
                      {up?"▲ Price Up":"▼ Price Down"}
                    </div>
                    <div style={{display:"flex",gap:12,alignItems:"center"}}>

                        <div style={{fontSize:11,fontFamily:"monospace",color:C.muted}}>{fmt(f.first.price)}</div>

                  {/* Full price timeline */}
                  {f.entries.length>0&&(
                    <div style={{overflowX:"auto",paddingBottom:4}}>
                      <div style={{display:"flex",alignItems:"flex-end",gap:0,minWidth:"max-content"}}>
                        {f.entries.map(function(h,hi){

                          const wentDown=prevP!==null&&h.price<prevP-0.005;

  // ── SHARED VARS FOR SECTION SCREENS ─────────────────────────────
  const totalAll=supNames.reduce(function(a,sn){return a+SUPPLIERS[sn].invoices.reduce(function(b,i){return b+i.total;},0);},0);
  const lq=search.toLowerCase();
  const daySuppliers=dayFilter?getSupsForDay(dayFilter):[];

  const filteredDaySups=daySuppliers.filter(function(s){

    return sup&&sup.invoices&&sup.invoices.some(function(inv){return inv.rows&&inv.rows.some(function(r){return r.some(function(c){return String(c).toLowerCase().includes(lq);});});});

  // ── INVENTORY MAIN LIST ──────────────────────────────────────────
  if(screen==="inventory"){

    const filteredStats=supStats.filter(function(s){

        <div style={{padding:"12px 10px"}}>
          {/* SUMMARY ROW */}
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            <div style={Object.assign({},SC,{borderColor:totalOut>0?C.danger:C.bdr})}>
              <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",marginBottom:2}}>Out of Stock</div>
              <div style={{fontSize:20,fontWeight:800,color:totalOut>0?C.danger:C.muted}}>{totalOut}</div>
            </div>
            <div style={Object.assign({},SC,{borderColor:totalLow>0?C.warn:C.bdr})}>
              <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",marginBottom:2}}>Low Stock</div>
              <div style={{fontSize:20,fontWeight:800,color:totalLow>0?C.warn:C.muted}}>{totalLow}</div>
            </div>
            <div style={SC}>
              <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",marginBottom:2}}>Suppliers</div>
              <div style={{fontSize:20,fontWeight:800,color:C.text}}>{supNames.length}</div>
            </div>
          </div>
          <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Search suppliers..." style={ISt}/>
          <SortPills value={invFilter} onChange={setInvFilter} color={C.warn} options={[["all","All Suppliers"],["low","Needs Reorder"]]}/>
          {filteredStats.length===0?(<div style={{color:C.muted,textAlign:"center",padding:30}}>No suppliers found</div>):
          filteredStats.map(function(s){
            const hasAlert=s.low>0||s.out>0;
            const sup=SUPPLIERS[s.name];
            return(
              <div key={s.name} onClick={function(){setTab(s.name);setSubScreen("inv-supplier");setSearch("");}}
                style={{background:C.surf,borderRadius:12,marginBottom:10,border:"1px solid "+(s.out>0?C.danger:s.low>0?C.warn:C.bdr),cursor:"pointer",overflow:"hidden"}}>
                <div style={{padding:"12px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</div>
                    <div style={{fontSize:11,color:C.muted,marginTop:2}}>{sup.meta.supplier}</div>
                    <div style={{display:"flex",gap:8,marginTop:6}}>
                      <span style={{fontSize:10,color:C.muted}}>{s.prods} products</span>
                      {s.tracked>0&&<span style={{fontSize:10,color:C.muted}}>{s.tracked} tracked</span>}
                    </div>
                  </div>
                  <div style={{flexShrink:0,marginLeft:10,textAlign:"right"}}>
                    {s.out>0&&(<div style={{background:C.danger,borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:800,color:"#fff",marginBottom:4}}>{s.out} OUT</div>)}
                    {s.low>0&&(<div style={{background:C.warn,borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:800,color:"#000"}}>{s.low} LOW</div>)}
                    {!hasAlert&&s.tracked>0&&(<div style={{background:"rgba(0,229,160,0.15)",borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:800,color:C.accent}}>OK</div>)}
                    {s.tracked===0&&(<div style={{fontSize:11,color:C.muted}}>Not set</div>)}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );

  // ── ORDER MODULE ─────────────────────────────────────────────────
  if(screen==="order"){
    const weekLabel=getWeekLabel();

    // ── Helpers ───────────────────────────────────────────────────
    function daysSince(isoDate){
      if(!isoDate)return null;
      var iso=toISODate(isoDate);
      if(!iso)return null;
      return Math.floor((new Date()-new Date(iso))/(1000*60*60*24));
    }
    function relDay(isoDate){
      var n=daysSince(isoDate);
      if(n===null)return"—";
      if(n===0)return"today";
      if(n===1)return"yesterday";
      if(n<7)return n+"d ago";
      if(n<30)return Math.floor(n/7)+"w ago";
      return Math.floor(n/30)+"mo ago";
    }

    // ── UI primitives ─────────────────────────────────────────────
    function StatusChip({status}){
      var labels={draft:"Draft",pending:"Sent",confirmed:"Confirmed",delivered:"Delivered",cancelled:"Cancelled"};
      return <span className={"status "+status}><span className="dot"></span>{labels[status]||status}</span>;
    }
    function QtyStepper({value,onChange}){
      var inCart=value>0;
      return(
        <div className={"qty"+(inCart?" in-cart":" empty")}>
          <button onClick={function(){onChange(Math.max(0,value-1));}} disabled={value<=0}>
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M3 8h10"/></svg>
          </button>
          <div className="value">{value||0}</div>
          <button onClick={function(){onChange(Math.min(99,value+1));}}>

          </button>
        </div>
      );
    }

    // ── Data builders ─────────────────────────────────────────────
    function buildOrderSuppliers(){
      const glyphMap={"Phoenix":"🍺","Beverages":"🧃","Food":"🥫","Kool":"❄️","Innodis":"🥩","Panagora":"🥫","VKS":"🐟","Quality":"🧃","Grays":"🥃","New Goodwill":"🥃","Lim How":"🍬","BrandActiv":"🛒","Tea Blenders":"🍰","Cernol":"🧴","Eagle":"🌶️","Ashfaaq":"🌾","Agiliss":"🐟","Inicia":"🥚","Edendale":"🧊","Tash":"🍝","LCF":"🏪","FSS":"📦","Dywada":"🍱","Scott":"🧴","Megatrixe":"🛁","Li Wan Po":"🍭","Cheekips":"🍿","RR Rapid":"🕯️","Afara":"🥩","VL Marketing":"📦","RPM":"📦","Eau-Val":"💧","Faucon":"🐓","Ashok":"📱","Mayil":"🌶️","Bedford":"🍺","Madhvi":"🍿","Cadi Fortune":"🍬","Gujadhur":"🧈","Pillay":"❄️","MOROIL":"🫙","IFS":"🥫","Flemingo":"📦","LVM":"🍟"};
      return supNames.map(function(sn){
        const sup=SUPPLIERS[sn];
        const prods=getSupProducts(sup);
        const lastInv=sup.invoices&&sup.invoices.length>0?sup.invoices[0]:null;
        var glyph="🏪";
        Object.keys(glyphMap).forEach(function(k){if(sn.indexOf(k)>=0)glyph=glyphMap[k];});
        return{id:sn,name:sn,fullName:sup.meta.supplier||sn,glyph:glyph,items:prods.length,last_order:lastInv?lastInv.date:"",category:sup.meta.payment||"General Supplier",lead_time:"Next-day"};
      });
    }
    function buildOrderProducts(sn){
      const sup=SUPPLIERS[sn];if(!sup)return[];
      return getSupProducts(sup).map(function(pname,pi){
        const latest=getLatestUnitPrice(SUPPLIERS,sn,pname);
        return{id:sn+"_prod_"+pi,name:pname,price:latest?latest.price:0,unit:"unit",last_ordered:latest?latest.date:"",popular:false};
      });
    }

    const orderSuppliers=buildOrderSuppliers();

    // ── Actions ───────────────────────────────────────────────────
    function openSupplier(id){setActiveSupId(id);setOrderView("catalogue");setCatQ("");setCatFilter("all");window.scrollTo({top:0,behavior:"smooth"});}
    function backToSuppliers(){setActiveSupId(null);setOrderView("suppliers");window.scrollTo({top:0,behavior:"smooth"});}
    function setQtyInCart(sid,pid,qty){setOrderCarts(function(prev){var next=Object.assign({},prev);var c=Object.assign({},next[sid]||{});if(qty<=0)delete c[pid];else c[pid]=qty;if(Object.keys(c).length===0)delete next[sid];else next[sid]=c;return next;});}
    function clearCart(sid){setOrderCarts(function(prev){var next=Object.assign({},prev);delete next[sid];return next;});setOrderToast("Order cleared");}
    function updateOrderStatus(oid,status){var no=(orders||[]).map(function(o){return o.id===oid?Object.assign({},o,{status:status}):o;});setOrders(no);persist(cellEdits,removedRows,payments,inventory,no,custOrders);}
    function submitOrder(sid){
      var cart=orderCarts[sid];if(!cart||Object.keys(cart).length===0)return;
      var ps=buildOrderProducts(sid);
      var now=new Date();var timeStr=now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0");
      var items=Object.entries(cart).map(function(e){var p=ps.find(function(x){return x.id===e[0];});return{name:p?p.name:e[0],qty:e[1],unit_price:p?p.price:0,pack:"1 unit"};});
      var newOrder={
        id:"PO-"+now.getFullYear()+"-"+String(Date.now()).slice(-5),
        supplier_id:sid,status:"pending",
        created:now.toISOString().slice(0,10),week:weekLabel,items:items,
        timeline:[
          {label:"Draft created",time:"Today, "+timeStr,state:"done"},
          {label:"Sent to supplier",time:"Today, "+timeStr,state:"current"},
          {label:"Confirmed by supplier",time:"—",state:"pending"},
          {label:"Out for delivery",time:"—",state:"pending"},
          {label:"Delivered",time:"—",state:"pending"},
        ]
      };
      var newOrders=[newOrder].concat(orders||[]);
      setOrders(newOrders);persist(cellEdits,removedRows,payments,inventory,newOrders,custOrders);
      setOrderCarts(function(prev){var next=Object.assign({},prev);delete next[sid];return next;});
      var si=orderSuppliers.find(function(s){return s.id===sid;});
      setOrderToast("Order sent to "+(si?si.name:sid)+"!");
      setOrderView("history");window.scrollTo({top:0,behavior:"smooth"});
    }

    // ── Derived for current view ──────────────────────────────────
    const activeSupplier=orderSuppliers.find(function(s){return s.id===activeSupId;})||null;
    const activeOrderObj=(orders||[]).find(function(o){return o.id===activeOrderId;})||null;
    const activeOrderSup=activeOrderObj?orderSuppliers.find(function(s){return s.id===activeOrderObj.supplier_id;}):null;

    // ── Shared appbar ─────────────────────────────────────────────
    const OrderAppBar=(
      <div className="appbar">
        <div className="appbar-inner">
          <div className="brand-row">
            <button className="brand-back" onClick={orderView==="catalogue"?backToSuppliers:goMenu}>
              <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M7.5 2.5L3 6l4.5 3.5"/><path d="M3 6h7"/></svg>
              {orderView==="catalogue"?"All suppliers":"Fowdar Store"}
            </button>

            </button>
            <div className="totals">
              <div className="label">{orderView==="catalogue"?"Order total":"Open order value"}</div>
              <div className="value">{"MUR "+fmt(totalCartValue)}</div>
            </div>
          </div>
        </div>
        {orderView!=="catalogue"&&(
          <nav className="tabs" style={{maxWidth:"100%",padding:"0 16px"}}>

              <div style={{marginLeft:"auto",display:"flex",alignItems:"center",padding:"6px 0"}}>
                <button className="chip active" style={{gap:6}} onClick={function(){var sid=Object.keys(orderCarts)[0];if(sid)openSupplier(sid);}}>
                  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" style={{width:13,height:13}}><path d="M2 3h2l1.5 8h7l1.5-6H4.5"/><circle cx="6.5" cy="13.5" r="1"/><circle cx="11.5" cy="13.5" r="1"/></svg>
                  {totalCartLines} line{totalCartLines!==1?"s":""} drafting
                </button>
              </div>
            )}
          </nav>
        )}
      </div>
    );

    // ── ORDER DRAWER ──────────────────────────────────────────────
    function OrderDrawer({order,supplier,onClose}){
      React.useEffect(function(){
        function onEsc(e){if(e.key==="Escape")onClose();}

      return(
        <div className="drawer-backdrop" onClick={onClose}>
          <div className="drawer" onClick={function(e){e.stopPropagation();}}>

                <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                  <h2>{order.id}</h2>

              {order.timeline&&(

                    {order.timeline.map(function(step,i){
                      return <div key={i} className={"tl-step "+step.state}><div className="label">{step.label}</div><div className="time">{step.time}</div></div>;

                </div>
              )}
              <div>
                <div className="section-label">Items</div>
                <div className="drawer-table">
                  <div className="row header"><span>Product</span><span className="qty-cell">Qty</span><span className="total-cell">Line total</span></div>
                  {(order.items||[]).map(function(it,i){
                    return(
                      <div key={i} className="row">
                        <div>
                          <div style={{fontWeight:500}}>{it.name}</div>

                  <div className="totals-row"><span>Subtotal</span><span>MUR {fmt(sub)}</span></div>
                  <div className="totals-row"><span>VAT (15%)</span><span>MUR {fmt(vat)}</span></div>
                  <div className="totals-row grand"><span>Total</span><span className="amount">MUR {fmt(tot)}</span></div>
