<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Fowdar Store">
<meta name="theme-color" content="#0d0f14">
<title>Fowdar Store Tracker</title>
<link rel="manifest" href="/manifest.json">
<style>
/* ── Base app styles ── */
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body,#root{height:100%;background:#0d0f14;color:#e8eaf0;}
body{overscroll-behavior:none;}
input,button{font-family:inherit;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:#0d0f14;}
::-webkit-scrollbar-thumb{background:#2a2f3f;border-radius:2px;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}

/* ── Order module design system ── */

/* ===========================================================
   Fowdar Store — Order module
   Design tokens matched to the existing app shell
   =========================================================== */

:root {
  /* Surfaces */
  --bg:           #0a0a0a;
  --bg-1:         #111111;
  --panel:        #151515;
  --panel-hover:  #1b1b1b;
  --panel-2:      #1d1d1d;
  --border:       #242424;
  --border-soft:  #1e1e1e;
  --border-strong:#2f2f2f;

  /* Text */
  --text:         #f5f5f5;
  --text-dim:     #a3a3a3;
  --text-muted:   #6e6e6e;
  --text-faint:   #4a4a4a;

  /* Accent — bright lime green from the existing app */
  --accent:       #8aff7a;
  --accent-soft:  #8aff7a26;
  --accent-line:  #8aff7a3d;

  /* Status */
  --warn:         #f5c97a;
  --warn-soft:    #f5c97a1f;
  --danger:       #ff6f6f;
  --danger-soft:  #ff6f6f1f;
  --info:         #7ab7ff;
  --info-soft:    #7ab7ff1f;

  /* Type */
  --font-sans: -apple-system, BlinkMacSystemFont, "SF Pro Text",
               "Inter", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  --font-mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;

  /* Radii / shadows */
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 22px;
  --shadow-1: 0 1px 0 rgba(255,255,255,.03) inset, 0 1px 2px rgba(0,0,0,.4);
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-size: 15px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

button { font-family: inherit; }
input, textarea, select { font-family: inherit; color: inherit; }

/* ============== App shell ============== */
.app {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.appbar {
  position: sticky;
  top: 0;
  z-index: 30;
  background: rgba(10,10,10,.85);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border-soft);
}

.appbar-inner {
  max-width: 1240px;
  margin: 0 auto;
  padding: 18px 28px 14px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 24px;
  align-items: start;
}

.brand-row {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.brand-back {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--text-muted);
  font-size: 13px;
  background: none;
  border: none;
  padding: 0 0 6px 0;
  cursor: pointer;
  transition: color .15s ease;
  width: max-content;
}
.brand-back:hover { color: var(--text-dim); }
.brand-back svg { width: 12px; height: 12px; }

.brand-title {
  font-size: 26px;
  font-weight: 700;
  letter-spacing: -0.01em;
  color: var(--accent);
  margin: 0;
  line-height: 1.1;
}
.brand-sub {
  font-size: 13px;
  color: var(--text-muted);
  margin: 4px 0 0 0;
}

.appbar-meta {
  display: flex;
  align-items: flex-start;
  gap: 16px;
}

.refresh-btn {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--panel);
  color: var(--text-dim);
  display: grid;
  place-items: center;
  cursor: pointer;
  transition: all .15s ease;
}
.refresh-btn:hover { color: var(--text); border-color: var(--border-strong); }
.refresh-btn svg { width: 14px; height: 14px; }

.totals {
  text-align: right;
  font-family: var(--font-mono);
  line-height: 1.2;
}
.totals .label {
  font-size: 10px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--text-muted);
}
.totals .value {
  margin-top: 4px;
  font-size: 16px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: 0.02em;
}

/* ============== Tabs ============== */
.tabs {
  max-width: 1240px;
  margin: 0 auto;
  padding: 0 28px;
  display: flex;
  gap: 6px;
  align-items: center;
  border-bottom: 1px solid var(--border-soft);
  background: var(--bg);
}
.tab {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 13.5px;
  padding: 14px 14px;
  cursor: pointer;
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  transition: color .15s ease;
}
.tab:hover { color: var(--text-dim); }
.tab.active { color: var(--text); }
.tab.active::after {
  content: "";
  position: absolute;
  left: 12px; right: 12px; bottom: -1px;
  height: 2px;
  background: var(--accent);
  border-radius: 2px 2px 0 0;
}
.tab .count {
  font-family: var(--font-mono);
  font-size: 11px;
  background: var(--panel);
  color: var(--text-dim);
  padding: 1px 7px;
  border-radius: 999px;
  border: 1px solid var(--border);
}
.tab.active .count {
  background: var(--accent-soft);
  color: var(--accent);
  border-color: var(--accent-line);
}

/* ============== Page layout ============== */
.page {
  max-width: 1240px;
  width: 100%;
  margin: 0 auto;
  padding: 26px 28px 80px;
  flex: 1;
}

.section-label {
  font-size: 10.5px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin: 0 0 14px 0;
  font-weight: 500;
}

.page-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  margin: 4px 0 22px;
  flex-wrap: wrap;
}
.page-head h1 {
  font-size: 22px;
  font-weight: 600;
  letter-spacing: -0.01em;
  margin: 0;
}
.page-head .sub {
  font-size: 13.5px;
  color: var(--text-muted);
  margin-top: 4px;
}

/* ============== Inputs ============== */
.field {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 0 12px 0 38px;
  height: 38px;
  color: var(--text);
  font-size: 14px;
  outline: none;
  width: 100%;
  transition: border-color .15s ease, background .15s ease;
}
.field:focus { border-color: var(--accent-line); background: var(--panel-hover); }
.field::placeholder { color: var(--text-muted); }

.search {
  position: relative;
  flex: 1;
  min-width: 220px;
}
.search svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 16px;
  height: 16px;
  color: var(--text-muted);
  pointer-events: none;
}

.controls-row {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 18px;
}

.chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 12.5px;
  padding: 7px 12px;
  border-radius: 999px;
  cursor: pointer;
  transition: all .15s ease;
  white-space: nowrap;
}
.chip:hover { color: var(--text); border-color: var(--border-strong); }
.chip.active {
  color: var(--accent);
  background: var(--accent-soft);
  border-color: var(--accent-line);
}

/* ============== Buttons ============== */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: var(--r-md);
  padding: 9px 14px;
  font-size: 13.5px;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s ease;
  white-space: nowrap;
}
.btn:hover { background: var(--panel-hover); border-color: var(--border-strong); }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn svg { width: 14px; height: 14px; }

.btn-primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #0a1a06;
  font-weight: 600;
}
.btn-primary:hover { background: #9bff8d; border-color: #9bff8d; }

.btn-ghost {
  background: transparent;
  border-color: transparent;
  color: var(--text-dim);
}
.btn-ghost:hover { background: var(--panel); color: var(--text); }

.btn-icon {
  width: 34px;
  height: 34px;
  padding: 0;
  display: grid;
  place-items: center;
}

/* ============== Cards ============== */
.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  transition: border-color .15s ease, background .15s ease, transform .15s ease;
}
.card.hoverable { cursor: pointer; }
.card.hoverable:hover {
  border-color: var(--border-strong);
  background: var(--panel-hover);
}

/* ============== Supplier list ============== */
.supplier-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 12px;
}
.supplier-card {
  padding: 18px;
  display: grid;
  grid-template-columns: 48px 1fr auto;
  gap: 16px;
  align-items: center;
}
.supplier-emoji {
  width: 48px;
  height: 48px;
  border-radius: 12px;
  background: var(--panel-2);
  border: 1px solid var(--border);
  display: grid;
  place-items: center;
  font-size: 24px;
}
.supplier-info .name {
  font-size: 15px;
  font-weight: 600;
  margin: 0 0 2px 0;
}
.supplier-info .meta {
  font-size: 12.5px;
  color: var(--text-muted);
  font-family: var(--font-mono);
}
.supplier-info .meta .dot { margin: 0 6px; color: var(--text-faint); }
.supplier-status {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
  font-size: 11px;
  color: var(--text-muted);
}
.supplier-status .item-count {
  font-family: var(--font-mono);
  color: var(--text-dim);
  font-size: 13px;
}

/* ============== Catalogue ============== */
.catalogue-head {
  display: grid;
  grid-template-columns: 56px 1fr auto;
  gap: 16px;
  align-items: center;
  margin-bottom: 22px;
  padding: 18px 18px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
}
.catalogue-head .supplier-emoji {
  width: 56px;
  height: 56px;
  border-radius: 14px;
  font-size: 28px;
}
.catalogue-head h2 {
  margin: 0;
  font-size: 18px;
  font-weight: 600;
}
.catalogue-head .meta-line {
  margin-top: 4px;
  font-size: 12.5px;
  color: var(--text-muted);
  font-family: var(--font-mono);
}
.catalogue-head .meta-line .dot { margin: 0 6px; color: var(--text-faint); }

.product-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.product-row {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  padding: 14px 16px;
  display: grid;
  grid-template-columns: 1fr 130px 130px 150px;
  gap: 16px;
  align-items: center;
  transition: border-color .15s ease, background .15s ease;
}
.product-row:hover { border-color: var(--border-strong); }
.product-row.in-cart {
  background: linear-gradient(90deg, #0c1a09 0%, var(--panel) 100%);
  border-color: var(--accent-line);
}

.product-name {
  font-size: 14.5px;
  font-weight: 600;
  margin: 0 0 4px 0;
}
.product-meta {
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.product-meta .last-ordered {
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
.product-meta .last-ordered::before {
  content: "·";
  color: var(--text-faint);
}

.product-pack, .product-price {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text-dim);
  text-align: right;
}
.product-pack .label, .product-price .label {
  display: block;
  font-size: 9.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-faint);
  margin-bottom: 2px;
  font-family: var(--font-sans);
}
.product-price .value { color: var(--text); font-weight: 600; }

/* Quantity stepper */
.qty {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 0;
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  width: 130px;
  margin-left: auto;
}
.qty button {
  width: 34px;
  height: 34px;
  background: transparent;
  border: none;
  color: var(--text-dim);
  font-size: 16px;
  cursor: pointer;
  display: grid;
  place-items: center;
  transition: background .15s ease, color .15s ease;
}
.qty button:hover:not(:disabled) { background: var(--panel-hover); color: var(--text); }
.qty button:disabled { opacity: .35; cursor: not-allowed; }
.qty .value {
  flex: 1;
  text-align: center;
  font-family: var(--font-mono);
  font-size: 14px;
  color: var(--text);
  min-width: 30px;
}
.qty.empty .value { color: var(--text-muted); }
.qty.in-cart {
  background: var(--accent-soft);
  border-color: var(--accent-line);
}
.qty.in-cart .value { color: var(--accent); font-weight: 600; }

/* ============== Cart sidebar ============== */
.catalogue-layout {
  display: grid;
  grid-template-columns: 1fr 340px;
  gap: 20px;
  align-items: start;
}

.cart-summary {
  position: sticky;
  top: 130px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 18px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.cart-summary h3 {
  margin: 0;
  font-size: 14px;
  font-weight: 600;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.cart-summary h3 .count {
  font-family: var(--font-mono);
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 500;
}
.cart-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
  max-height: 360px;
  overflow-y: auto;
  margin: 0 -4px;
  padding: 0 4px;
}
.cart-item {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px dashed var(--border-soft);
}
.cart-item:last-child { border-bottom: none; }
.cart-item .name { font-size: 13px; font-weight: 500; }
.cart-item .meta { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); margin-top: 2px; }
.cart-item .line-total {
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text);
  font-weight: 600;
  text-align: right;
}
.cart-item .remove {
  background: none;
  border: none;
  color: var(--text-faint);
  font-size: 11px;
  margin-top: 2px;
  cursor: pointer;
  text-align: right;
  font-family: var(--font-mono);
}
.cart-item .remove:hover { color: var(--danger); }

.cart-empty {
  padding: 24px 6px;
  text-align: center;
  color: var(--text-muted);
  font-size: 13px;
}
.cart-empty .hint {
  font-size: 11.5px;
  color: var(--text-faint);
  margin-top: 4px;
}

.cart-totals {
  border-top: 1px solid var(--border);
  padding-top: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.cart-totals .line {
  display: flex;
  justify-content: space-between;
  font-size: 12.5px;
  color: var(--text-dim);
  font-family: var(--font-mono);
}
.cart-totals .line.grand {
  margin-top: 4px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
  font-size: 15px;
  color: var(--text);
  font-weight: 600;
}
.cart-totals .line.grand .amount { color: var(--accent); }

/* ============== Order history ============== */
.order-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.order-card {
  padding: 16px 18px;
  display: grid;
  grid-template-columns: auto 1fr auto auto;
  gap: 18px;
  align-items: center;
}
.order-card .order-id {
  font-family: var(--font-mono);
  font-size: 12px;
  color: var(--text-muted);
  padding: 4px 10px;
  background: var(--bg-1);
  border: 1px solid var(--border);
  border-radius: 6px;
}
.order-card .supplier-name {
  font-size: 14.5px;
  font-weight: 600;
  margin: 0;
}
.order-card .order-meta {
  font-size: 12px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  margin-top: 3px;
}
.order-card .order-meta .dot { margin: 0 6px; color: var(--text-faint); }
.order-card .order-total {
  font-family: var(--font-mono);
  font-size: 14px;
  font-weight: 600;
  text-align: right;
}

.status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11.5px;
  font-family: var(--font-mono);
  letter-spacing: 0.02em;
  padding: 5px 10px;
  border-radius: 999px;
  border: 1px solid;
  white-space: nowrap;
}
.status .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
}
.status.draft     { color: var(--text-muted); border-color: var(--border-strong); background: var(--panel-2); }
.status.pending   { color: var(--warn);       border-color: #f5c97a4d; background: var(--warn-soft); }
.status.confirmed { color: var(--info);       border-color: #7ab7ff4d; background: var(--info-soft); }
.status.delivered { color: var(--accent);     border-color: var(--accent-line); background: var(--accent-soft); }
.status.cancelled { color: var(--danger);     border-color: #ff6f6f4d; background: var(--danger-soft); }

/* ============== Order detail drawer ============== */
.drawer-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.55);
  z-index: 50;
  display: flex;
  justify-content: flex-end;
  animation: fade .2s ease;
}
@keyframes fade { from { opacity: 0; } to { opacity: 1; } }

.drawer {
  width: min(560px, 100%);
  height: 100%;
  background: var(--bg);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  animation: slidein .25s cubic-bezier(.2,.7,.2,1);
}
@keyframes slidein { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

.drawer-head {
  padding: 22px 24px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: 12px;
}
.drawer-head h2 {
  margin: 0;
  font-size: 18px;
  font-weight: 600;
}
.drawer-head .sub {
  font-size: 12.5px;
  color: var(--text-muted);
  font-family: var(--font-mono);
  margin-top: 4px;
}
.drawer-close {
  background: var(--panel);
  border: 1px solid var(--border);
  color: var(--text-dim);
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: grid;
  place-items: center;
  cursor: pointer;
}
.drawer-close:hover { color: var(--text); }

.drawer-body {
  padding: 18px 24px 24px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.timeline {
  display: flex;
  flex-direction: column;
  gap: 0;
  position: relative;
  padding-left: 22px;
}
.timeline::before {
  content: "";
  position: absolute;
  left: 6px; top: 8px; bottom: 8px;
  width: 1px;
  background: var(--border);
}
.tl-step {
  position: relative;
  padding: 6px 0;
}
.tl-step::before {
  content: "";
  position: absolute;
  left: -22px; top: 12px;
  width: 13px; height: 13px;
  border-radius: 50%;
  background: var(--bg);
  border: 2px solid var(--border-strong);
}
.tl-step.done::before { border-color: var(--accent); background: var(--accent); }
.tl-step.current::before { border-color: var(--accent); background: var(--bg); box-shadow: 0 0 0 3px var(--accent-soft); }
.tl-step .label { font-size: 13.5px; font-weight: 500; }
.tl-step.pending .label { color: var(--text-muted); }
.tl-step .time { font-size: 11.5px; color: var(--text-muted); font-family: var(--font-mono); margin-top: 2px; }

.drawer-table {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r-md);
  overflow: hidden;
}
.drawer-table .row {
  padding: 12px 14px;
  display: grid;
  grid-template-columns: 1fr 60px 90px;
  gap: 12px;
  font-size: 13px;
  border-bottom: 1px solid var(--border-soft);
}
.drawer-table .row:last-child { border-bottom: none; }
.drawer-table .row.header {
  font-size: 10.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-muted);
  background: var(--bg-1);
}
.drawer-table .row .qty-cell, .drawer-table .row .total-cell {
  font-family: var(--font-mono);
  text-align: right;
}
.drawer-table .totals-row {
  background: var(--bg-1);
  padding: 12px 14px;
  display: flex;
  justify-content: space-between;
  font-family: var(--font-mono);
  font-size: 13px;
}
.drawer-table .totals-row.grand {
  font-weight: 600;
  font-size: 15px;
}
.drawer-table .totals-row.grand .amount { color: var(--accent); }

/* ============== Empty state ============== */
.empty-state {
  padding: 56px 24px;
  text-align: center;
  border: 1px dashed var(--border-strong);
  border-radius: var(--r-lg);
  color: var(--text-muted);
}
.empty-state .glyph {
  font-size: 32px;
  margin-bottom: 10px;
  opacity: .6;
}
.empty-state h3 {
  color: var(--text-dim);
  font-size: 15px;
  margin: 0 0 6px 0;
  font-weight: 500;
}
.empty-state p {
  margin: 0;
  font-size: 13px;
}

/* ============== Floating cart (mobile) ============== */
.fab-cart {
  position: fixed;
  bottom: 18px;
  left: 18px;
  right: 18px;
  background: var(--accent);
  color: #0a1a06;
  border: none;
  border-radius: 14px;
  padding: 14px 18px;
  display: none;
  justify-content: space-between;
  align-items: center;
  font-weight: 600;
  font-size: 14px;
  cursor: pointer;
  z-index: 20;
  box-shadow: 0 8px 24px rgba(0,0,0,.5), 0 0 0 1px rgba(0,0,0,.2);
}
.fab-cart .count {
  background: rgba(0,0,0,.18);
  padding: 3px 10px;
  border-radius: 999px;
  font-family: var(--font-mono);
}

/* ============== Responsive ============== */
@media (max-width: 920px) {
  .catalogue-layout {
    grid-template-columns: 1fr;
  }
  .cart-summary { display: none; }
  .product-row {
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto;
  }
  .product-row .product-pack { display: none; }
  .product-row .product-price {
    grid-column: 1 / 2;
    grid-row: 2;
    text-align: left;
  }
  .product-row .product-price .label { display: inline; margin-right: 6px; }
  .product-row .qty {
    grid-column: 2 / 3;
    grid-row: 1 / 3;
    align-self: center;
  }
  .fab-cart.show { display: flex; }
  .order-card {
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto auto;
    gap: 8px 14px;
  }
  .order-card .order-id { grid-column: 1; grid-row: 1; justify-self: start; }
  .order-card .status { grid-column: 2; grid-row: 1; justify-self: end; }
  .order-card .supplier-info-block { grid-column: 1 / 3; grid-row: 2; }
  .order-card .order-total { grid-column: 1 / 3; grid-row: 3; text-align: left; }
}

@media (max-width: 640px) {
  .appbar-inner { padding: 14px 16px 10px; }
  .tabs { padding: 0 16px; overflow-x: auto; }
  .page { padding: 20px 16px 100px; }
  .brand-title { font-size: 22px; }
  .supplier-grid { grid-template-columns: 1fr; }
}

/* ============== Toast ============== */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent);
  color: #0a1a06;
  padding: 10px 18px;
  border-radius: 999px;
  font-size: 13px;
  font-weight: 600;
  z-index: 60;
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
  animation: toast-in .25s cubic-bezier(.2,.7,.2,1);
}
@keyframes toast-in {
  from { transform: translate(-50%, 20px); opacity: 0; }
  to   { transform: translate(-50%, 0);    opacity: 1; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

  

/* ============================================================
   HOME / MENU SCREEN
   ============================================================ */
.home-wrap { background: var(--bg); min-height: 100%; }
.home-appbar {
  background: rgba(10,10,10,.88);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border-soft);
  padding: 22px 32px;
}
.home-appbar-inner {
  max-width: 1320px; margin: 0 auto;
  display: grid; grid-template-columns: 1fr auto;
  gap: 24px; align-items: start;
}
.home-brand { font-size: 26px; font-weight: 700; letter-spacing: -0.01em; margin: 0; line-height: 1.1; color: var(--text); }
.home-sub   { font-size: 13px; color: var(--text-muted); margin: 4px 0 0 0; }
.home-meta  { display: flex; align-items: flex-start; gap: 14px; }
.home-refresh {
  width: 34px; height: 34px; border-radius: 50%;
  border: 1px solid var(--accent-line); background: var(--accent-soft);
  color: var(--accent); display: grid; place-items: center;
  cursor: pointer; transition: all .15s ease;
}
.home-refresh:hover { background: #8aff7a30; }
.home-refresh svg { width: 16px; height: 16px; }
.home-totals { text-align: right; font-family: var(--font-mono); line-height: 1.15; }
.home-totals .ht-label { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); }
.home-totals .ht-value { margin-top: 4px; font-size: 16px; font-weight: 600; color: var(--accent); }
.home-totals .ht-sub   { margin-top: 3px; font-size: 11px; color: var(--text-muted); letter-spacing: 0.02em; }
.home-page  { max-width: 1320px; margin: 0 auto; padding: 26px 32px 60px; }

/* section label with rule */
.slabel {
  font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-muted); margin: 0 0 14px; font-weight: 500;
  display: flex; align-items: center; gap: 10px;
}
.slabel .rule { flex: 1; height: 1px; background: var(--border-soft); }
.slabel .meta { font-family: var(--font-mono); letter-spacing: 0.04em; text-transform: none; font-size: 11.5px; }

/* KPI strip */
.kpis { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 26px; }
.kpi  {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 16px 18px;
  display: flex; flex-direction: column; gap: 6px;
  position: relative; overflow: hidden;
}
.kpi .kl  { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-muted); font-weight: 500; }
.kpi .kv  { font-family: var(--font-mono); font-size: 26px; font-weight: 600; color: var(--text); letter-spacing: -0.01em; display: flex; align-items: baseline; gap: 6px; }
.kpi .kv .ku { font-size: 11px; color: var(--text-muted); font-weight: 500; }
.kpi .kd  { font-family: var(--font-mono); font-size: 12px; display: inline-flex; align-items: center; gap: 4px; }
.kpi .kd.up   { color: var(--accent); }
.kpi .kd.down { color: var(--danger); }
.kpi .kd.flat { color: var(--text-muted); }
.kpi .kspark {
  position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
  width: 90px; height: 30px; opacity: .9; pointer-events: none;
}

/* Bento grid */
.bento { display: grid; grid-template-columns: repeat(12,1fr); gap: 12px; }
.tile  {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: var(--r-lg); padding: 20px 22px;
  cursor: pointer; transition: border-color .15s, background .15s;
  display: flex; flex-direction: column; gap: 14px;
  color: inherit; position: relative; overflow: hidden;
}
.tile:hover { border-color: var(--border-strong); background: var(--panel-hover); }
.tile:hover .t-arrow { color: var(--text-dim); transform: translateX(2px); }
.t-head   { display: flex; align-items: center; gap: 12px; }
.t-glyph  { width: 42px; height: 42px; border-radius: 11px; background: var(--panel-2); border: 1px solid var(--border); display: grid; place-items: center; font-size: 22px; flex-shrink: 0; }
.t-titles { flex: 1; min-width: 0; }
.t-title  { font-size: 16px; font-weight: 600; margin: 0; letter-spacing: -0.005em; }
.t-sub    { font-size: 12.5px; color: var(--text-muted); margin-top: 2px; }
.t-arrow  { color: var(--text-faint); transition: all .15s; }
.t-arrow svg { width: 16px; height: 16px; }
.t-body   { display: flex; flex-direction: column; gap: 12px; }
.t-stat   { display: flex; align-items: baseline; gap: 8px; min-width: 0; overflow: hidden; }
.t-num    { font-family: var(--font-mono); font-size: 28px; font-weight: 600; letter-spacing: -0.01em; flex-shrink: 0; }
.t-unit   { font-family: var(--font-mono); font-size: 12px; color: var(--text-muted); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.t-num.accent { color: var(--accent); }
.t-num.warn   { color: var(--warn); }
.t-meta   { font-size: 12.5px; color: var(--text-muted); font-family: var(--font-mono); display: flex; gap: 8px; flex-wrap: wrap; min-width: 0; overflow: hidden; }
.t-meta .dot { color: var(--text-faint); }
.col6  { grid-column: span 6; }
.col4  { grid-column: span 4; }

/* tile variants */
.tile-order { border-color: var(--accent-line); background: linear-gradient(140deg,#0d1a09 0%,var(--panel) 60%); }
.tile-order:hover { border-color: var(--accent); }
.tile-order .t-glyph { background: var(--accent-soft); border-color: var(--accent-line); }
.tile-alert { border-color: var(--warn-line); background: linear-gradient(140deg,#1c1408 0%,var(--panel) 55%); }
.tile-alert:hover { border-color: var(--warn); }
.tile-alert .t-glyph { background: var(--warn-soft); border-color: var(--warn-line); }
.tile-badge { background: var(--warn-soft); color: var(--warn); border: 1px solid var(--warn-line); padding: 3px 10px; border-radius: 999px; font-family: var(--font-mono); font-size: 12px; font-weight: 600; }
.tile-pulse { width: 8px; height: 8px; border-radius: 50%; background: var(--warn); animation: tpulse 2s infinite; }
@keyframes tpulse { 0% { box-shadow:0 0 0 0 #f5b34a80; } 70% { box-shadow:0 0 0 8px #f5b34a00; } 100% { box-shadow:0 0 0 0 #f5b34a00; } }
.t-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 2px; }
.tqa { background: var(--bg-1); border: 1px solid var(--border); color: var(--text-dim); padding: 8px 12px; border-radius: 10px; font-size: 12.5px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: all .15s; font-family: inherit; }
.tqa:hover { background: var(--panel-hover); color: var(--text); border-color: var(--border-strong); }
.tqa.primary { background: var(--accent); color: #0a1a06; border-color: var(--accent); font-weight: 600; }
.tqa.primary:hover { background: #9bff8d; }
.tqa svg { width: 13px; height: 13px; }

/* mini list inside tile */
.ml { display: flex; flex-direction: column; margin-top: 4px; border-top: 1px solid var(--border-soft); }
.ml-row { padding: 9px 0; display: grid; grid-template-columns: 1fr auto; gap: 12px; font-size: 13px; border-bottom: 1px solid var(--border-soft); align-items: center; }
.ml-row:last-child { border-bottom: none; }
.ml-name { color: var(--text); font-weight: 500; }
.ml-info { font-size: 11.5px; color: var(--text-muted); font-family: var(--font-mono); margin-top: 2px; }
.ml-right { font-family: var(--font-mono); font-size: 13px; text-align: right; color: var(--text); }
.mpill { display: inline-block; font-family: var(--font-mono); font-size: 10.5px; letter-spacing: 0.04em; padding: 2px 8px; border-radius: 999px; border: 1px solid; margin-top: 4px; }
.mpill.pending   { color: var(--warn);   border-color: var(--warn-line);   background: var(--warn-soft); }
.mpill.confirmed { color: var(--info);   border-color: var(--info-line);   background: var(--info-soft); }
.mpill.delivered { color: var(--accent); border-color: var(--accent-line); background: var(--accent-soft); }

/* gauge */
.gauge     { width:100%; height:6px; background:var(--bg-1); border-radius:999px; overflow:hidden; }
.gauge-fill { height:100%; border-radius:999px; background:var(--accent); }
.gauge-fill.warn { background:var(--warn); }

.home-foot { margin-top:22px; padding-top:18px; border-top:1px solid var(--border-soft); font-size:11.5px; color:var(--text-faint); display:flex; justify-content:space-between; font-family:var(--font-mono); }

/* ============================================================
   SECTION SCREEN SHARED HEADER
   ============================================================ */
.sec-appbar {
  background: rgba(10,10,10,.88);
  backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border-soft);
  position: sticky; top: 0; z-index: 30;
}
.sec-appbar-inner {
  max-width: 1320px; margin: 0 auto;
  padding: 18px 32px;
  display: grid; grid-template-columns: auto 1fr auto;
  gap: 18px; align-items: center;
}
.sec-back {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--accent); font-size: 13px;
  background: var(--accent-soft); border: 1px solid var(--accent-line);
  padding: 6px 12px; border-radius: 999px;
  cursor: pointer; text-decoration: none; transition: background .15s;
  font-family: inherit;
}
.sec-back:hover { background: #8aff7a30; }
.sec-back svg { width: 12px; height: 12px; }
.sec-title { font-size: 20px; font-weight: 600; letter-spacing: -0.01em; margin: 0; color: var(--text); }
.sec-page  { max-width: 1320px; margin: 0 auto; padding: 22px 32px 80px; }
.sec-totals { text-align: right; font-family: var(--font-mono); line-height: 1.15; }
.sec-totals .stl { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); }
.sec-totals .stv { margin-top: 4px; font-size: 16px; font-weight: 600; color: var(--accent); }

/* ============================================================
   INVOICES SCREEN
   ============================================================ */
.week-strip { display: grid; grid-template-columns: 36px 1fr 36px; gap: 10px; align-items: stretch; margin-bottom: 22px; }
.week-nav   { background: var(--panel); border: 1px solid var(--border); border-radius: var(--r-md); cursor: pointer; color: var(--text-dim); display: grid; place-items: center; transition: all .15s; font-family: inherit; }
.week-nav:hover { background: var(--panel-hover); color: var(--text); border-color: var(--border-strong); }
.week-nav svg { width: 14px; height: 14px; }
.day-cards-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 8px; }
.day-card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: var(--r-md); padding: 10px 8px;
  text-align: center; cursor: pointer;
  display: flex; flex-direction: column; gap: 4px;
  transition: all .15s; position: relative;
}
.day-card:hover { background: var(--panel-hover); border-color: var(--border-strong); }
.day-card.dc-active { background: linear-gradient(180deg,#0d1a09 0%,var(--panel) 100%); border-color: var(--accent-line); }
.day-card.dc-active .dcn { color: var(--accent); }
.day-card.dc-active .dct { color: var(--accent); }
.day-card.dc-today::after { content:""; position:absolute; top:6px; right:6px; width:6px; height:6px; background:var(--accent); border-radius:50%; }
.dcn  { font-size:10px; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-muted); font-weight:500; }
.dcnum { font-family:var(--font-mono); font-size:22px; font-weight:600; letter-spacing:-0.01em; color:var(--text); }
.dct  { font-family:var(--font-mono); font-size:11px; color:var(--text-dim); margin-top:2px; }
.dcc  { font-size:10px; color:var(--text-faint); font-family:var(--font-mono); }
.day-card.dc-empty .dct,.day-card.dc-empty .dcc { color:var(--text-faint); }

.day-summary { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:22px; }
.dstat { background:var(--panel); border:1px solid var(--border); border-radius:var(--r-lg); padding:14px 16px; display:flex; flex-direction:column; gap:4px; }
.dstat .dsl { font-size:10.5px; letter-spacing:0.16em; text-transform:uppercase; color:var(--text-muted); font-weight:500; }
.dstat .dsv { font-family:var(--font-mono); font-size:22px; font-weight:600; letter-spacing:-0.01em; color:var(--text); }
.dstat .dsv.accent { color:var(--accent); }
.dstat .dsm { font-family:var(--font-mono); font-size:11px; color:var(--text-muted); margin-top:2px; }

.sort-grp { display:inline-flex; background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:3px; gap:2px; }
.sort-btn { background:transparent; border:none; color:var(--text-muted); font-size:12.5px; font-weight:500; padding:7px 12px; border-radius:7px; cursor:pointer; white-space:nowrap; transition:all .15s; font-family:inherit; }
.sort-btn:hover { color:var(--text-dim); }
.sort-btn.sba { background:var(--accent-soft); color:var(--accent); box-shadow:inset 0 0 0 1px var(--accent-line); }

.inv-list  { display:flex; flex-direction:column; gap:8px; }
.inv-row   { background:var(--panel); border:1px solid var(--border); border-radius:var(--r-lg); overflow:hidden; cursor:pointer; transition:border-color .15s; }
.inv-row:hover { border-color:var(--border-strong); }
.inv-summ  { padding:14px 18px; display:grid; grid-template-columns:40px 1fr auto auto; gap:16px; align-items:center; }
.inv-av    { width:40px; height:40px; border-radius:11px; background:var(--panel-2); border:1px solid var(--border); display:grid; place-items:center; font-family:var(--font-mono); font-size:13px; font-weight:600; color:var(--text-dim); }
.inv-info  { min-width:0; }
.inv-sup   { font-size:15px; font-weight:600; margin:0; letter-spacing:-0.005em; }
.inv-meta  { display:flex; gap:8px; flex-wrap:wrap; margin-top:4px; font-size:12px; font-family:var(--font-mono); color:var(--text-muted); align-items:center; }
.inv-meta .dot { color:var(--text-faint); }
.inv-cnt   { background:var(--bg-1); border:1px solid var(--border); border-radius:6px; padding:2px 8px; font-family:var(--font-mono); font-size:11px; color:var(--text-dim); }
.inv-amt   { font-family:var(--font-mono); font-size:16px; font-weight:600; color:var(--accent); letter-spacing:-0.01em; text-align:right; min-width:120px; }
.inv-amt .iau { display:block; font-size:10.5px; letter-spacing:0.14em; text-transform:uppercase; color:var(--text-muted); font-weight:500; margin-bottom:2px; }

/* ============================================================
   PAYMENTS SCREEN
   ============================================================ */
.method-cards { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:24px; }
.method-card  {
  background:var(--panel); border:1px solid var(--border);
  border-radius:var(--r-lg); padding:16px 18px;
  display:flex; flex-direction:column; gap:8px;
  cursor:pointer; transition:border-color .15s, background .15s;
  position:relative; overflow:hidden;
}
.method-card:hover { border-color:var(--border-strong); background:var(--panel-hover); }
.method-card.mc-active { border-color:var(--mc,var(--accent)); }
.mc-head { display:flex; align-items:center; gap:10px; }
.mc-icon { width:32px; height:32px; border-radius:9px; display:grid; place-items:center; }
.mc-icon svg { width:16px; height:16px; }
.mc-name { font-size:13px; font-weight:600; color:var(--text); }
.mc-count { font-family:var(--font-mono); font-size:11px; color:var(--text-muted); margin-left:auto; }
.mc-amount { font-family:var(--font-mono); font-size:22px; font-weight:600; color:var(--text); letter-spacing:-0.01em; }
.mc-amount .mcu { font-size:11px; color:var(--text-muted); font-weight:500; margin-left:4px; }
.mc-bar  { height:4px; background:var(--bg-1); border-radius:999px; overflow:hidden; }
.mc-fill { height:100%; border-radius:999px; }
.mc-foot { font-size:11.5px; color:var(--text-muted); font-family:var(--font-mono); }

.pay-list  { display:flex; flex-direction:column; gap:10px; }
.pay-card  { background:var(--panel); border:1px solid var(--border); border-radius:var(--r-lg); padding:16px 20px; display:flex; flex-direction:column; gap:12px; transition:border-color .15s; }
.pay-card:hover { border-color:var(--border-strong); }
.pay-row   { display:flex; align-items:flex-start; gap:14px; }

// ── PACK SIZE DETECTION ─────────────────────────────────────────────────────
// Extracts N from "NxWEIGHT" patterns in product descriptions.
// e.g. "LAY'S BBQ 20x45g" → 20,  "Coca-Cola 12x330ml" → 12,  "6x1.5L Water" → 6
function detectPackSize(desc){
  if(!desc)return null;
  var s=String(desc);
  // Pattern A: WEIGHTxN — unit letter between weight and X → number AFTER X = pack count
  // e.g. "70GX24"→24, "3LTX6"→6, "150GX72"→72, "300MLX24"→24, "2.5KGX12"→12
  var mA=s.match(/\b\d+(?:\.\d+)?\s*[gGmMlLkK][a-zA-Z]*\s*[xX×]\s*(\d+)/);
  if(mA)return parseInt(mA[1],10);
  // Pattern B: NxWEIGHT — unit letter immediately after second number → N before X = pack count
  // e.g. "20 X 45g"→20, "12X330ml"→12, "6X1L"→6
  var mB=s.match(/\b(\d+)\s*[xX×]\s*\d+(?:\.\d+)?\s*[gGmMlLkK]/);
  if(mB)return parseInt(mB[1],10);
  // Pattern C: pure numeric "LARGExSMALL" → SMALLER number = pack count
  // e.g. "300X30"→30, "2500X12"→12, "500X12"→12, "1000X6"→6
  // Works because product size (g/ml) is always larger than pack count in practice.
  var mC=s.match(/\b(\d+)\s*[xX×]\s*(\d+)\b/);
  if(mC){
    var n1=parseInt(mC[1],10),n2=parseInt(mC[2],10);
    return n1<=n2?n1:n2;
  }
  return null;
}

// ── VAT RATE DETECTION ──────────────────────────────────────────────────────
// Determines whether VAT is already included in the invoice line totals.
// Returns 1.15 (VAT must be added) or 1.0 (VAT already included).
// Rules (in order):
//  1. Separate non-zero VAT column → add VAT (1.15)
//  2. Amount column name contains "excl"/"ex vat"/"net" → add VAT (1.15)
//  3. Invoice header states "Incl. VAT"/"Incl Vat" → already included (1.0)
//  4. Back-calculate: if any row total ÷ 1.15 × 1.15 ≈ total AND a VAT subtotal exists → 1.15
//  5. Fall back to stored vatRate, then 1.0
function detectVatRate(inv){
  // Only called for invoices with NO stored vatRate (null/undefined).
  // Checks the AMOUNT COLUMN NAME only — scanning all columns causes false
  // positives (e.g. a "Vat" display column in a row where Total already
  // includes VAT would incorrectly trigger "add VAT").
  if(!inv.cols)return 1.0;
  var cols=(inv.cols||[]).map(function(c){return(c||"").toLowerCase().trim();});

  // 1. Amount column name says "excl"/"ex"/"net" → Total is excl-VAT → add it
  if(inv.amountCol!=null){
    var acn=cols[inv.amountCol]||"";
    if(/excl|ex\s*vat|net\s*vat|net\s*amount|\(ex\)|excl\./.test(acn)){return 1.15;}
    // Amount column says "incl vat" → already included
    if(/incl\s*\.?\s*vat/.test(acn)){return 1.0;}
  }

  // 2. Any column is named exactly "price (ex)" or "unit price excl vat" → excl-VAT pricing
  if(cols.some(function(c){return c==="price (ex)"||c==="unit price excl vat"||c==="unit prc excl vat";})){return 1.15;}

  // 3. Any column explicitly states "incl vat" → VAT already in totals
  if(cols.some(function(c){return/incl\.?\s*vat/.test(c);})){return 1.0;}

  // 4. Default: assume VAT is already included (safest assumption)
  return 1.0;
}

// Maps AI-generated item field names → human-readable column headers.
// Extend this when new AI formats introduce new field names.
var ITEM_FIELD_LABELS={
  // Description / product identification

  // RSP (Freelance, Grays — first column on paper)

  // Identification
  "description","product","name","item","code","sku",
  // Quantity / carton counts
  "qty","quantity","totalUnits","noOfCtns","qtyKg","units","ctns","pieces","pcs",
  // Pack info
  "packSize","packs","uom","um","pcb","unit","unitWt",
  // Prices
  "unitPrice","unitPriceExcl","priceEx","price","totalUnitPrice",
  // Exempt / taxable / VAT type (butcher-style columns)
  "exempted","taxable","vatType","vatCode",
  // Discounts and taxes per line
  "disc","discount","discAmt","discPct","tax","petTax","vat","vatAmt","vatPct",
  // Net VAT (Grays)
  "netVat",
  // Line totals
  "exclVat","total","totalExcl","totalExclVat","totalInclVat","totalRs","amountExcl","itemAmt","netAmount"
];

// Converts new "items"-format invoices (pushed by Claude AI) to the legacy
// cols/rows format so every downstream function works without changes.
// Also applies VAT detection and totals normalisation to ALL invoices.
function normalizeInv(inv){
  var result;

  if(inv.cols&&inv.rows){
    // Legacy format — trust the stored vatRate completely.
    // Only auto-detect when vatRate is genuinely absent (null/undefined).
    var storedRate=inv.vatRate!=null?Number(inv.vatRate):null;
    var finalRate=storedRate!==null?storedRate:detectVatRate(inv);
    // normalizeTotals handles both [[label,val]] arrays and legacy object formats
    result=Object.assign({},inv,{vatRate:finalRate,totals:normalizeTotals(inv.totals)});
    return result;
  }

  if(!inv.items)return inv; // Unknown format — degrade gracefully

  // ── New "items" format ──────────────────────────────────────────────────
  // Each AI invoice stores items with different field names.
  // Detect the actual fields present in this invoice's items and build
  // the column headers + rows dynamically so nothing is dropped.
  var firstItem=inv.items[0]||{};
  var displayFields=Object.keys(firstItem).filter(function(k){return!ITEM_META_FIELDS[k];});

  // Column ordering: explicit colOrder wins; inv.cols accepted as fallback for older
  // items-format invoices that stored the key order there (e.g. Freelance Distributors).
  // Last resort: canonical ITEM_FIELD_ORDER heuristic.
  var _effectiveColOrder=(Array.isArray(inv.colOrder)&&inv.colOrder.length>0)?inv.colOrder
    :((Array.isArray(inv.cols)&&inv.cols.length>0)?inv.cols:null);
  if(_effectiveColOrder){
    var _coIdx={};
    _effectiveColOrder.forEach(function(k,i){_coIdx[k]=i;});
    displayFields.sort(function(a,b){
      var ai=_coIdx[a]!=null?_coIdx[a]:999+ITEM_FIELD_ORDER.indexOf(a);
      var bi=_coIdx[b]!=null?_coIdx[b]:999+ITEM_FIELD_ORDER.indexOf(b);
      return ai-bi;
    });
  }else{
    displayFields.sort(function(a,b){
      var ai=ITEM_FIELD_ORDER.indexOf(a);var bi=ITEM_FIELD_ORDER.indexOf(b);
      if(ai<0)ai=999;if(bi<0)bi=999;return ai-bi;
    });
  }

  var cols=displayFields.map(function(k){return ITEM_FIELD_LABELS[k]||k;});
  var rows=inv.items.map(function(item){
    return displayFields.map(function(k){return item[k]!=null?item[k]:"";});
  });

  // Pre-computed per-row values (already calculated by Claude AI)
  var precomputed=inv.items.map(function(item){
    return{buyPlusVat:item.buyPlusVat!=null?item.buyPlusVat:null,
           recPrice:item.recPrice!=null?item.recPrice:null};
  });

  // Detect qtyCol: check expanded list of known quantity-field names
  var QTY_KEYS=["qty","quantity","totalUnits","noOfCtns","qtyKg","qtykg","units","pieces","pcs"];
  var qtyCol=0;
  for(var qi=0;qi<QTY_KEYS.length;qi++){var qi2=displayFields.indexOf(QTY_KEYS[qi]);if(qi2>=0){qtyCol=qi2;break;}}

  // Detect amountCol: check expanded list of known line-total field names, then
  // fall back to a regex scan so future unknown amount-column names still resolve correctly.
  var AMT_KEYS=[
    "total","amountExcl","itemAmt","totalPayable",   // legacy
    "totalRs","totalExcl","totalExclVat","totalInclVat", // ocean, eagle, moroil variants
    "taxable","itemTotal","lineTotal","netTotal","amount","totalInclDisc"
  ];
  var amountCol=displayFields.length>0?displayFields.length-1:0;
  var _amtMatched=false;
  for(var ai=0;ai<AMT_KEYS.length;ai++){var ai2=displayFields.indexOf(AMT_KEYS[ai]);if(ai2>=0){amountCol=ai2;_amtMatched=true;break;}}
  if(!_amtMatched){
    // Scan column names ending in "total", "amount", "amt", or "Rs"
    for(var si=displayFields.length-1;si>=0;si--){
      if(/total$|amount$|amt$|rs$/.test(displayFields[si].toLowerCase())){amountCol=si;break;}
    }
  }

  return{
    id:inv.invoiceId||inv.id||"",
    date:inv.date||"",
    total:inv.total||0,
    receivedAt:inv.receivedAt||"",
    cols:cols,
    rows:rows,
    qtyCol:qtyCol,
    amountCol:amountCol,
    packCol:null,
    vatRate:1.0,   // AI-computed buyPlusVat already includes VAT
    totals:normalizeTotals(inv.totals),
    _precomputed:precomputed
  };
}

// Supplier name aliases — any key is treated as the same supplier as its value.
// Add new pairs here whenever Claude uses a slightly different name.
const SUPPLIER_ALIASES={
  "Quality Bev.":"Quality Beverages Limited",
  "Quality Beverages":"Quality Beverages Limited",
  "Qualitybev":"Quality Beverages Limited",
};

function buildSuppliers(rows){
  const out={};
  if(!rows)return out;
  rows.forEach(function(row){
    const raw=row.supplier_name||row.id;
    // Resolve to canonical name if an alias is defined
    const name=SUPPLIER_ALIASES[raw]||raw;
    const invoices=(row.invoices||[]).map(normalizeInv);
    if(out[name]){
      // Merge invoices from duplicate/alias rows
      out[name].invoices=out[name].invoices.concat(invoices);
      // Keep whichever meta has more keys (richer data wins)
      if(Object.keys(row.meta||{}).length>Object.keys(out[name].meta).length){
        out[name].meta=row.meta||{};
      }
    }else{
      out[name]={meta:row.meta||{},invoices:invoices};
    }
  });
  // Sort each supplier's invoices newest-first after merging.
  // Must use toISODate() on both sides — raw string compare breaks when old invoices
  // use DD/MM/YYYY and new ones use YYYY-MM-DD (e.g. "22/..." > "2026-..." as strings).
  Object.keys(out).forEach(function(n){
    out[n].invoices.sort(function(a,b){
      return toISODate(b.receivedAt||b.date||"").localeCompare(
             toISODate(a.receivedAt||a.date||""));
    });
  });
  return out;
}
function calcRec(inv,ri,row,supMeta){
  // ── New-format invoices: pre-computed by Claude AI ──────────────────────
  // Divide by pack size extracted from description so we get per-UNIT cost.
  if(inv._precomputed&&inv._precomputed[ri]&&inv._precomputed[ri].buyPlusVat!=null){
    var bv=inv._precomputed[ri].buyPlusVat;
    var descNew=String(row[0]||""); // col 0 is always "Description" for normalised invoices
    var N=detectPackSize(descNew);
    return(N&&N>1)?bv/N:bv;
  }
  // Returns BUYING PRICE + VAT (cost per unit inclusive of VAT, no margin)
  const cols=inv.cols||[];
  const vat=inv.vatRate||1.0;
  const qty=(inv.qtyCol!==null&&inv.qtyCol!==undefined)?(parseFloat(row[inv.qtyCol])||1):1;
  const pack=(inv.packCol!==null&&inv.packCol!==undefined)?(parseFloat(row[inv.packCol])||1):1;
  const supName=(supMeta&&supMeta.supplier)||"";

  // 1. SHEET_REC overrides - handwritten prices, pre-filled rec prices
  const sr=inv.SHEET_REC;
  if(sr){
    const code=String(row[0]);
    if(sr[code]!==undefined)return Number(sr[code]);
    if(sr[ri]!==undefined)return Number(sr[ri]);
    // Tea Blenders: keyed by product name (col 1)
    const nm=String(row[1]||"").trim();
    if(nm&&sr[nm]!==undefined)return Number(sr[nm]);
  }

  // 2. RR Rapid Service: items by dozen, 25% margin baked into Buy+VAT display
  if(supMeta&&supMeta.recPriceRule==="per_unit_dozen"){
    const dozSize=supMeta.dozSize||12;
    const amt=parseFloat(row[inv.amountCol]);
    if(!isNaN(amt)&&qty>0)return(amt/qty/dozSize)*vat;
    return null;
  }

  // 3. BrandActiv: use "Unit prc excl Vat" column (not Rec.Cons which is selling price)
  if(supName.indexOf("BrandActiv")>=0||supName.indexOf("IBL")>=0){
    const unitExclIdx=cols.findIndex(function(c){return c.toLowerCase()==="unit prc excl vat";});
    if(unitExclIdx>=0){
      // Find VAT% column
      const vatPctIdx=cols.findIndex(function(c){const cl=c.toLowerCase();return cl==="vat %"||cl==="vat%";});
      const rowVat=vatPctIdx>=0?(parseFloat(row[vatPctIdx])||0):0;
      const vatMult=rowVat>0?(1+rowVat/100):1.0;
      // Find discount col to get unit disc prc
      const unitDiscIdx=cols.findIndex(function(c){return c.toLowerCase()==="unit disc prc excl vat";});
      let buyPrice;
      if(unitDiscIdx>=0){
        const v=parseFloat(row[unitDiscIdx]);
        if(!isNaN(v))buyPrice=v*vatMult;
      }
      if(!buyPrice){
        const v=parseFloat(row[unitExclIdx]);
        if(!isNaN(v))buyPrice=v*vatMult;
      }
      if(buyPrice)return buyPrice;
    }
  }

  // 4. Lim How Brothers: use Price(Ex) column (excl VAT buying price)
  if(supName.indexOf("Lim How")>=0){
    const priceExIdx=cols.findIndex(function(c){return c.toLowerCase()==="price (ex)";});
    if(priceExIdx>=0){
      const v=parseFloat(row[priceExIdx]);
      if(!isNaN(v))return v*vat;
    }
  }

  // 5. Cadi Fortune: prices already VAT-inclusive, return amount/qty directly
  if(supName.indexOf("Cadi Fortune")>=0){
    const amt=parseFloat(row[inv.amountCol]);
    if(!isNaN(amt)&&qty>0)return amt/qty;
    return null;
  }

  // 6. Innodis: carton (CT) quantities - extract pack size from product name
  if(supName.indexOf("Innodis")>=0){
    const qtyStr=String(row[inv.qtyCol]||"");
    const isCT=qtyStr.toUpperCase().indexOf("CT")>=0;
    if(isCT){
      // Extract number from qty string e.g. "2CT" -> 2
      const ctQty=parseFloat(qtyStr)||1;
      // Extract units per carton from product name e.g. "x36" -> 36
      const prodName=String(row[1]||"");
      const match=prodName.match(/[xX]([0-9]+)/);
      const unitsPerCtn=match?parseInt(match[1]):1;
      const totalUnits=ctQty*unitsPerCtn;
      const amt=parseFloat(row[inv.amountCol]);
      if(!isNaN(amt)&&totalUnits>0)return(amt/totalUnits)*vat;
      return null;
    }
  }

  // 7. Standard column detection
  const ucpIdx=cols.findIndex(function(c){const cl=c.toLowerCase();return cl==="unit price"||cl==="ucp";});
  const puIdx=cols.findIndex(function(c){return c.toLowerCase()==="price/unit";});
  // Price (Ex) generic
  const priceExIdx=cols.findIndex(function(c){return c.toLowerCase()==="price (ex)";});
  // Unit prc excl vat generic
  const unitExclIdx=cols.findIndex(function(c){return c.toLowerCase()==="unit prc excl vat";});

  if(ucpIdx>=0){const v=parseFloat(row[ucpIdx]);if(!isNaN(v))return v*vat;}
  if(puIdx>=0){const v=parseFloat(row[puIdx]);if(!isNaN(v))return v*vat;}
  if(priceExIdx>=0){const v=parseFloat(row[priceExIdx]);if(!isNaN(v))return v*vat;}
  if(unitExclIdx>=0){const v=parseFloat(row[unitExclIdx]);if(!isNaN(v))return v*vat;}

  // 8. Fallback: amount / qty / pack * vat
  const amt=parseFloat(row[inv.amountCol]);
  if(!isNaN(amt)&&qty>0&&pack>0){
    // Safety: if the amountCol column name makes clear the value is already incl-VAT,
    // suppress the vatRate multiplier to prevent double-VAT (e.g. "Total Incl VAT").
    const _amtColName=(cols[inv.amountCol]||"").toLowerCase();
    const _amtIsInclVat=/incl\.?\s*vat|total\s*incl|inc\s*vat|amount\s*incl/.test(_amtColName);
    const _effectiveVat=_amtIsInclVat?1.0:vat;
    var basePrice=(amt/qty/pack)*_effectiveVat;
    // If no explicit pack column, check description for NxWEIGHT pack size
    if(inv.packCol===null||inv.packCol===undefined){
      const di=cols.findIndex(function(c){return DESC_KEYS.indexOf(c.toLowerCase())>=0;});
      if(di>=0){
        var N=detectPackSize(String(row[di]||""));
        if(N&&N>1)return basePrice/N;
      }
    }
    return basePrice;
  }
  return null;
}

// ── PRICE TRACKER VALUE ─────────────────────────────────────────────────────
// Returns the canonical incl-VAT unit price used ONLY for price-change tracking
// (buildPriceHistory). NOT used for rec-price display — use calcRec() for that.
//
// Priority (same logic as calcRec but expressed cleanly without rec-price rules):
//   1. Pre-computed buyPlusVat from AI-processed invoice (most accurate)
//   2. Explicit excl-VAT unit-price column × vatRate
//      (e.g. BrandActiv "Unit prc excl Vat", Lim How "Price (Ex)", generic "UCP")
//   3. Supplier-specific quantity adjustments (RR Rapid per-dozen, Innodis CT)
//   4. Fallback: amount ÷ qty ÷ pack × vatRate
// Pack size from product description is divided out at every level via detectPackSize().
// vatRate already stored correctly in Supabase after audit (1.0 = already incl, 1.15 = excl).
function extractPriceTrackerValue(inv,ri,row,supMeta){
  var cols=inv.cols||[];
  var vat=inv.vatRate||1.0;
  var qty=(inv.qtyCol!=null)?(parseFloat(row[inv.qtyCol])||1):1;
  var pack=(inv.packCol!=null)?(parseFloat(row[inv.packCol])||1):1;
  var di=cols.findIndex(function(c){return DESC_KEYS.indexOf(c.toLowerCase())>=0;});

  // Divide by pack size from description (when no explicit packCol)
  function packDivide(unitVal){
    if((inv.packCol===null||inv.packCol===undefined)&&di>=0){
      var N=detectPackSize(String(row[di]||""));
      if(N&&N>1)return unitVal/N;
    }
    return unitVal;
  }

  // 1. Pre-computed buyPlusVat — highest confidence (AI-processed invoice)
  if(inv._precomputed&&inv._precomputed[ri]&&inv._precomputed[ri].buyPlusVat!=null){
    return packDivide(inv._precomputed[ri].buyPlusVat);
  }

  // 2. Explicit excl-VAT unit price column × vatRate
  //    Matches: "Unit Price Excl", "Unit Prc Excl Vat", "Price (Ex)", "UCP", "Unit Disc Prc Excl Vat"
  var exclIdx=cols.findIndex(function(c){
    var cl=c.toLowerCase().trim();
    return /^(unit\s*pric?e?\s*(excl|ex\b|ex\s*vat)|price\s*\(ex\)|ucp|unit\s*prc\s*excl)/.test(cl);
  });
  if(exclIdx>=0){
    // Prefer discounted unit price when it exists
    var discIdx=cols.findIndex(function(c){return/unit\s*disc\s*prc\s*excl|disc.*unit.*prc/.test(c.toLowerCase());});
    var rawV=(discIdx>=0)?parseFloat(row[discIdx]):NaN;
    if(isNaN(rawV)||rawV<=0)rawV=parseFloat(row[exclIdx]);
    if(!isNaN(rawV)&&rawV>0)return packDivide(rawV*vat);
  }

  // 3a. RR Rapid: items sold by the dozen — divide qty by dozen size
  if(supMeta&&supMeta.recPriceRule==="per_unit_dozen"){
    var dozSize=supMeta.dozSize||12;
    var amt3=parseFloat(row[inv.amountCol]);
    if(!isNaN(amt3)&&qty>0)return packDivide((amt3/qty/dozSize)*vat);
    return null;
  }
  // 3b. Innodis: carton (CT) quantities — extract units-per-carton from product name
  if(supMeta&&(supMeta.supplier||"").indexOf("Innodis")>=0){
    var qtyStr=String(row[inv.qtyCol]||"");
    if(qtyStr.toUpperCase().indexOf("CT")>=0){
      var ctQty=parseFloat(qtyStr)||1;
      var pm=String(row[1]||"").match(/[xX]([0-9]+)/);
      var upc=pm?parseInt(pm[1]):1;
      var amt3b=parseFloat(row[inv.amountCol]);
      if(!isNaN(amt3b)&&ctQty*upc>0)return packDivide((amt3b/(ctQty*upc))*vat);
      return null;
    }
  }

  // 4. Fallback: amount ÷ qty ÷ pack × vatRate
  var amt=parseFloat(row[inv.amountCol]);
  if(isNaN(amt)||qty<=0||pack<=0)return null;
  var amtColName=(cols[inv.amountCol]||"").toLowerCase();
  var effectiveVat=/incl\.?\s*vat|total\s*incl|inc\s*vat|amount\s*incl/.test(amtColName)?1.0:vat;
  return packDivide((amt/qty/pack)*effectiveVat);
}

// Converts any date string to YYYY-MM-DD for reliable sorting.
// Handles: "2026-05-25", "25/05/2026", "25/05/2026 10:38", ISO timestamps.
function toISODate(str){
  if(!str)return"";
  var s=String(str).split("T")[0].trim();
  if(/^\d{4}-\d{2}-\d{2}/.test(s))return s.substring(0,10);
  var parts=s.split(" ")[0].split("/");
  if(parts.length===3&&parts[2].length>=4){
    return parts[2].substring(0,4)+"-"+parts[1].padStart(2,"0")+"-"+parts[0].padStart(2,"0");
  }
  return s;
}

// Formats any date string as DD/MM/YYYY for display only.
// Never use for sorting or storage — call toISODate() for those.
function fmtDD(str){
  if(!str)return"";
  var iso=toISODate(str);
  if(!iso||iso.length<10)return str;
  var p=iso.split("-");
  return p[2]+"/"+p[1]+"/"+p[0];
}

// Converts any stored totals value to [[label, amount], ...] pairs.
// Handles: already-correct [[label,val]] arrays, AI object format {exclVat,vat,inclVat,...},
// and legacy single-field objects {net, totalExcl, totalIncl, invoiceTotal, ...}.
// ── UNIVERSAL TOTALS NORMALIZER ─────────────────────────────────────────────
// Converts ANY totals format (array or object) to [[label, value], ...] rows
// for display in the invoice footer.
//
// Design goals:
//  • Array format is returned as-is (already labelled by the AI).
//  • Object format: emit ALL non-zero numeric values in a sensible order using
//    a comprehensive key→label map covering every format seen across suppliers.
//  • Unknown keys (future invoices) are auto-formatted from camelCase → words.
//  • Duplicate labels are suppressed — the first occurrence wins.
//  • Zero values are skipped EXCEPT for explicitly exempted/taxable amounts
//    (where zero is meaningful for display completeness).
//
// Adding support for a new totals key requires only a line in TOTAL_LABELS and
// KEY_ORDER — no other code changes needed.
function normalizeTotals(t){
  if(!t)return[];
  if(Array.isArray(t)){
    return t.filter(function(r){return Array.isArray(r)&&r.length>=2;});
  }
  if(typeof t!=="object")return[];

  // ── Key → display label (covers every supplier variant observed so far) ────
  var TOTAL_LABELS={
    // Exempt / taxable split (VKS, Kool Food, Best Foods…)
    totalExempted:"Total Exempted",totalTaxable:"Total Taxable",
    exempted:"Exempted",taxable:"Taxable",zeroRated:"Zero Rated",
    // Excl-VAT subtotals
    exclVat:"Excl. VAT",exclAmt:"Excl. VAT",totalExcl:"Excl. VAT",
    totalBeforeVat:"Excl. VAT",totalExclVat:"Excl. VAT",
    subtotalExVat:"Subtotal Excl. VAT",subTotal:"Sub Total",
    subTotalInclLineDisc:"Subtotal (after disc.)",
    // Discounts
    discount:"Discount",discountTotal:"Discount",
    // VAT
    vat:"VAT",vatTotal:"VAT",vatAmt:"VAT",vatAmount:"VAT",
    vat15:"VAT 15%",totalVatAmt:"VAT",totalVatAmount:"VAT",
    // Other taxes
    petTax:"PET Tax",
    // Net / after-discount amounts
    net:"Net Total",netTotal:"Net Total",totalNet:"Net Total",
    // Incl-VAT / grand totals
    inclVat:"Total Incl. VAT",totalIncl:"Total Incl. VAT",totalInclVat:"Total Incl. VAT",totalIncVat:"Total Incl. VAT",
    totalPayable:"Total Payable",invoiceTotal:"Total Payable",
    gross:"Gross Total",grossTotal:"Gross Total",grandTotal:"Grand Total",
    total:"Total",
  };

  // ── Preferred display order ─────────────────────────────────────────────────
  var KEY_ORDER=[
    "totalExempted","totalTaxable","exempted","taxable","zeroRated",
    "exclVat","exclAmt","totalExcl","totalBeforeVat","totalExclVat",
    "subtotalExVat","subTotal","subTotalInclLineDisc",
    "discount","discountTotal",
    "vat","vatTotal","vatAmt","vatAmount","vat15","totalVatAmt","totalVatAmount","petTax",
    "net","netTotal","totalNet",
    "inclVat","totalIncl","totalInclVat","totalIncVat","totalPayable","invoiceTotal",
    "gross","grossTotal","grandTotal","total"
  ];

  var used={};
  var seenLabels={};
  var arr=[];

  // Pass 1 — known keys in preferred order
  KEY_ORDER.forEach(function(k){
    if(used[k]||t[k]==null)return;
    used[k]=true;
    var v=Number(t[k]);
    if(isNaN(v))return;
    // Zero is meaningful for exempted/taxable breakdown; skip elsewhere
    var meaningful=(k==="totalExempted"||k==="totalTaxable"||k==="exempted"||k==="taxable"||k==="zeroRated");
    if(v===0&&!meaningful)return;
    var label=TOTAL_LABELS[k];
    if(seenLabels[label])return;
    seenLabels[label]=true;
    arr.push([label,v]);
  });

  // Pass 2 — any remaining keys not listed above (future-proof)
  Object.keys(t).forEach(function(k){
    if(used[k]||t[k]==null)return;
    var v=Number(t[k]);
    if(isNaN(v)||v===0)return;
    var label=TOTAL_LABELS[k]||k.replace(/([A-Z])/g," $1").replace(/^./,function(c){return c.toUpperCase();}).trim();
    if(seenLabels[label])return;
    seenLabels[label]=true;
    arr.push([label,v]);
  });

  return arr;
}

// Returns the grand total value from a normalized invoice (after normalizeInv has run).
// Used by Credit Invoices tab to display the invoice amount.
function getInvGrandTotal(inv){
  var t=normalizeTotals(inv.totals||[]);
  if(t.length>0) return t[t.length-1][1];
  // Fallback: sum the amountCol across rows
  if(inv.rows&&inv.amountCol!=null){
    return inv.rows.reduce(function(a,r){return a+(parseFloat(r[inv.amountCol])||0);},0);
  }
  return 0;
}

function buildPriceHistory(SUPPLIERS){
  // Produces hist[supplierName][productName] = [{date,price,invoiceId}, ...]
  //
  // Key design rules:
  //  • Uses extractPriceTrackerValue() — gives raw incl-VAT unit price from the
  //    invoice itself (pre-computed buyPlusVat → explicit unit-price col → total÷qty×vatRate).
  //    This ensures the SAME metric is compared across invoices for the same supplier,
  //    making price-change detection meaningful.
  //  • Date sorting uses receivedAt → toISODate (handles mixed DD/MM & ISO formats).
  //  • One entry per invoice per product (last row in that invoice wins) to prevent
  //    duplicate lines inflating the history.
  //  • Prices are rounded to 2 dp so floating-point noise never registers as a change.
  //  • Entries are in chronological order (oldest first).
  const hist={};
  Object.keys(SUPPLIERS).forEach(function(sn){
    const sup=SUPPLIERS[sn];
    hist[sn]={};

    // Sort invoices chronologically so entries land in the right order
    var sorted=sup.invoices.slice().sort(function(a,b){
      return toISODate(a.receivedAt||a.date||"").localeCompare(
             toISODate(b.receivedAt||b.date||""));
    });

    sorted.forEach(function(inv){
      var cols=inv.cols||[];
      var di=cols.findIndex(function(c){return DESC_KEYS.indexOf(c.toLowerCase())>=0;});
      if(di<0)return;

      var isoDate=toISODate(inv.receivedAt||inv.date||"");
      var invId=inv.id||isoDate; // stable per-invoice key

      inv.rows.forEach(function(row,ri){
        var name=String(row[di]||"").trim();
        if(!name)return;

        // ── Compute unit incl-VAT price for tracking ─────────────────
        var unitPrice=extractPriceTrackerValue(inv,ri,row,sup.meta);
        if(!unitPrice||isNaN(unitPrice)||unitPrice<=0)return;

        // Round to 2 dp — eliminates floating-point noise from false changes
        var price=Math.round(unitPrice*100)/100;

        if(!hist[sn][name])hist[sn][name]=[];

        // One entry per invoice: if already recorded for this invId, last row wins
        var ei=hist[sn][name].findIndex(function(e){return e.invoiceId===invId;});
        var entry={date:isoDate,price:price,invoiceId:invId};
        if(ei>=0){hist[sn][name][ei]=entry;}
        else{hist[sn][name].push(entry);}
      });
    });
    // Entries are already chronological (invoices were sorted above) —
    // just re-sort each product list to be safe after possible overwrites
    Object.keys(hist[sn]).forEach(function(pn){
      hist[sn][pn].sort(function(a,b){return a.date.localeCompare(b.date);});
    });
  });
  return hist;
}

// Reads/writes to Supabase price_amendments table so "amended" state survives
// page refreshes. Each record is keyed by (supplier_name, product_name, invoice_id).
async function fetchAmendments(){
  try{
    const r=await fetch(SUPABASE_URL+"/rest/v1/price_amendments?select=*",{headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY}});
    if(!r.ok)return{};
    const rows=await r.json();
    const out={};
    rows.forEach(function(row){
      var key=row.supplier_name+"||"+row.product_name+"||"+row.invoice_id;
      out[key]={amended:row.amended,amendedAt:row.amended_at};
    });
    return out;
  }catch(e){return{};}
}
async function upsertAmendment(sn,pn,invoiceId,amended,amendedAt){
  try{

      method:"POST",
      headers:{"apikey":SUPABASE_KEY,"Authorization":"Bearer "+SUPABASE_KEY,"Content-Type":"application/json","Prefer":"resolution=merge-duplicates"},
      body:JSON.stringify({supplier_name:sn,product_name:pn,invoice_id:invoiceId,amended:amended,amended_at:amendedAt||null})
    });
  }catch(e){}
}

function getWeekLabel(){
  // Returns "Week X of MonthName YYYY" for the FOLLOWING week (used on Sundays)
  const now=new Date();
  const nextWeek=new Date(now.getTime()+7*24*60*60*1000);
  const yr=nextWeek.getFullYear();
  const mo=nextWeek.getMonth();
  const months=["January","February","March","April","May","June","July","August","September","October","November","December"];
  const firstDay=new Date(yr,mo,1);
  const dayOfWeek=firstDay.getDay();
  const offset=(dayOfWeek===0)?0:(7-dayOfWeek);
  const firstMonday=new Date(yr,mo,1+offset);
  const weekNum=Math.ceil((nextWeek.getDate()-offset)/7);
  return "Week "+weekNum+" of "+months[mo]+" "+yr;
}
function getLatestUnitPrice(SUPPLIERS,supName,prodName){
  const sup=SUPPLIERS[supName];
  if(!sup)return null;
  // find the most recent invoice row matching this product
  const di_cache={};
  let latest=null;
  sup.invoices.forEach(function(inv){
    const cols=inv.cols||[];
    const di=cols.findIndex(function(c){return DESC_KEYS.indexOf(c.toLowerCase())>=0;});
    if(di<0)return;
    inv.rows.forEach(function(row){
      const nm=String(row[di]||"").trim();
      if(nm!==prodName)return;
      const amt=parseFloat(row[inv.amountCol]);
      const qty=(inv.qtyCol!==null&&inv.qtyCol!==undefined)?(parseFloat(row[inv.qtyCol])||1):1;
      const pack=(inv.packCol!==null&&inv.packCol!==undefined)?(parseFloat(row[inv.packCol])||1):1;
      const unitPrice=(!isNaN(amt)&&qty>0&&pack>0)?(amt/qty/pack):null;
      if(unitPrice!==null){
        if(!latest||toISODate(inv.date)>toISODate(latest.date)){
          latest={price:unitPrice,date:inv.date,total:amt,qty:qty};
        }
      }
    });
  });
  return latest;
}
function getSupProducts(sup){
  const prods=[];
  sup.invoices.forEach(function(inv){
    const di=(inv.cols||[]).findIndex(function(c){return DESC_KEYS.indexOf(c.toLowerCase())>=0;});
    if(di<0)return;
    inv.rows.forEach(function(row){
      const nm=String(row[di]||"").trim();
      if(nm&&prods.indexOf(nm)<0)prods.push(nm);
    });
  });
  return prods;
}
