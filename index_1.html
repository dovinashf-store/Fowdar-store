    setPayments(ls.payments||{});setInventory(ls.inventory||{});
    fetchSupabase().then(function(rows){
      if(rows)setSuppliers(buildSuppliers(rows));
      fetchStore().then(function(stored){
        if(stored){
          const ce=stored.cellEdits||ls.cellEdits||{};
          const rr=stored.removedRows||ls.removedRows||{};
          const pay=stored.payments||ls.payments||{};
          const inv=stored.inventory||ls.inventory||{};
          const ord=stored.orders||ls.orders||[];
          const cord=stored.custOrders||ls.custOrders||[];
          setCellEdits(ce);setRemovedRows(rr);setPayments(pay);setInventory(inv);
          setOrders(ord);setCustOrders(cord);
          saveLS(ce,rr,pay,inv,ord,cord);
        }
        setLoading(false);
      });
    });
  },[]);

  function showToast(msg){setToast(msg);setTimeout(function(){setToast(null);},2000);}

  function refreshData(){
    setRefreshing(true);
    fetchSupabase().then(function(rows){
      if(rows)setSuppliers(buildSuppliers(rows));
      fetchStore().then(function(stored){
        if(stored){
          const ls=loadLS();
          const ce=stored.cellEdits||ls.cellEdits||{};
          const rr=stored.removedRows||ls.removedRows||{};
          const pay=stored.payments||ls.payments||{};
          const inv=stored.inventory||ls.inventory||{};
          setCellEdits(ce);setRemovedRows(rr);setPayments(pay);setInventory(inv);
          saveLS(ce,rr,pay,inv);
        }
        setRefreshing(false);showToast("Refreshed");
      });
    });
  }

  function onTouchStart(e){if(window.scrollY===0)setTouchStartY(e.touches[0].clientY);}
  function onTouchMove(e){
    if(touchStartY===0)return;
    const dy=e.touches[0].clientY-touchStartY;
    if(dy>0&&window.scrollY===0){setPulling(true);setPullY(Math.min(dy*0.4,70));}
  }
  function onTouchEnd(){if(pullY>50)refreshData();setPulling(false);setPullY(0);setTouchStartY(0);}

  function persist(ce,rr,pay,inv,ord,cord){saveLS(ce,rr,pay,inv,ord,cord);pushStore(ce,rr,pay,inv,ord,cord);}
  function setCE(key,val){const nce=Object.assign({},cellEdits);nce[key]=val;setCellEdits(nce);persist(nce,removedRows,payments,inventory,orders,custOrders);}
  function doRemoveRow(invKey,ri){const nrr=Object.assign({},removedRows);if(!nrr[invKey])nrr[invKey]={};nrr[invKey][ri]=true;setRemovedRows(nrr);persist(cellEdits,nrr,payments,inventory,orders,custOrders);}
  function setPayVal(key,val){const np=Object.assign({},payments);np[key]=val;setPayments(np);persist(cellEdits,removedRows,np,inventory,orders,custOrders);}
  function setInvVal(key,val){const ni=Object.assign({},inventory);ni[key]=val;setInventory(ni);persist(cellEdits,removedRows,payments,ni,orders,custOrders);}

  function goMenu(){setScreen("menu");setSubScreen(null);setTab(null);setSearch("");setEditMode(false);}

  const supNames=Object.keys(SUPPLIERS);

  const allDays=React.useMemo(function(){
    const ds={};
    supNames.forEach(function(sn){
      (SUPPLIERS[sn].invoices||[]).forEach(function(inv){
        const d=inv.receivedAt?inv.receivedAt.split("T")[0]:null;
        if(d)ds[d]=true;
      });
    });
    return Object.keys(ds).sort(function(a,b){return b.localeCompare(a);});
  },[SUPPLIERS]);

  React.useEffect(function(){if(allDays.length>0&&!dayFilter)setDayFilter(allDays[0]);},[allDays]);

  function getDayLabel(d){
    const p=d.split("-");
    const m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    return p[2]+" "+m[parseInt(p[1],10)-1];
  }
  function getSupsForDay(day){
    const result=[];
    supNames.forEach(function(sn){
      const matched=(SUPPLIERS[sn].invoices||[]).filter(function(inv){return(inv.receivedAt?inv.receivedAt.split("T")[0]:null)===day;});
      if(matched.length>0)result.push({name:sn,total:matched.reduce(function(a,i){return a+i.total;},0),latest:matched[0].receivedAt||""});
    });
    result.sort(function(a,b){
      if(sortMode==="az")return a.name.localeCompare(b.name);
      if(sortMode==="za")return b.name.localeCompare(a.name);
      if(sortMode==="high")return b.total-a.total;
      if(sortMode==="low")return a.total-b.total;
      return b.latest.localeCompare(a.latest);
    });
    return result;
  }

  const priceHistory=React.useMemo(function(){return buildPriceHistory(SUPPLIERS);},[SUPPLIERS]);

  const ISt={background:C.surf,border:"1px solid "+C.bdr,borderRadius:8,padding:"9px 12px",color:C.text,fontSize:13,width:"100%",outline:"none",boxSizing:"border-box",marginBottom:12};
  const SC={background:C.surf2,borderRadius:10,padding:"10px 12px",flex:1,border:"1px solid "+C.bdr,minWidth:0};
  const CISt={background:C.surf2,border:"1px solid "+C.bdr,borderRadius:4,padding:"4px 6px",color:C.text,fontSize:11,width:"100%",minWidth:50,outline:"none",boxSizing:"border-box"};

  // BACK BAR component
  function BackBar(props){
    return(
      <div style={{background:C.surf,borderBottom:"1px solid "+C.bdr,paddingTop:"max(10px,env(safe-area-inset-top))",paddingBottom:"10px",paddingLeft:"12px",paddingRight:"12px",position:"sticky",top:0,zIndex:200}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={props.onBack}
            style={{background:props.accent?C.accent:C.surf2,border:props.accent?"none":"1px solid "+C.bdr,borderRadius:10,padding:"10px 16px",color:props.accent?"#000":C.accent,fontWeight:800,fontSize:14,cursor:"pointer",flexShrink:0}}>
            {"< "+(props.backLabel||"Back")}
          </button>
          {props.title&&<div style={{fontWeight:800,fontSize:15,flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",color:C.text}}>{props.title}</div>}
          {props.right&&props.right}
        </div>
      </div>
    );
  }

  // SORT PILLS component
  function SortPills(props){
    return(
      <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:12,paddingBottom:2}}>
        {props.options.map(function(o){
          const active=props.value===o[0];
          return(
            <button key={o[0]} onClick={function(){props.onChange(o[0]);}}
              style={{padding:"5px 12px",borderRadius:20,fontSize:11,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",flexShrink:0,
                background:active?props.color||C.blue:C.surf2,color:active?"#000":C.muted,
                border:"1px solid "+(active?props.color||C.blue:C.bdr)}}>
              {o[1]}
            </button>
          );
        })}
      </div>
    );
  }

  // ── SUPPLIER INVOICE DETAIL ──────────────────────────────────────
  if(screen==="supplier"&&tab){
    const sup=SUPPLIERS[tab];
    if(!sup)return <div style={{background:C.bg,padding:20,color:C.text,fontFamily:"-apple-system,sans-serif"}}><BackBar onBack={goMenu} title="Not found" accent/></div>;
    const spend=sup.invoices.reduce(function(a,i){return a+i.total;},0);
    const items=sup.invoices.reduce(function(a,i){return a+i.rows.length;},0);
    const lq=search.toLowerCase();
    const groups={};
    sup.invoices.forEach(function(inv){
      if(search&&!inv.rows.some(function(r){return r.some(function(c){return String(c).toLowerCase().includes(lq);});}))return;
      const d=inv.date?inv.date.split(" ")[0]:"Unknown";
      if(!groups[d])groups[d]=[];groups[d].push(inv);
    });
    const groupDates=Object.keys(groups).sort(function(a,b){return b.localeCompare(a);});
    const fromScreen=subScreen||"invoices";
    return(
      <div style={{background:C.bg,minHeight:"100%",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",color:C.text,paddingBottom:40}}>
        <BackBar accent onBack={function(){setScreen(fromScreen);setSubScreen(null);setTab(null);setSearch("");setEditMode(false);}} backLabel={fromScreen==="catalogue"?"Catalogue":fromScreen==="inventory"?"Inventory":"Invoices"} title={tab}/>
        <div style={{background:C.surf,borderBottom:"1px solid "+C.bdr,padding:"8px 12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div style={{fontSize:11,color:C.muted}}>{sup.meta.supplier}</div>
          <div style={{fontSize:12,color:C.accent,fontFamily:"monospace",fontWeight:800}}>MUR {fmt(spend)}</div>
        </div>
        <div style={{padding:"12px 10px"}}>
          <div style={{display:"flex",gap:8,marginBottom:12}}>
            {[["Invoices",sup.invoices.length],["Items",items],["Total","MUR "+fmt(spend)]].map(function(p){
              return(<div key={p[0]} style={SC}><div style={{fontSize:9,color:C.muted,textTransform:"uppercase",marginBottom:2}}>{p[0]}</div><div style={{fontSize:12,fontWeight:800,color:C.accent,fontFamily:"monospace",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p[1]}</div></div>);
            })}
          </div>
          <div style={{display:"flex",gap:8,marginBottom:14,alignItems:"center"}}>
            <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Search products..." style={Object.assign({},ISt,{marginBottom:0,flex:1})}/>
            <button onClick={function(){setEditMode(function(v){return !v;});}}
              style={{padding:"9px 14px",borderRadius:8,fontWeight:700,fontSize:12,cursor:"pointer",flexShrink:0,background:editMode?C.accent:C.surf2,color:editMode?"#000":C.muted,border:"1px solid "+(editMode?C.accent:C.bdr)}}>
              {editMode?"Done":"Edit"}
            </button>
          </div>
          {groupDates.length===0?(<div style={{color:C.muted,textAlign:"center",padding:30}}>No results</div>):groupDates.map(function(dateKey){
            return(<div key={dateKey}>
              <div style={{fontSize:11,color:C.muted,fontWeight:700,marginBottom:6,marginTop:10,paddingLeft:2}}>{dateKey}</div>
              {groups[dateKey].map(function(inv){
                const invKey=tab+"||"+inv.id;const removed=removedRows[invKey]||{};
                return(
                  <div key={inv.id} style={{background:C.surf,borderRadius:12,marginBottom:14,border:"1px solid "+C.bdr,overflow:"hidden"}}>
                    <div style={{background:C.surf2,padding:"8px 12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                      <div style={{fontSize:11,color:C.accent,fontWeight:700}}>{inv.id}</div>
                      <div style={{fontSize:11,color:C.muted,fontFamily:"monospace"}}>MUR {fmt(inv.total)}</div>
                    </div>
                    <div style={{overflowX:"auto"}}>
                      <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                        <thead><tr style={{background:C.surf2}}>
                          {(inv.cols||[]).map(function(col,ci){return <th key={ci} style={{padding:"6px 8px",textAlign:"left",color:C.muted,fontWeight:600,whiteSpace:"nowrap",borderBottom:"1px solid "+C.bdr}}>{col}</th>;})}
                          <th style={{padding:"6px 8px",textAlign:"right",color:C.rec,fontWeight:700,whiteSpace:"nowrap",borderBottom:"1px solid "+C.bdr}}>Buy+VAT</th>
                          <th style={{padding:"6px 8px",textAlign:"right",color:C.warn,fontWeight:700,whiteSpace:"nowrap",borderBottom:"1px solid "+C.bdr}}>Rec Price</th>
                          <th style={{padding:"6px 8px",textAlign:"right",color:C.accent,fontWeight:700,whiteSpace:"nowrap",borderBottom:"1px solid "+C.bdr}}>Selling</th>
                          <th style={{padding:"6px 8px",textAlign:"left",color:C.muted,fontWeight:600,whiteSpace:"nowrap",borderBottom:"1px solid "+C.bdr}}>Notes</th>
                          {editMode&&<th style={{padding:"6px 8px",borderBottom:"1px solid "+C.bdr}}></th>}
                        </tr></thead>
                        <tbody>
                          {inv.rows.map(function(row,ri){
                            if(removed[ri])return null;
                            const rec=calcRec(inv,ri,row,sup.meta);const rec20=rec!==null?rec*1.2:null;
                            const spKey=invKey+"||"+ri+"||sp";const ntKey=invKey+"||"+ri+"||nt";
                            const spVal=cellEdits[spKey]!==undefined?cellEdits[spKey]:(rec20!==null?fmt(rec20):"");
                            const ntVal=cellEdits[ntKey]!==undefined?cellEdits[ntKey]:"";
                            return(
                              <tr key={ri} style={{borderBottom:"1px solid "+C.bdr,background:ri%2===0?"transparent":"rgba(255,255,255,0.02)"}}>
                                {row.map(function(cell,ci){
                                  const ck=invKey+"||"+ri+"||"+ci;
                                  const val=cellEdits[ck]!==undefined?cellEdits[ck]:String(cell);
                                  return(<td key={ci} style={{padding:"6px 8px",color:C.text,whiteSpace:ci===0?"nowrap":"normal"}}>{editMode?(<input value={val} onChange={function(e){setCE(ck,e.target.value);}} style={CISt}/>):(<span>{val}</span>)}</td>);
                                })}
                                <td style={{padding:"6px 8px",textAlign:"right",color:C.rec,fontWeight:700,whiteSpace:"nowrap"}}>{rec!==null?fmt(rec):"-"}</td>
                                <td style={{padding:"6px 8px",textAlign:"right",color:C.warn,whiteSpace:"nowrap"}}>{rec20!==null?fmt(rec20):"-"}</td>
                                <td style={{padding:"6px 8px",whiteSpace:"nowrap"}}><input value={spVal} onChange={function(e){setCE(spKey,e.target.value);}} style={Object.assign({},CISt,{color:C.accent,width:72,textAlign:"right"})}/></td>
                                <td style={{padding:"6px 8px"}}><input value={ntVal} onChange={function(e){setCE(ntKey,e.target.value);}} style={Object.assign({},CISt,{color:C.muted,width:90})}/></td>
                                {editMode&&(<td style={{padding:"6px 8px"}}><button onClick={function(){doRemoveRow(invKey,ri);}} style={{background:C.danger,border:"none",borderRadius:4,padding:"3px 8px",color:"#fff",fontSize:10,cursor:"pointer"}}>Del</button></td>)}
                              </tr>
                            );
                          })}
                        </tbody>
                        {(inv.totals||[]).length>0&&(<tfoot>{inv.totals.map(function(t,ti){return(<tr key={ti} style={{background:C.surf2}}><td colSpan={(inv.cols||[]).length+3} style={{padding:"5px 8px",textAlign:"right",color:C.muted,fontSize:11}}>{t[0]}</td><td style={{padding:"5px 8px",textAlign:"right",color:C.accent,fontWeight:800,fontSize:12,fontFamily:"monospace",whiteSpace:"nowrap"}}>MUR {fmt(t[1])}</td>{editMode&&<td></td>}</tr>);})}</tfoot>)}
                      </table>
                    </div>
                  </div>
                );
              })}
            </div>);
          })}
        </div>
      </div>
    );
  }

  // ── CATALOGUE: SUPPLIER PRODUCTS DRILL-DOWN ──────────────────────
  if(screen==="catalogue"&&subScreen==="cat-supplier"&&tab){
    const sup=SUPPLIERS[tab];
    if(!sup)return null;
    const lq=search.toLowerCase();
    let prods=getSupProducts(sup);
    if(lq)prods=prods.filter(function(p){return p.toLowerCase().includes(lq);});
    if(catSort==="az")prods=prods.slice().sort(function(a,b){return a.localeCompare(b);});
    else if(catSort==="za")prods=prods.slice().sort(function(a,b){return b.localeCompare(a);});
    return(
      <div style={{background:C.bg,minHeight:"100%",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",color:C.text,paddingBottom:40}}>
        <BackBar accent onBack={function(){setSubScreen(null);setTab(null);setSearch("");}} backLabel="Catalogue" title={tab}/>
        <div style={{padding:"12px 10px"}}>
          <div style={{display:"flex",gap:8,marginBottom:12,alignItems:"center"}}>
            <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Search products..." style={Object.assign({},ISt,{marginBottom:0,flex:1})}/>
            <div style={{fontSize:11,color:C.muted,flexShrink:0,fontWeight:700}}>{prods.length} items</div>
          </div>
          <SortPills value={catSort} onChange={setCatSort} color={C.warn} options={[["az","A-Z"],["za","Z-A"],["default","Invoice Order"]]}/>
          <div style={{background:C.surf,borderRadius:12,border:"1px solid "+C.bdr,overflow:"hidden"}}>
            {prods.length===0?(<div style={{padding:30,textAlign:"center",color:C.muted}}>No products found</div>):
            prods.map(function(p,pi){
              return(<div key={pi} style={{padding:"12px 14px",borderBottom:pi<prods.length-1?"1px solid "+C.bdr:"none",display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:28,height:28,borderRadius:8,background:C.surf2,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:11,color:C.muted,fontWeight:700}}>{pi+1}</div>
                <div style={{fontSize:13,color:C.text,flex:1}}>{p}</div>
              </div>);
            })}
          </div>
        </div>
      </div>
    );
  }

  // ── INVENTORY: SUPPLIER PRODUCTS DRILL-DOWN ──────────────────────
  if(screen==="inventory"&&subScreen==="inv-supplier"&&tab){
    const sup=SUPPLIERS[tab];
    if(!sup)return null;
    const lq=search.toLowerCase();
    const prods=getSupProducts(sup);
    const filtered=lq?prods.filter(function(p){return p.toLowerCase().includes(lq);}):prods;

    return(
      <div style={{background:C.bg,minHeight:"100%",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",color:C.text,paddingBottom:80}}>
        <BackBar accent onBack={function(){setSubScreen(null);setTab(null);setSearch("");}} backLabel="Inventory" title={tab}/>
        <div style={{padding:"12px 10px"}}>
          <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Search products..." style={ISt}/>
          {filtered.length===0?(<div style={{color:C.muted,textAlign:"center",padding:30}}>No products found</div>):
          filtered.map(function(p,pi){
            const stockKey=tab+"||"+p+"||stock";
            const reorderKey=tab+"||"+p+"||reorder";
            const stockVal=inventory[stockKey]!==undefined?inventory[stockKey]:"";
            const reorderVal=inventory[reorderKey]!==undefined?inventory[reorderKey]:"";
            const stock=parseFloat(stockVal);
            const reorder=parseFloat(reorderVal);
            const hasStock=!isNaN(stock);
            const hasReorder=!isNaN(reorder);
            const isLow=hasStock&&hasReorder&&stock<=reorder;
            const isOut=hasStock&&stock===0;
            const statusColor=isOut?C.danger:(isLow?C.warn:C.accent);
            const statusLabel=isOut?"OUT":(isLow?"LOW":"OK");
            return(
              <div key={pi} style={{background:C.surf,borderRadius:12,marginBottom:10,border:"1px solid "+(isLow||isOut?statusColor:C.bdr),overflow:"hidden"}}>
                <div style={{padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid "+C.bdr}}>
                  <div style={{flex:1,minWidth:0,marginRight:8}}>
                    <div style={{fontSize:13,fontWeight:700,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p}</div>
                    <div style={{fontSize:10,color:C.muted,marginTop:2}}>{tab}</div>
                  </div>
                  {hasStock&&(
                    <div style={{background:statusColor,borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:800,color:"#000",flexShrink:0}}>
                      {statusLabel}
                    </div>
                  )}
                </div>
                <div style={{padding:"10px 14px",display:"flex",gap:10}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:10,color:C.muted,marginBottom:4,fontWeight:600,textTransform:"uppercase"}}>Current Stock</div>
                    <input value={stockVal} onChange={function(e){setInvVal(stockKey,e.target.value);}}
                      placeholder="0"
                      style={{background:C.surf2,border:"1px solid "+(isOut?C.danger:isLow?C.warn:C.bdr),borderRadius:8,padding:"8px 12px",color:isOut?C.danger:isLow?C.warn:C.text,fontSize:16,fontWeight:800,width:"100%",outline:"none",textAlign:"center",boxSizing:"border-box"}}/>
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:10,color:C.muted,marginBottom:4,fontWeight:600,textTransform:"uppercase"}}>Reorder At</div>
                    <input value={reorderVal} onChange={function(e){setInvVal(reorderKey,e.target.value);}}
                      placeholder="Min"
                      style={{background:C.surf2,border:"1px solid "+C.bdr,borderRadius:8,padding:"8px 12px",color:C.muted,fontSize:16,fontWeight:800,width:"100%",outline:"none",textAlign:"center",boxSizing:"border-box"}}/>
                  </div>
                </div>
                {isLow&&!isOut&&(
                  <div style={{padding:"6px 14px 10px",display:"flex",alignItems:"center",gap:6}}>
                    <div style={{width:6,height:6,borderRadius:"50%",background:C.warn,flexShrink:0}}></div>
                    <div style={{fontSize:11,color:C.warn,fontWeight:600}}>Reorder needed — only {stockVal} units remaining</div>
                  </div>
                )}
                {isOut&&(
                  <div style={{padding:"6px 14px 10px",display:"flex",alignItems:"center",gap:6}}>
                    <div style={{width:6,height:6,borderRadius:"50%",background:C.danger,flexShrink:0}}></div>
                    <div style={{fontSize:11,color:C.danger,fontWeight:600}}>Out of stock — add to reorder list</div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ── PRICE TRACKER ────────────────────────────────────────────────
  if(screen==="prices"){
    const lq=search.toLowerCase();
    const flagged=[];
    Object.keys(priceHistory).forEach(function(sn){
      Object.keys(priceHistory[sn]).forEach(function(pn){
        const hist=priceHistory[sn][pn];
        if(hist.length<2)return;
        const first=hist[0];const last=hist[hist.length-1];
        const changed=Math.abs(last.price-first.price)>0.001;
        if(priceFilter==="changed"&&!changed)return;
        if(lq&&!pn.toLowerCase().includes(lq)&&!sn.toLowerCase().includes(lq))return;
        const pct=((last.price-first.price)/first.price)*100;
        flagged.push({sn:sn,pn:pn,hist:hist,first:first,last:last,pct:pct,changed:changed});
      });
    });
    flagged.sort(function(a,b){if(a.changed&&!b.changed)return -1;if(!a.changed&&b.changed)return 1;return Math.abs(b.pct)-Math.abs(a.pct);});
    const changedCount=flagged.filter(function(f){return f.changed;}).length;
    return(
      <div style={{background:C.bg,minHeight:"100%",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",color:C.text,paddingBottom:40}}>
        <BackBar onBack={goMenu} backLabel="Menu" title="Price Tracker"/>
        <div style={{padding:"12px 10px"}}>
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            <div style={Object.assign({},SC,{borderColor:changedCount>0?C.warn:C.bdr})}>
              <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",marginBottom:2}}>Changes</div>
              <div style={{fontSize:18,fontWeight:800,color:changedCount>0?C.warn:C.muted}}>{changedCount}</div>
            </div>
            <div style={SC}>
              <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",marginBottom:2}}>Tracked</div>
              <div style={{fontSize:18,fontWeight:800,color:C.text}}>{Object.keys(priceHistory).reduce(function(a,sn){return a+Object.keys(priceHistory[sn]).length;},0)}</div>
            </div>
          </div>
          <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Search products or suppliers..." style={ISt}/>
          <SortPills value={priceFilter} onChange={setPriceFilter} color={C.warn} options={[["changed","Changes Only"],["all","All Products"]]}/>
          {flagged.length===0?(<div style={{color:C.muted,textAlign:"center",padding:40}}>{priceFilter==="changed"?"No price changes detected yet":"No products found"}</div>):
          flagged.map(function(f,fi){
            const up=f.pct>0;const flagColor=f.changed?(up?C.danger:C.accent):C.muted;
            return(
              <div key={fi} style={{background:C.surf,borderRadius:12,marginBottom:10,border:"1px solid "+(f.changed?(up?C.danger:C.accent):C.bdr),overflow:"hidden"}}>
                <div style={{padding:"10px 12px"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                    <div style={{flex:1,minWidth:0,marginRight:8}}>
                      <div style={{fontWeight:700,fontSize:13,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{f.pn}</div>
                      <div style={{fontSize:11,color:C.muted}}>{f.sn}</div>
                    </div>
                    {f.changed&&(<div style={{textAlign:"right",flexShrink:0}}>
                      <div style={{fontSize:16,fontWeight:800,color:flagColor}}>{up?"▲":"▼"} {Math.abs(f.pct).toFixed(1)}%</div>
                      <div style={{fontSize:10,color:flagColor}}>{up?"Price Up":"Price Down"}</div>
                    </div>)}
                  </div>
                  <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:4}}>
                    {f.hist.map(function(h,hi){
                      const isLast=hi===f.hist.length-1;
                      const prev=hi>0?f.hist[hi-1].price:null;
                      const wentUp=prev!==null&&h.price>prev+0.001;
                      const wentDown=prev!==null&&h.price<prev-0.001;
                      const dotColor=hi===0?C.muted:(wentUp?C.danger:(wentDown?C.accent:C.muted));
                      return(<div key={hi} style={{flexShrink:0,textAlign:"center",minWidth:60}}>
                        <div style={{fontSize:9,color:C.muted,marginBottom:2}}>{h.date.split(" ")[0]}</div>
                        <div style={{fontSize:12,fontWeight:isLast?800:400,color:isLast?C.text:C.muted,fontFamily:"monospace"}}>{fmt(h.price)}</div>
                        <div style={{width:8,height:8,borderRadius:"50%",background:dotColor,margin:"4px auto 0"}}></div>
                      </div>);
                    })}
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",marginTop:8,paddingTop:8,borderTop:"1px solid "+C.bdr}}>
                    <div style={{fontSize:11,color:C.muted}}>First: <span style={{color:C.text,fontFamily:"monospace"}}>{fmt(f.first.price)}</span><span style={{color:C.muted}}> {f.first.date.split(" ")[0]}</span></div>
                    <div style={{fontSize:11,color:C.muted}}>Latest: <span style={{color:flagColor,fontFamily:"monospace",fontWeight:700}}>{fmt(f.last.price)}</span><span style={{color:C.muted}}> {f.last.date.split(" ")[0]}</span></div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ── SHARED VARS FOR SECTION SCREENS ─────────────────────────────
  const totalAll=supNames.reduce(function(a,sn){return a+SUPPLIERS[sn].invoices.reduce(function(b,i){return b+i.total;},0);},0);
  const lq=search.toLowerCase();
  const daySuppliers=dayFilter?getSupsForDay(dayFilter):[];
  const dayTotal=daySuppliers.reduce(function(a,s){return a+s.total;},0);
  const filteredDaySups=daySuppliers.filter(function(s){
    if(!search)return true;
    if(s.name.toLowerCase().includes(lq))return true;
    const sup=SUPPLIERS[s.name];
    if(sup&&sup.meta&&sup.meta.supplier&&sup.meta.supplier.toLowerCase().includes(lq))return true;
    return sup&&sup.invoices&&sup.invoices.some(function(inv){return inv.rows&&inv.rows.some(function(r){return r.some(function(c){return String(c).toLowerCase().includes(lq);});});});
  });

  // ── INVENTORY MAIN LIST ──────────────────────────────────────────
  if(screen==="inventory"){
    // count low/out per supplier
    const supStats=supNames.map(function(sn){
      const prods=getSupProducts(SUPPLIERS[sn]);
      let low=0,out=0,tracked=0;
      prods.forEach(function(p){
        const stockKey=sn+"||"+p+"||stock";
        const reorderKey=sn+"||"+p+"||reorder";
        const stock=parseFloat(inventory[stockKey]);
        const reorder=parseFloat(inventory[reorderKey]);
        if(!isNaN(stock)){tracked++;if(stock===0)out++;else if(!isNaN(reorder)&&stock<=reorder)low++;}
      });
      return{name:sn,prods:prods.length,tracked:tracked,low:low,out:out};
    });
    // overall counts
    const totalLow=supStats.reduce(function(a,s){return a+s.low;},0);
    const totalOut=supStats.reduce(function(a,s){return a+s.out;},0);
    const filteredStats=supStats.filter(function(s){
      if(invFilter==="low")return s.low>0||s.out>0;
      if(search)return s.name.toLowerCase().includes(lq);
      return true;
    });
    return(
      <div style={{background:C.bg,minHeight:"100%",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",color:C.text,paddingBottom:40}}>
        <BackBar onBack={goMenu} backLabel="Menu" title="Inventory"/>
        <div style={{padding:"12px 10px"}}>
          {/* SUMMARY ROW */}
          <div style={{display:"flex",gap:8,marginBottom:14}}>
            <div style={Object.assign({},SC,{borderColor:totalOut>0?C.danger:C.bdr})}>
              <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",marginBottom:2}}>Out of Stock</div>
              <div style={{fontSize:20,fontWeight:800,color:totalOut>0?C.danger:C.muted}}>{totalOut}</div>
            </div>
            <div style={Object.assign({},SC,{borderColor:totalLow>0?C.warn:C.bdr})}>
              <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",marginBottom:2}}>Low Stock</div>
              <div style={{fontSize:20,fontWeight:800,color:totalLow>0?C.warn:C.muted}}>{totalLow}</div>
            </div>
            <div style={SC}>
              <div style={{fontSize:9,color:C.muted,textTransform:"uppercase",marginBottom:2}}>Suppliers</div>
              <div style={{fontSize:20,fontWeight:800,color:C.text}}>{supNames.length}</div>
            </div>
          </div>
          <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Search suppliers..." style={ISt}/>
          <SortPills value={invFilter} onChange={setInvFilter} color={C.warn} options={[["all","All Suppliers"],["low","Needs Reorder"]]}/>
          {filteredStats.length===0?(<div style={{color:C.muted,textAlign:"center",padding:30}}>No suppliers found</div>):
          filteredStats.map(function(s){
            const hasAlert=s.low>0||s.out>0;
            const sup=SUPPLIERS[s.name];
            return(
              <div key={s.name} onClick={function(){setTab(s.name);setSubScreen("inv-supplier");setSearch("");}}
                style={{background:C.surf,borderRadius:12,marginBottom:10,border:"1px solid "+(s.out>0?C.danger:s.low>0?C.warn:C.bdr),cursor:"pointer",overflow:"hidden"}}>
                <div style={{padding:"12px 14px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</div>
                    <div style={{fontSize:11,color:C.muted,marginTop:2}}>{sup.meta.supplier}</div>
                    <div style={{display:"flex",gap:8,marginTop:6}}>
                      <span style={{fontSize:10,color:C.muted}}>{s.prods} products</span>
                      {s.tracked>0&&<span style={{fontSize:10,color:C.muted}}>{s.tracked} tracked</span>}
                    </div>
                  </div>
                  <div style={{flexShrink:0,marginLeft:10,textAlign:"right"}}>
                    {s.out>0&&(<div style={{background:C.danger,borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:800,color:"#fff",marginBottom:4}}>{s.out} OUT</div>)}
                    {s.low>0&&(<div style={{background:C.warn,borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:800,color:"#000"}}>{s.low} LOW</div>)}
                    {!hasAlert&&s.tracked>0&&(<div style={{background:"rgba(0,229,160,0.15)",borderRadius:8,padding:"3px 10px",fontSize:11,fontWeight:800,color:C.accent}}>OK</div>)}
                    {s.tracked===0&&(<div style={{fontSize:11,color:C.muted}}>Not set</div>)}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ── ORDER MODULE ─────────────────────────────────────────────────
  if(screen==="order"){
    const weekLabel=getWeekLabel();

    // ── Helpers ───────────────────────────────────────────────────
    function daysSince(isoDate){
      if(!isoDate)return null;
      return Math.floor((new Date()-new Date(isoDate))/(1000*60*60*24));
    }
    function relDay(isoDate){
      var n=daysSince(isoDate);
      if(n===null)return"—";
      if(n===0)return"today";
      if(n===1)return"yesterday";
      if(n<7)return n+"d ago";
      if(n<30)return Math.floor(n/7)+"w ago";
      return Math.floor(n/30)+"mo ago";
    }

    // ── UI primitives ─────────────────────────────────────────────
    function StatusChip({status}){
      var labels={draft:"Draft",pending:"Sent",confirmed:"Confirmed",delivered:"Delivered",cancelled:"Cancelled"};
      return <span className={"status "+status}><span className="dot"></span>{labels[status]||status}</span>;
    }
    function QtyStepper({value,onChange}){
      var inCart=value>0;
      return(
        <div className={"qty"+(inCart?" in-cart":" empty")}>
          <button onClick={function(){onChange(Math.max(0,value-1));}} disabled={value<=0}>
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M3 8h10"/></svg>
          </button>
          <div className="value">{value||0}</div>
          <button onClick={function(){onChange(Math.min(99,value+1));}}>
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M8 3v10M3 8h10"/></svg>
          </button>
        </div>
      );
    }

    // ── Data builders ─────────────────────────────────────────────
    function buildOrderSuppliers(){
      const glyphMap={"Phoenix":"🍺","Beverages":"🧃","Food":"🥫","Kool":"❄️","Innodis":"🥩","Panagora":"🥫","VKS":"🐟","Quality":"🧃","Grays":"🥃","New Goodwill":"🥃","Lim How":"🍬","BrandActiv":"🛒","Tea Blenders":"🍰","Cernol":"🧴","Eagle":"🌶️","Ashfaaq":"🌾","Agiliss":"🐟","Inicia":"🥚","Edendale":"🧊","Tash":"🍝","LCF":"🏪","FSS":"📦","Dywada":"🍱","Scott":"🧴","Megatrixe":"🛁","Li Wan Po":"🍭","Cheekips":"🍿","RR Rapid":"🕯️","Afara":"🥩","VL Marketing":"📦","RPM":"📦","Eau-Val":"💧","Faucon":"🐓","Ashok":"📱","Mayil":"🌶️","Bedford":"🍺","Madhvi":"🍿","Cadi Fortune":"🍬","Gujadhur":"🧈","Pillay":"❄️","MOROIL":"🫙","IFS":"🥫","Flemingo":"📦","LVM":"🍟"};
      return supNames.map(function(sn){
        const sup=SUPPLIERS[sn];
        const prods=getSupProducts(sup);
        const lastInv=sup.invoices&&sup.invoices.length>0?sup.invoices[0]:null;
        var glyph="🏪";
        Object.keys(glyphMap).forEach(function(k){if(sn.indexOf(k)>=0)glyph=glyphMap[k];});
        return{id:sn,name:sn,fullName:sup.meta.supplier||sn,glyph:glyph,items:prods.length,last_order:lastInv?lastInv.date:"",category:sup.meta.payment||"General Supplier",lead_time:"Next-day"};
      });
    }
    function buildOrderProducts(sn){
      const sup=SUPPLIERS[sn];if(!sup)return[];
      return getSupProducts(sup).map(function(pname,pi){
        const latest=getLatestUnitPrice(SUPPLIERS,sn,pname);
        return{id:sn+"_prod_"+pi,name:pname,price:latest?latest.price:0,unit:"unit",last_ordered:latest?latest.date:"",popular:false};
      });
    }

    const orderSuppliers=buildOrderSuppliers();

    // ── Actions ───────────────────────────────────────────────────
    function openSupplier(id){setActiveSupId(id);setOrderView("catalogue");setCatQ("");setCatFilter("all");window.scrollTo({top:0,behavior:"smooth"});}
    function backToSuppliers(){setActiveSupId(null);setOrderView("suppliers");window.scrollTo({top:0,behavior:"smooth"});}
    function setQtyInCart(sid,pid,qty){setOrderCarts(function(prev){var next=Object.assign({},prev);var c=Object.assign({},next[sid]||{});if(qty<=0)delete c[pid];else c[pid]=qty;if(Object.keys(c).length===0)delete next[sid];else next[sid]=c;return next;});}
    function clearCart(sid){setOrderCarts(function(prev){var next=Object.assign({},prev);delete next[sid];return next;});setOrderToast("Order cleared");}
    function updateOrderStatus(oid,status){var no=(orders||[]).map(function(o){return o.id===oid?Object.assign({},o,{status:status}):o;});setOrders(no);persist(cellEdits,removedRows,payments,inventory,no,custOrders);}
    function submitOrder(sid){
      var cart=orderCarts[sid];if(!cart||Object.keys(cart).length===0)return;
      var ps=buildOrderProducts(sid);
      var now=new Date();var timeStr=now.getHours().toString().padStart(2,"0")+":"+now.getMinutes().toString().padStart(2,"0");
      var items=Object.entries(cart).map(function(e){var p=ps.find(function(x){return x.id===e[0];});return{name:p?p.name:e[0],qty:e[1],unit_price:p?p.price:0,pack:"1 unit"};});
      var newOrder={
        id:"PO-"+now.getFullYear()+"-"+String(Date.now()).slice(-5),
        supplier_id:sid,status:"pending",
        created:now.toISOString().slice(0,10),week:weekLabel,items:items,
        timeline:[
          {label:"Draft created",time:"Today, "+timeStr,state:"done"},
          {label:"Sent to supplier",time:"Today, "+timeStr,state:"current"},
          {label:"Confirmed by supplier",time:"—",state:"pending"},
          {label:"Out for delivery",time:"—",state:"pending"},
          {label:"Delivered",time:"—",state:"pending"},
        ]
      };
      var newOrders=[newOrder].concat(orders||[]);
      setOrders(newOrders);persist(cellEdits,removedRows,payments,inventory,newOrders,custOrders);
      setOrderCarts(function(prev){var next=Object.assign({},prev);delete next[sid];return next;});
      var si=orderSuppliers.find(function(s){return s.id===sid;});
      setOrderToast("Order sent to "+(si?si.name:sid)+"!");
      setOrderView("history");window.scrollTo({top:0,behavior:"smooth"});
    }

    // ── Derived for current view ──────────────────────────────────
    const activeSupplier=orderSuppliers.find(function(s){return s.id===activeSupId;})||null;
    const activeOrderObj=(orders||[]).find(function(o){return o.id===activeOrderId;})||null;
    const activeOrderSup=activeOrderObj?orderSuppliers.find(function(s){return s.id===activeOrderObj.supplier_id;}):null;

    // ── Shared appbar ─────────────────────────────────────────────
    const OrderAppBar=(
      <div className="appbar">
        <div className="appbar-inner">
          <div className="brand-row">
            <button className="brand-back" onClick={orderView==="catalogue"?backToSuppliers:goMenu}>
              <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M7.5 2.5L3 6l4.5 3.5"/><path d="M3 6h7"/></svg>
              {orderView==="catalogue"?"All suppliers":"Fowdar Store"}
            </button>
            <h1 className="brand-title">{orderView==="catalogue"&&activeSupplier?activeSupplier.name:"Order"}</h1>
            <p className="brand-sub">
              {orderView==="catalogue"&&activeSupplier?activeSupplier.fullName:"Customer orders & weekly purchasing · "+weekLabel}
            </p>
          </div>
          <div className="appbar-meta">
            <button className="refresh-btn" onClick={refreshData} title="Refresh">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M14 8a6 6 0 1 1-1.76-4.24"/><path d="M14 2v3.5h-3.5"/></svg>
            </button>
            <div className="totals">
              <div className="label">{orderView==="catalogue"?"Order total":"Open order value"}</div>
              <div className="value">{"MUR "+fmt(totalCartValue)}</div>
            </div>
          </div>
        </div>
        {orderView!=="catalogue"&&(
          <nav className="tabs" style={{maxWidth:"100%",padding:"0 16px"}}>
            {[["suppliers","Suppliers"],["history","Orders",pendingOrderCount>0?pendingOrderCount:null]].map(function(t){
              return(
                <button key={t[0]} className={"tab"+(orderView===t[0]?" active":"")} onClick={function(){if(t[0]==="suppliers")backToSuppliers();else setOrderView(t[0]);}}>
                  {t[1]}{t[2]!=null&&<span className="count">{t[2]}</span>}
                </button>
              );
            })}
            {totalCartLines>0&&(
              <div style={{marginLeft:"auto",display:"flex",alignItems:"center",padding:"6px 0"}}>
                <button className="chip active" style={{gap:6}} onClick={function(){var sid=Object.keys(orderCarts)[0];if(sid)openSupplier(sid);}}>
                  <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" style={{width:13,height:13}}><path d="M2 3h2l1.5 8h7l1.5-6H4.5"/><circle cx="6.5" cy="13.5" r="1"/><circle cx="11.5" cy="13.5" r="1"/></svg>
                  {totalCartLines} line{totalCartLines!==1?"s":""} drafting
                </button>
              </div>
            )}
          </nav>
        )}
      </div>
    );

    // ── ORDER DRAWER ──────────────────────────────────────────────
    function OrderDrawer({order,supplier,onClose}){
      React.useEffect(function(){
        function onEsc(e){if(e.key==="Escape")onClose();}
        window.addEventListener("keydown",onEsc);
        return function(){window.removeEventListener("keydown",onEsc);};
      },[]);
      if(!order)return null;
      var sub=(order.items||[]).reduce(function(s,it){return s+it.qty*it.unit_price;},0);
      var vat=sub*0.15;var tot=sub+vat;
      return(
        <div className="drawer-backdrop" onClick={onClose}>
          <div className="drawer" onClick={function(e){e.stopPropagation();}}>
            <div className="drawer-head">
              <div>
                <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                  <h2>{order.id}</h2>
                  <StatusChip status={order.status}/>
                </div>
                <div className="sub">{supplier?supplier.name:"—"} · created {relDay(order.created)}</div>
              </div>
              <button className="drawer-close" onClick={onClose}>
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round"><path d="M4 4l8 8M12 4l-8 8"/></svg>
              </button>
            </div>
            <div className="drawer-body">
              {order.timeline&&(
                <div>
                  <div className="section-label">Status</div>
                  <div className="timeline">
                    {order.timeline.map(function(step,i){
                      return <div key={i} className={"tl-step "+step.state}><div className="label">{step.label}</div><div className="time">{step.time}</div></div>;
                    })}
                  </div>
                </div>
              )}
              <div>
                <div className="section-label">Items</div>
                <div className="drawer-table">
                  <div className="row header"><span>Product</span><span className="qty-cell">Qty</span><span className="total-cell">Line total</span></div>
                  {(order.items||[]).map(function(it,i){
                    return(
                      <div key={i} className="row">
                        <div>
                          <div style={{fontWeight:500}}>{it.name}</div>
                          <div style={{fontSize:11,color:"var(--text-muted)",fontFamily:"var(--font-mono)",marginTop:2}}>{it.pack} · MUR {fmt(it.unit_price)}</div>
                        </div>
                        <div className="qty-cell">{it.qty}</div>
                        <div className="total-cell">MUR {fmt(it.qty*it.unit_price)}</div>
                      </div>
                    );
                  })}
                  <div className="totals-row"><span>Subtotal</span><span>MUR {fmt(sub)}</span></div>
                  <div className="totals-row"><span>VAT (15%)</span><span>MUR {fmt(vat)}</span></div>
                  <div className="totals-row grand"><span>Total</span><span className="amount">MUR {fmt(tot)}</span></div>
                </div>
              </div>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {order.status==="pending"&&(
                  <button className="btn btn-primary" onClick={function(){updateOrderStatus(order.id,"confirmed");onClose();}}>
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" style={{width:14,height:14}}><path d="M3 8.5L6.5 12 13 4.5"/></svg>
                    Confirm receipt
                  </button>
                )}
                {order.status==="confirmed"&&(
                  <button className="btn btn-primary" style={{background:"var(--info)",borderColor:"var(--info)",color:"#000"}} onClick={function(){updateOrderStatus(order.id,"delivered");onClose();}}>Mark Delivered</button>
                )}
                <button className="btn btn-ghost" onClick={onClose} style={{marginLeft:"auto"}}>Close</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── SUPPLIERS VIEW ────────────────────────────────────────────
    if(orderView==="suppliers"){
      var filteredSups=orderSuppliers.filter(function(s){
        var term=ordQ.trim().toLowerCase();
        if(term&&!s.name.toLowerCase().includes(term)&&!s.category.toLowerCase().includes(term))return false;
        if(ordFilter==="recent")return daysSince(s.last_order)!==null&&daysSince(s.last_order)<=7;
        if(ordFilter==="overdue")return daysSince(s.last_order)!==null&&daysSince(s.last_order)>10;
        return true;
      });
      return(
        <div className="fowdar-order-module" style={{minHeight:"100%",paddingBottom:40}}>
          {OrderAppBar}
          <div style={{maxWidth:1240,margin:"0 auto",padding:"20px 16px"}}>
            <div className="section-label">Suppliers</div>
            <div className="page-head">
              <div><h1 style={{marginBottom:0}}>Browse suppliers</h1><div className="sub">Pick a supplier to start a new order.</div></div>
            </div>
            <div className="controls-row">
              <div className="search">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6"><circle cx="7" cy="7" r="5"/><path d="M11 11l3 3" strokeLinecap="round"/></svg>
                <input className="field" placeholder="Search suppliers, categories…" value={ordQ} onChange={function(e){setOrdQ(e.target.value);}}/>
              </div>
              <button className={"chip"+(ordFilter==="all"?" active":"")} onClick={function(){setOrdFilter("all");}}>All <span style={{color:"var(--text-faint)"}}>·</span> {orderSuppliers.length}</button>
              <button className={"chip"+(ordFilter==="recent"?" active":"")} onClick={function(){setOrdFilter("recent");}}>Ordered this week</button>
              <button className={"chip"+(ordFilter==="overdue"?" active":"")} onClick={function(){setOrdFilter("overdue");}}>Overdue (10d+)</button>
            </div>
            {filteredSups.length===0?(
              <div className="empty-state"><div className="glyph">🔎</div><h3>No suppliers match</h3><p>Try a different search or filter.</p></div>
            ):(
              <div className="supplier-grid">
                {filteredSups.map(function(s){
                  var cartCount=Object.keys(orderCarts[s.id]||{}).length;
                  return(
                    <div key={s.id} className="card hoverable supplier-card" onClick={function(){openSupplier(s.id);}}>
                      <div className="supplier-emoji">{s.glyph}</div>
                      <div className="supplier-info">
                        <h3 className="name">{s.name}</h3>
                        <div className="meta">
                          {s.category}<span className="dot">·</span>{s.lead_time}
                        </div>
                      </div>
                      <div className="supplier-status">
                        <div className="item-count">{s.items} items</div>
                        {s.last_order&&<div>last {relDay(s.last_order)}</div>}
                        {cartCount>0&&<div style={{color:"var(--accent)",fontWeight:600}}>{cartCount} in cart</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
          {orderToast&&<div className="toast">{orderToast}</div>}
        </div>
      );
    }

    // ── CATALOGUE VIEW ────────────────────────────────────────────
    if(orderView==="catalogue"&&activeSupId){
      var supInfo=activeSupplier||{glyph:"🏪",name:activeSupId,fullName:"",items:0,category:"",lead_time:"Next-day"};
      var ps=buildOrderProducts(activeSupId);
      var cart=orderCarts[activeSupId]||{};
      var filteredProds=ps.filter(function(p){
        var term=catQ.trim().toLowerCase();
        if(term&&!p.name.toLowerCase().includes(term))return false;
        if(catFilter==="reorder")return daysSince(p.last_ordered)!==null&&daysSince(p.last_ordered)>=7;
        return true;
      });
      var supplierCartItems=Object.entries(cart).map(function(e){var p=ps.find(function(x){return x.id===e[0];});return p?Object.assign({},p,{qty:e[1]}):null;}).filter(Boolean);
      var subtotal=supplierCartItems.reduce(function(s,it){return s+it.qty*it.price;},0);
      var vat=subtotal*0.15;var total=subtotal+vat;
      var itemCount=supplierCartItems.reduce(function(s,it){return s+it.qty;},0);
      return(
        <div className="fowdar-order-module" style={{minHeight:"100%",paddingBottom:120}}>
          {OrderAppBar}
          <div style={{maxWidth:1240,margin:"0 auto",padding:"20px 16px"}}>
            <div className="catalogue-head">
              <div className="supplier-emoji">{supInfo.glyph}</div>
              <div>
                <h2>{supInfo.name}</h2>
                <div className="meta-line">
                  {supInfo.fullName}
                  {supInfo.category&&supInfo.category!==supInfo.fullName&&<><span className="dot">·</span>{supInfo.category}</>}
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                <div className="section-label" style={{margin:0}}>Items</div>
                <div style={{fontFamily:"var(--font-mono)",fontSize:18,fontWeight:600}}>{ps.length}</div>
              </div>
            </div>
            <div className="catalogue-layout">
              <div>
                <div className="controls-row">
                  <div className="search">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6"><circle cx="7" cy="7" r="5"/><path d="M11 11l3 3" strokeLinecap="round"/></svg>
                    <input className="field" placeholder={"Search "+supInfo.name.split(" ")[0]+" catalogue…"} value={catQ} onChange={function(e){setCatQ(e.target.value);}}/>
                  </div>
                  <button className={"chip"+(catFilter==="all"?" active":"")} onClick={function(){setCatFilter("all");}}>All items</button>
                  <button className={"chip"+(catFilter==="reorder"?" active":"")} onClick={function(){setCatFilter("reorder");}}>Due to reorder</button>
                </div>
                {filteredProds.length===0?(
                  <div className="empty-state"><div className="glyph">📦</div><h3>No matching items</h3><p>Try clearing the filter.</p></div>
                ):(
                  <div className="product-list">
                    {filteredProds.map(function(p){
                      var qty=cart[p.id]||0;
                      return(
                        <div key={p.id} className={"product-row"+(qty>0?" in-cart":"")} style={{gridTemplateColumns:"1fr 160px 140px"}}>
                          <div>
                            <h4 className="product-name">{p.name}</h4>
                            {p.last_ordered&&<div className="product-meta"><span className="last-ordered">last {relDay(p.last_ordered)}</span></div>}
                          </div>
                          <div className="product-price">
                            <span className="label">Buy+VAT / unit</span>
                            <span className="value">{p.price>0?("MUR "+fmt(p.price)):"—"}</span>
                          </div>
                          <QtyStepper value={qty} onChange={function(v){setQtyInCart(activeSupId,p.id,v);}}/>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
              {/* CART SIDEBAR */}
              <aside className="cart-summary">
                <h3>Current order <span className="count">{supplierCartItems.length} line{supplierCartItems.length!==1?"s":""}</span></h3>
                {supplierCartItems.length===0?(
                  <div className="cart-empty">
                    <div>Nothing in the order yet.</div>
                    <div className="hint">Tap + on a product to add it.</div>
                  </div>
                ):(
                  <div className="cart-list">
                    {supplierCartItems.map(function(it){
                      return(
                        <div key={it.id} className="cart-item">
                          <div>
                            <div className="name">{it.name}</div>
                            <div className="meta">{it.qty} × MUR {fmt(it.price)}</div>
                          </div>
                          <div>
                            <div className="line-total">MUR {fmt(it.qty*it.price)}</div>
                            <button className="remove" onClick={function(){setQtyInCart(activeSupId,it.id,0);}}>remove</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
                <div className="cart-totals">
                  <div className="line"><span>Subtotal</span><span>MUR {fmt(subtotal)}</span></div>
                  <div className="line"><span>VAT (15%)</span><span>MUR {fmt(vat)}</span></div>
                  <div className="line grand"><span>Total</span><span className="amount">MUR {fmt(total)}</span></div>
                </div>
                {supplierCartItems.length>0&&(
                  <div style={{display:"flex",gap:8,marginTop:4}}>
                    <button className="btn btn-ghost" onClick={function(){clearCart(activeSupId);}}>Clear</button>
                    <button className="btn btn-primary" onClick={function(){submitOrder(activeSupId);}} style={{flex:1,justifyContent:"center"}}>
                      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" style={{width:14,height:14}}><path d="M14 2L2 7l5 2 2 5z"/><path d="M7 9l4-4"/></svg>
                      Send to {supInfo.name.split(" ")[0]}
                    </button>
                  </div>
                )}
              </aside>
            </div>
          </div>
          {/* FAB for mobile */}
          {itemCount>0&&(
            <button className="fab-cart show" style={{bottom:"max(18px,env(safe-area-inset-bottom))"}} onClick={function(){submitOrder(activeSupId);}}>
              <span style={{display:"flex",alignItems:"center",gap:10}}>
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" style={{width:16,height:16}}><path d="M2 3h2l1.5 8h7l1.5-6H4.5"/><circle cx="6.5" cy="13.5" r="1"/><circle cx="11.5" cy="13.5" r="1"/></svg>
                Review order
                <span className="count">{itemCount}</span>
              </span>
              <span style={{fontFamily:"var(--font-mono)"}}>MUR {fmt(total)}</span>
            </button>
          )}
          {orderToast&&<div className="toast">{orderToast}</div>}
        </div>
      );
    }

    // ── HISTORY VIEW ──────────────────────────────────────────────
    if(orderView==="history"){
      var allHistOrders=orders||[];
      var histCounts={all:allHistOrders.length,pending:0,confirmed:0,delivered:0,cancelled:0};
      allHistOrders.forEach(function(o){histCounts[o.status]=(histCounts[o.status]||0)+1;});
      var filteredHist=allHistOrders.filter(function(o){
        if(histStatus!=="all"&&o.status!==histStatus)return false;
        var term=histQ.trim().toLowerCase();
        if(term&&!o.id.toLowerCase().includes(term)&&!((o.supplier_id||"").toLowerCase().includes(term)))return false;
        return true;
      });
      return(
        <div className="fowdar-order-module" style={{minHeight:"100%",paddingBottom:40}}>
          {OrderAppBar}
          <div style={{maxWidth:1240,margin:"0 auto",padding:"20px 16px"}}>
            <div className="section-label">Order History</div>
            <div className="page-head">
              <div><h1 style={{marginBottom:0}}>Recent orders</h1><div className="sub">Track every purchase order. Tap any row to see status &amp; details.</div></div>
            </div>
            <div className="controls-row">
              <div className="search">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6"><circle cx="7" cy="7" r="5"/><path d="M11 11l3 3" strokeLinecap="round"/></svg>
                <input className="field" placeholder="Search by order ID or supplier…" value={histQ} onChange={function(e){setHistQ(e.target.value);}}/>
              </div>
              {[["all","All",histCounts.all],["pending","Sent",histCounts.pending],["confirmed","Confirmed",histCounts.confirmed],["delivered","Delivered",histCounts.delivered],["cancelled","Cancelled",histCounts.cancelled]].map(function(f){
                return(
                  <button key={f[0]} className={"chip"+(histStatus===f[0]?" active":"")} onClick={function(){setHistStatus(f[0]);}}>
                    {f[1]} <span style={{color:"var(--text-faint)",marginLeft:4}}>{f[2]}</span>
                  </button>
                );
              })}
            </div>
            {filteredHist.length===0?(
              <div className="empty-state"><div className="glyph">📋</div><h3>No orders yet</h3><p>Submit an order from the Suppliers tab.</p></div>
            ):(
              <div className="order-list">
                {filteredHist.map(function(o){
                  var si=orderSuppliers.find(function(s){return s.id===o.supplier_id;});
                  var sub=(o.items||[]).reduce(function(s,it){return s+it.qty*it.unit_price;},0);
                  var tot=sub*1.15;
                  var units=(o.items||[]).reduce(function(s,it){return s+it.qty;},0);
                  return(
                    <div key={o.id} className="card hoverable order-card" onClick={function(){setActiveOrderId(o.id);}}>
                      <span className="order-id">{o.id}</span>
                      <div className="supplier-info-block">
                        <h4 className="supplier-name">{si?si.name:(o.supplier_id||"—")}</h4>
                        <div className="order-meta">
                          {(o.items||[]).length} line{(o.items||[]).length!==1?"s":""}
                          <span className="dot">·</span>{units} unit{units!==1?"s":""}
                          <span className="dot">·</span>{relDay(o.created)}
                        </div>
                      </div>
                      <StatusChip status={o.status}/>
                      <div className="order-total">MUR {fmt(tot)}</div>
                    </div>
                  );
                })}
              </div>
            )}
            {/* Customer Orders */}
            {custOrders.length>0&&(
              <div style={{marginTop:28}}>
                <div className="section-label" style={{marginBottom:12}}>Customer Orders Taken</div>
                <div className="order-list">
                  {custOrders.map(function(o){
                    return(
                      <div key={o.id} className="card order-card" style={{borderColor:o.ordered?"var(--accent-line)":"#f5c97a4d"}}>
                        <span className="order-id" style={{color:"var(--warn)"}}>CUST</span>
                        <div className="supplier-info-block">
                          <h4 className="supplier-name">{o.customer||"Customer"}</h4>
                          <div className="order-meta">{o.product}{o.qty?" · qty "+o.qty:""}{o.note?" · "+o.note:""}</div>
                        </div>
                        <StatusChip status={o.ordered?"delivered":"pending"}/>
                        <div style={{display:"flex",gap:6}}>
                          <button className="btn btn-ghost" style={{padding:"5px 10px",fontSize:12}} onClick={function(e){e.stopPropagation();var nc=custOrders.map(function(x){return x.id===o.id?Object.assign({},x,{ordered:!x.ordered}):x;});setCustOrders(nc);persist(cellEdits,removedRows,payments,inventory,orders,nc);}}>{o.ordered?"Unmark":"Mark Ordered"}</button>
                          <button className="btn btn-ghost" style={{padding:"5px 10px",fontSize:12,color:"var(--danger)"}} onClick={function(e){e.stopPropagation();var nc=custOrders.filter(function(x){return x.id!==o.id;});setCustOrders(nc);persist(cellEdits,removedRows,payments,inventory,orders,nc);}}>Del</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
          {activeOrderObj&&<OrderDrawer order={activeOrderObj} supplier={activeOrderSup} onClose={function(){setActiveOrderId(null);}}/>}
          {orderToast&&<div className="toast">{orderToast}</div>}
        </div>
      );
    }

    return null;
  }

  if(screen==="menu"){
    const changedCount=Object.keys(priceHistory).reduce(function(a,sn){
      return a+Object.keys(priceHistory[sn]).filter(function(pn){const h=priceHistory[sn][pn];return h.length>=2&&Math.abs(h[h.length-1].price-h[0].price)>0.001;}).length;
    },0);
    const totalOut=supNames.reduce(function(a,sn){
      const prods=getSupProducts(SUPPLIERS[sn]);
      return a+prods.filter(function(p){const s=parseFloat(inventory[sn+"||"+p+"||stock"]);return!isNaN(s)&&s===0;}).length;
    },0);
    const totalLow=supNames.reduce(function(a,sn){
      const prods=getSupProducts(SUPPLIERS[sn]);
      return a+prods.filter(function(p){
        const s=parseFloat(inventory[sn+"||"+p+"||stock"]);
        const r=parseFloat(inventory[sn+"||"+p+"||reorder"]);
        return!isNaN(s)&&!isNaN(r)&&s>0&&s<=r;
      }).length;
    },0);

    const menuItems=[
      {key:"invoices",  icon:"🧾", label:"Invoices",     sub:"Browse supplier invoices",                         color:C.blue,   badge:null},
      {key:"payments",  icon:"💳", label:"Payments",     sub:"Payment methods & status",                         color:C.accent, badge:null},
      {key:"catalogue", icon:"📦", label:"Catalogue",    sub:"Full product list by supplier",                    color:C.warn,   badge:null},
      {key:"prices",    icon:"📊", label:"Price Tracker",sub:changedCount>0?changedCount+" change"+(changedCount!==1?"s":"")+" detected":"Monitor buying price changes", color:changedCount>0?C.warn:C.rec, badge:changedCount>0?changedCount:null, badgeColor:C.warn},
      {key:"inventory", icon:"📋", label:"Inventory",    sub:totalOut>0?totalOut+" out of stock"+(totalLow>0?", "+totalLow+" low":""):totalLow>0?totalLow+" low stock items":"Track stock & reorder levels", color:totalOut>0?C.danger:totalLow>0?C.warn:C.purple, badge:totalOut>0?totalOut:totalLow>0?totalLow:null, badgeColor:totalOut>0?C.danger:C.warn},
      {key:"order",     icon:"🛒", label:"Order",         sub:(function(){const p=custOrders.filter(function(o){return !o.ordered;}).length;return p>0?p+" order"+(p!==1?"s":"")+" pending":"Customer orders & weekly purchasing";}()), color:C.blue, badge:(function(){const p=custOrders.filter(function(o){return !o.ordered;}).length;return p>0?p:null;}()), badgeColor:C.warn},
    ];
    return(
      <div onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
        style={{background:C.bg,minHeight:"100%",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",color:C.text,paddingBottom:"max(40px,calc(40px + env(safe-area-inset-bottom)))"}}>
        <div style={{height:"env(safe-area-inset-top)",background:C.surf}}></div>
        {(pulling||refreshing)&&(
          <div style={{height:refreshing?50:pullY,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",transition:pulling?"none":"height 0.3s ease",background:C.bg}}>
            <div style={{width:28,height:28,borderRadius:"50%",border:"3px solid "+C.bdr,borderTop:"3px solid "+C.accent,animation:refreshing?"spin 0.7s linear infinite":"none",transform:!refreshing?("rotate("+Math.min(pullY*3,270)+"deg)"):"none"}}></div>
          </div>
        )}
        <div style={{background:C.surf,borderBottom:"1px solid "+C.bdr,padding:"14px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{fontWeight:800,fontSize:18}}>Fowdar Store</div>
            <div style={{fontSize:11,color:C.muted}}>Veer Bisham Fowdar Trading Co. Ltd.</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:10}}>
            <button onClick={refreshData} disabled={refreshing}
              style={{background:"none",border:"1px solid "+C.bdr,borderRadius:8,padding:"6px 12px",color:refreshing?C.muted:C.accent,fontSize:20,cursor:"pointer",lineHeight:1}}>
              {refreshing?"...":"\u21BB"}
            </button>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:10,color:C.muted}}>Total Spend</div>
              <div style={{fontSize:15,fontWeight:800,color:C.accent,fontFamily:"monospace"}}>MUR {fmt(totalAll)}</div>
            </div>
          </div>
        </div>
        {loading?(<div style={{textAlign:"center",padding:60,color:C.muted}}>Loading...</div>):(
          <div style={{padding:"20px 14px"}}>
            <div style={{fontSize:11,color:C.muted,marginBottom:16,fontWeight:700,textTransform:"uppercase",letterSpacing:1}}>Select a section</div>
            {menuItems.map(function(item){
              return(
                <div key={item.key} onClick={function(){setScreen(item.key);setSearch("");setSubScreen(null);}}
                  style={{background:C.surf,borderRadius:16,marginBottom:12,padding:"16px 16px",border:"1px solid "+(item.badge?item.badgeColor:C.bdr),cursor:"pointer",display:"flex",alignItems:"center",gap:14,position:"relative"}}>
                  <div style={{fontSize:30,flexShrink:0,width:44,height:44,borderRadius:12,background:C.surf2,display:"flex",alignItems:"center",justifyContent:"center"}}>{item.icon}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:800,fontSize:15,marginBottom:3,color:C.text}}>{item.label}</div>
                    <div style={{fontSize:12,color:item.badge?item.badgeColor:C.muted,fontWeight:item.badge?700:400}}>{item.sub}</div>
                  </div>
                  {item.badge&&(<div style={{background:item.badgeColor,borderRadius:20,padding:"3px 10px",fontSize:12,fontWeight:800,color:item.badgeColor===C.warn?"#000":"#fff",flexShrink:0}}>{item.badge}</div>)}
                  {!item.badge&&(<div style={{fontSize:18,color:C.muted,flexShrink:0}}>{">"}</div>)}
                </div>
              );
            })}
          </div>
        )}
        {toast&&(<div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",background:C.accent,color:"#000",padding:"10px 20px",borderRadius:20,fontWeight:700,fontSize:13,zIndex:999,boxShadow:"0 4px 20px rgba(0,229,160,0.4)"}}>{toast}</div>)}
      </div>
    );
  }

  // ── SECTION SCREENS (invoices / payments / catalogue) ────────────
  return(
    <div style={{background:C.bg,minHeight:"100%",fontFamily:"-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif",color:C.text,paddingBottom:"max(60px,calc(60px + env(safe-area-inset-bottom)))"}}>
      <div style={{background:C.surf,borderBottom:"1px solid "+C.bdr,paddingTop:"max(10px,env(safe-area-inset-top))",paddingBottom:"10px",paddingLeft:"12px",paddingRight:"12px",position:"sticky",top:0,zIndex:200}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={goMenu}
            style={{background:C.surf2,border:"1px solid "+C.bdr,borderRadius:10,padding:"10px 16px",color:C.accent,fontWeight:800,fontSize:14,cursor:"pointer",flexShrink:0}}>
            {"< Menu"}
          </button>
          <div style={{fontWeight:800,fontSize:16,color:C.text}}>
            {screen==="invoices"?"Invoices":screen==="payments"?"Payments":"Catalogue"}
          </div>
        </div>
      </div>

      {/* ── INVOICES ── */}
      {screen==="invoices"&&(
        <div style={{padding:"12px 10px"}}>
          <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Search suppliers or products..." style={ISt}/>
          <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:12,paddingBottom:4}}>
            {allDays.map(function(d){
              const active=dayFilter===d;
              return(<button key={d} onClick={function(){setDayFilter(d);setSortMode("received");}}
                style={{padding:"6px 14px",borderRadius:20,fontSize:12,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap",background:active?C.accent:C.surf2,color:active?"#000":C.muted,border:"1px solid "+(active?C.accent:C.bdr),flexShrink:0}}>
                {getDayLabel(d)}
              </button>);
            })}
          </div>
          {dayFilter&&(
            <div style={{background:C.surf,borderRadius:10,padding:"10px 14px",marginBottom:12,border:"1px solid "+C.bdr,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><div style={{fontSize:10,color:C.muted,textTransform:"uppercase",marginBottom:2}}>Day Total</div><div style={{fontSize:15,fontWeight:800,color:C.accent,fontFamily:"monospace"}}>MUR {fmt(dayTotal)}</div></div>
              <div style={{textAlign:"right"}}><div style={{fontSize:10,color:C.muted,textTransform:"uppercase",marginBottom:2}}>Suppliers</div><div style={{fontSize:15,fontWeight:800,color:C.text}}>{daySuppliers.length}</div></div>
            </div>
          )}
          <SortPills value={sortMode} onChange={setSortMode} color={C.blue} options={[["received","Received"],["az","A-Z"],["za","Z-A"],["high","$ High"],["low","$ Low"]]}/>
          {filteredDaySups.length===0?(<div style={{color:C.muted,textAlign:"center",padding:30}}>No suppliers for this day</div>):
          filteredDaySups.map(function(s){
            const sup=SUPPLIERS[s.name];
            const invCount=(sup.invoices||[]).filter(function(inv){return(inv.receivedAt?inv.receivedAt.split("T")[0]:null)===dayFilter;}).length;
            return(
              <div key={s.name} onClick={function(){setTab(s.name);setScreen("supplier");setSubScreen("invoices");setSearch("");setEditMode(false);}}
                style={{background:C.surf,borderRadius:12,marginBottom:10,padding:"12px 14px",border:"1px solid "+C.bdr,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{minWidth:0,flex:1}}>
                  <div style={{fontWeight:700,fontSize:14,marginBottom:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</div>
                  <div style={{fontSize:11,color:C.muted,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sup.meta.supplier}</div>
                  <div style={{fontSize:10,color:C.muted,marginTop:2}}>{invCount} invoice{invCount!==1?"s":""}</div>
                </div>
                <div style={{textAlign:"right",flexShrink:0,marginLeft:10}}>
                  <div style={{fontSize:13,fontWeight:800,color:C.accent,fontFamily:"monospace"}}>MUR {fmt(s.total)}</div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── PAYMENTS — Redesigned ── */}
      {screen==="payments"&&(
        <div style={{padding:"12px 10px"}}>
          <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Search suppliers..." style={ISt}/>
          {/* SUMMARY STATS */}
          {(function(){
            const methods={};
            supNames.forEach(function(sn){
              const pk=sn+"||pay";
              const pv=payments[pk]!==undefined?payments[pk]:(SUPPLIERS[sn].meta.payment||"");
              const key=pv.trim()||"Unset";
              methods[key]=(methods[key]||0)+1;
            });
            return(
              <div style={{display:"flex",gap:6,overflowX:"auto",marginBottom:14,paddingBottom:4}}>
                {Object.keys(methods).map(function(m){
                  return(<div key={m} style={{flexShrink:0,background:C.surf2,borderRadius:10,padding:"8px 14px",border:"1px solid "+C.bdr,textAlign:"center"}}>
                    <div style={{fontSize:16,fontWeight:800,color:m==="Unset"?C.muted:C.accent}}>{methods[m]}</div>
                    <div style={{fontSize:10,color:C.muted,marginTop:2,maxWidth:80,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m}</div>
                  </div>);
                })}
              </div>
            );
          })()}
          {supNames.filter(function(sn){
            if(!search)return true;
            return sn.toLowerCase().includes(lq)||(SUPPLIERS[sn].meta.supplier||"").toLowerCase().includes(lq);
          }).map(function(sn){
            const sup=SUPPLIERS[sn];
            const total=sup.invoices.reduce(function(a,i){return a+i.total;},0);
            const pk=sn+"||pay";
            const pv=payments[pk]!==undefined?payments[pk]:(sup.meta.payment||"");
            const hasMethod=pv.trim().length>0;
            const METHODS=["Cash","Credit","Cheque","Bank Transfer","Other"];
            return(
              <div key={sn} style={{background:C.surf,borderRadius:14,marginBottom:10,border:"1px solid "+(hasMethod?C.bdr:C.warn),overflow:"hidden"}}>
                {/* HEADER ROW */}
                <div style={{padding:"12px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",borderBottom:"1px solid "+C.bdr}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sn}</div>
                    <div style={{fontSize:11,color:C.muted,marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sup.meta.supplier}</div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0,marginLeft:10}}>
                    <div style={{fontSize:12,fontWeight:800,color:C.accent,fontFamily:"monospace"}}>MUR {fmt(total)}</div>
                    {!hasMethod&&<div style={{fontSize:10,color:C.warn,marginTop:2}}>⚠ Not set</div>}
                  </div>
                </div>
                {/* QUICK SELECT BUTTONS */}
                <div style={{padding:"10px 14px",display:"flex",gap:6,flexWrap:"wrap"}}>
                  {METHODS.map(function(m){
                    const active=pv.trim()===m;
                    return(<button key={m} onClick={function(){setPayVal(pk,active?"":m);}}
                      style={{padding:"6px 12px",borderRadius:20,fontSize:11,fontWeight:700,cursor:"pointer",
                        background:active?C.accent:C.surf2,color:active?"#000":C.muted,
                        border:"1px solid "+(active?C.accent:C.bdr)}}>
                      {m}
                    </button>);
                  })}
                </div>
                {/* CUSTOM NOTES */}
                <div style={{padding:"0 14px 12px"}}>
                  <input value={pv} onChange={function(e){setPayVal(pk,e.target.value);}}
                    placeholder="Custom notes (e.g. Net 30 days, reference #)..."
                    style={Object.assign({},ISt,{marginBottom:0,fontSize:12,background:C.surf2})}/>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── CATALOGUE — Supplier list only ── */}
      {screen==="catalogue"&&(
        <div style={{padding:"12px 10px"}}>
          <input value={search} onChange={function(e){setSearch(e.target.value);}} placeholder="Search suppliers..." style={ISt}/>
          <SortPills value={catSort} onChange={setCatSort} color={C.warn} options={[["az","A-Z"],["za","Z-A"],["count","Most Products"],["default","Default"]]}/>
          {(function(){
            let list=supNames.map(function(sn){
              const sup=SUPPLIERS[sn];
              const prods=getSupProducts(sup);
              return{name:sn,sup:sup,count:prods.length};
            }).filter(function(s){
              if(!search)return s.count>0;
              return s.name.toLowerCase().includes(lq)||s.sup.meta.supplier.toLowerCase().includes(lq);
            });
            if(catSort==="az")list=list.slice().sort(function(a,b){return a.name.localeCompare(b.name);});
            else if(catSort==="za")list=list.slice().sort(function(a,b){return b.name.localeCompare(a.name);});
            else if(catSort==="count")list=list.slice().sort(function(a,b){return b.count-a.count;});
            return list.map(function(s){
              return(
                <div key={s.name} onClick={function(){setTab(s.name);setSubScreen("cat-supplier");setSearch("");}}
                  style={{background:C.surf,borderRadius:12,marginBottom:10,padding:"14px 16px",border:"1px solid "+C.bdr,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontWeight:700,fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.name}</div>
                    <div style={{fontSize:11,color:C.muted,marginTop:2,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{s.sup.meta.supplier}</div>
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:10,flexShrink:0,marginLeft:10}}>
                    <div style={{background:C.surf2,borderRadius:8,padding:"4px 10px",fontSize:12,fontWeight:700,color:C.warn}}>{s.count}</div>
                    <div style={{color:C.muted,fontSize:16}}>{">"}</div>
                  </div>
                </div>
              );
            });
          })()}
        </div>
      )}

      {toast&&(<div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",background:C.accent,color:"#000",padding:"10px 20px",borderRadius:20,fontWeight:700,fontSize:13,zIndex:999,boxShadow:"0 4px 20px rgba(0,229,160,0.4)"}}>{toast}</div>)}
    </div>
  );
}
ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
</body>
</html>
