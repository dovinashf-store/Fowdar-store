                {order.status==="pending"&&(
                  <button className="btn btn-primary" onClick={function(){updateOrderStatus(order.id,"confirmed");onClose();}}>
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" style={{width:14,height:14}}><path d="M3 8.5L6.5 12 13 4.5"/></svg>
                    Confirm receipt
                  </button>
                )}
                {order.status==="confirmed"&&(
                  <button className="btn btn-primary" style={{background:"var(--info)",borderColor:"var(--info)",color:"#000"}} onClick={function(){updateOrderStatus(order.id,"delivered");onClose();}}>Mark Delivered</button>
                )}
                <button className="btn btn-ghost" onClick={onClose} style={{marginLeft:"auto"}}>Close</button>
              </div>
            </div>
          </div>
        </div>
      );
    }

    // ── SUPPLIERS VIEW ────────────────────────────────────────────
    if(orderView==="suppliers"){
      var filteredSups=orderSuppliers.filter(function(s){
        var term=ordQ.trim().toLowerCase();
        if(term&&!s.name.toLowerCase().includes(term)&&!s.category.toLowerCase().includes(term))return false;
        if(ordFilter==="recent")return daysSince(s.last_order)!==null&&daysSince(s.last_order)<=7;
        if(ordFilter==="overdue")return daysSince(s.last_order)!==null&&daysSince(s.last_order)>10;
        return true;
      });
      return(
        <div className="fowdar-order-module" style={{minHeight:"100%",paddingBottom:40}}>
          {OrderAppBar}
          <div style={{maxWidth:1240,margin:"0 auto",padding:"20px 16px"}}>
            <div className="section-label">Suppliers</div>
            <div className="page-head">
              <div><h1 style={{marginBottom:0}}>Browse suppliers</h1><div className="sub">Pick a supplier to start a new order.</div></div>
            </div>
            <div className="controls-row">
              <div className="search">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6"><circle cx="7" cy="7" r="5"/><path d="M11 11l3 3" strokeLinecap="round"/></svg>
                <input className="field" placeholder="Search suppliers, categories…" value={ordQ} onChange={function(e){setOrdQ(e.target.value);}}/>
              </div>
              <button className={"chip"+(ordFilter==="all"?" active":"")} onClick={function(){setOrdFilter("all");}}>All <span style={{color:"var(--text-faint)"}}>·</span> {orderSuppliers.length}</button>
              <button className={"chip"+(ordFilter==="recent"?" active":"")} onClick={function(){setOrdFilter("recent");}}>Ordered this week</button>
              <button className={"chip"+(ordFilter==="overdue"?" active":"")} onClick={function(){setOrdFilter("overdue");}}>Overdue (10d+)</button>
            </div>
            {filteredSups.length===0?(
              <div className="empty-state"><div className="glyph">🔎</div><h3>No suppliers match</h3><p>Try a different search or filter.</p></div>
            ):(
              <div className="supplier-grid">
                {filteredSups.map(function(s){
                  var cartCount=Object.keys(orderCarts[s.id]||{}).length;
                  return(
                    <div key={s.id} className="card hoverable supplier-card" onClick={function(){openSupplier(s.id);}}>
                      <div className="supplier-emoji">{s.glyph}</div>
                      <div className="supplier-info">
                        <h3 className="name">{s.name}</h3>
                        <div className="meta">
                          {s.category}<span className="dot">·</span>{s.lead_time}
                        </div>
                      </div>
                      <div className="supplier-status">
                        <div className="item-count">{s.items} items</div>
                        {s.last_order&&<div>last {relDay(s.last_order)}</div>}
                        {cartCount>0&&<div style={{color:"var(--accent)",fontWeight:600}}>{cartCount} in cart</div>}
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
          {orderToast&&<div className="toast">{orderToast}</div>}
        </div>
      );
    }

    // ── CATALOGUE VIEW ────────────────────────────────────────────
    if(orderView==="catalogue"&&activeSupId){
      var supInfo=activeSupplier||{glyph:"🏪",name:activeSupId,fullName:"",items:0,category:"",lead_time:"Next-day"};
      var ps=buildOrderProducts(activeSupId);
      var cart=orderCarts[activeSupId]||{};
      var filteredProds=ps.filter(function(p){
        var term=catQ.trim().toLowerCase();
        if(term&&!p.name.toLowerCase().includes(term))return false;
        if(catFilter==="reorder")return daysSince(p.last_ordered)!==null&&daysSince(p.last_ordered)>=7;
        return true;
      });
      var supplierCartItems=Object.entries(cart).map(function(e){var p=ps.find(function(x){return x.id===e[0];});return p?Object.assign({},p,{qty:e[1]}):null;}).filter(Boolean);
      var subtotal=supplierCartItems.reduce(function(s,it){return s+it.qty*it.price;},0);
      var vat=subtotal*0.15;var total=subtotal+vat;
      var itemCount=supplierCartItems.reduce(function(s,it){return s+it.qty;},0);
      return(
        <div className="fowdar-order-module" style={{minHeight:"100%",paddingBottom:120}}>
          {OrderAppBar}
          <div style={{maxWidth:1240,margin:"0 auto",padding:"20px 16px"}}>
            <div className="catalogue-head">
              <div className="supplier-emoji">{supInfo.glyph}</div>
              <div>
                <h2>{supInfo.name}</h2>
                <div className="meta-line">
                  {supInfo.fullName}
                  {supInfo.category&&supInfo.category!==supInfo.fullName&&<><span className="dot">·</span>{supInfo.category}</>}
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                <div className="section-label" style={{margin:0}}>Items</div>
                <div style={{fontFamily:"var(--font-mono)",fontSize:18,fontWeight:600}}>{ps.length}</div>
              </div>
            </div>
            <div className="catalogue-layout">
              <div>
                <div className="controls-row">
                  <div className="search">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6"><circle cx="7" cy="7" r="5"/><path d="M11 11l3 3" strokeLinecap="round"/></svg>
                    <input className="field" placeholder={"Search "+supInfo.name.split(" ")[0]+" catalogue…"} value={catQ} onChange={function(e){setCatQ(e.target.value);}}/>
                  </div>
                  <button className={"chip"+(catFilter==="all"?" active":"")} onClick={function(){setCatFilter("all");}}>All items</button>
                  <button className={"chip"+(catFilter==="reorder"?" active":"")} onClick={function(){setCatFilter("reorder");}}>Due to reorder</button>
                </div>
                {filteredProds.length===0?(
                  <div className="empty-state"><div className="glyph">📦</div><h3>No matching items</h3><p>Try clearing the filter.</p></div>
                ):(
                  <div className="product-list">
                    {filteredProds.map(function(p){
                      var qty=cart[p.id]||0;
                      return(
                        <div key={p.id} className={"product-row"+(qty>0?" in-cart":"")} style={{gridTemplateColumns:"1fr 160px 140px"}}>
                          <div>
                            <h4 className="product-name">{p.name}</h4>
                            {p.last_ordered&&<div className="product-meta"><span className="last-ordered">last {relDay(p.last_ordered)}</span></div>}
                          </div>
                          <div className="product-price">
                            <span className="label">Buy+VAT / unit</span>
                            <span className="value">{p.price>0?("MUR "+fmt(p.price)):"—"}</span>
                          </div>
                          <QtyStepper value={qty} onChange={function(v){setQtyInCart(activeSupId,p.id,v);}}/>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
              {/* CART SIDEBAR */}
              <aside className="cart-summary">
                <h3>Current order <span className="count">{supplierCartItems.length} line{supplierCartItems.length!==1?"s":""}</span></h3>
                {supplierCartItems.length===0?(
                  <div className="cart-empty">
                    <div>Nothing in the order yet.</div>
                    <div className="hint">Tap + on a product to add it.</div>
                  </div>
                ):(
                  <div className="cart-list">
                    {supplierCartItems.map(function(it){
                      return(
                        <div key={it.id} className="cart-item">
                          <div>
                            <div className="name">{it.name}</div>
                            <div className="meta">{it.qty} × MUR {fmt(it.price)}</div>
                          </div>
                          <div>
                            <div className="line-total">MUR {fmt(it.qty*it.price)}</div>
                            <button className="remove" onClick={function(){setQtyInCart(activeSupId,it.id,0);}}>remove</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
                <div className="cart-totals">
                  <div className="line"><span>Subtotal</span><span>MUR {fmt(subtotal)}</span></div>
                  <div className="line"><span>VAT (15%)</span><span>MUR {fmt(vat)}</span></div>
                  <div className="line grand"><span>Total</span><span className="amount">MUR {fmt(total)}</span></div>
                </div>
                {supplierCartItems.length>0&&(
                  <div style={{display:"flex",gap:8,marginTop:4}}>
                    <button className="btn btn-ghost" onClick={function(){clearCart(activeSupId);}}>Clear</button>
                    <button className="btn btn-primary" onClick={function(){submitOrder(activeSupId);}} style={{flex:1,justifyContent:"center"}}>
                      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" style={{width:14,height:14}}><path d="M14 2L2 7l5 2 2 5z"/><path d="M7 9l4-4"/></svg>
                      Send to {supInfo.name.split(" ")[0]}
                    </button>
                  </div>
                )}
              </aside>
            </div>
          </div>
          {/* FAB for mobile */}
          {itemCount>0&&(
            <button className="fab-cart show" style={{bottom:"max(18px,env(safe-area-inset-bottom))"}} onClick={function(){submitOrder(activeSupId);}}>
              <span style={{display:"flex",alignItems:"center",gap:10}}>
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round" style={{width:16,height:16}}><path d="M2 3h2l1.5 8h7l1.5-6H4.5"/><circle cx="6.5" cy="13.5" r="1"/><circle cx="11.5" cy="13.5" r="1"/></svg>
                Review order
                <span className="count">{itemCount}</span>
              </span>
              <span style={{fontFamily:"var(--font-mono)"}}>MUR {fmt(total)}</span>
            </button>
          )}
          {orderToast&&<div className="toast">{orderToast}</div>}
        </div>
      );
    }

    // ── HISTORY VIEW ──────────────────────────────────────────────
    if(orderView==="history"){
      var allHistOrders=orders||[];
      var histCounts={all:allHistOrders.length,pending:0,confirmed:0,delivered:0,cancelled:0};
      allHistOrders.forEach(function(o){histCounts[o.status]=(histCounts[o.status]||0)+1;});
      var filteredHist=allHistOrders.filter(function(o){
        if(histStatus!=="all"&&o.status!==histStatus)return false;
        var term=histQ.trim().toLowerCase();
        if(term&&!o.id.toLowerCase().includes(term)&&!((o.supplier_id||"").toLowerCase().includes(term)))return false;
        return true;
      });
      return(
        <div className="fowdar-order-module" style={{minHeight:"100%",paddingBottom:40}}>
          {OrderAppBar}
          <div style={{maxWidth:1240,margin:"0 auto",padding:"20px 16px"}}>
            <div className="section-label">Order History</div>
            <div className="page-head">
              <div><h1 style={{marginBottom:0}}>Recent orders</h1><div className="sub">Track every purchase order. Tap any row to see status &amp; details.</div></div>
            </div>
            <div className="controls-row">
              <div className="search">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6"><circle cx="7" cy="7" r="5"/><path d="M11 11l3 3" strokeLinecap="round"/></svg>
                <input className="field" placeholder="Search by order ID or supplier…" value={histQ} onChange={function(e){setHistQ(e.target.value);}}/>
              </div>
              {[["all","All",histCounts.all],["pending","Sent",histCounts.pending],["confirmed","Confirmed",histCounts.confirmed],["delivered","Delivered",histCounts.delivered],["cancelled","Cancelled",histCounts.cancelled]].map(function(f){
                return(
                  <button key={f[0]} className={"chip"+(histStatus===f[0]?" active":"")} onClick={function(){setHistStatus(f[0]);}}>
                    {f[1]} <span style={{color:"var(--text-faint)",marginLeft:4}}>{f[2]}</span>
                  </button>
                );
              })}
            </div>
            {filteredHist.length===0?(
              <div className="empty-state"><div className="glyph">📋</div><h3>No orders yet</h3><p>Submit an order from the Suppliers tab.</p></div>
            ):(
              <div className="order-list">
                {filteredHist.map(function(o){
                  var si=orderSuppliers.find(function(s){return s.id===o.supplier_id;});
                  var sub=(o.items||[]).reduce(function(s,it){return s+it.qty*it.unit_price;},0);
                  var tot=sub*1.15;
                  var units=(o.items||[]).reduce(function(s,it){return s+it.qty;},0);
                  return(
                    <div key={o.id} className="card hoverable order-card" onClick={function(){setActiveOrderId(o.id);}}>
                      <span className="order-id">{o.id}</span>
                      <div className="supplier-info-block">
                        <h4 className="supplier-name">{si?si.name:(o.supplier_id||"—")}</h4>
                        <div className="order-meta">
                          {(o.items||[]).length} line{(o.items||[]).length!==1?"s":""}
                          <span className="dot">·</span>{units} unit{units!==1?"s":""}
                          <span className="dot">·</span>{relDay(o.created)}
                        </div>
                      </div>
                      <StatusChip status={o.status}/>
                      <div className="order-total">MUR {fmt(tot)}</div>
                    </div>
                  );
                })}
              </div>
            )}
            {/* Customer Orders */}
            {custOrders.length>0&&(
              <div style={{marginTop:28}}>
                <div className="section-label" style={{marginBottom:12}}>Customer Orders Taken</div>
                <div className="order-list">
                  {custOrders.map(function(o){
                    return(
                      <div key={o.id} className="card order-card" style={{borderColor:o.ordered?"var(--accent-line)":"#f5c97a4d"}}>
                        <span className="order-id" style={{color:"var(--warn)"}}>CUST</span>
                        <div className="supplier-info-block">
                          <h4 className="supplier-name">{o.customer||"Customer"}</h4>
                          <div className="order-meta">{o.product}{o.qty?" · qty "+o.qty:""}{o.note?" · "+o.note:""}</div>
                        </div>
                        <StatusChip status={o.ordered?"delivered":"pending"}/>
                        <div style={{display:"flex",gap:6}}>
                          <button className="btn btn-ghost" style={{padding:"5px 10px",fontSize:12}} onClick={function(e){e.stopPropagation();var nc=custOrders.map(function(x){return x.id===o.id?Object.assign({},x,{ordered:!x.ordered}):x;});setCustOrders(nc);persist(cellEdits,removedRows,payments,inventory,orders,nc);}}>{o.ordered?"Unmark":"Mark Ordered"}</button>
                          <button className="btn btn-ghost" style={{padding:"5px 10px",fontSize:12,color:"var(--danger)"}} onClick={function(e){e.stopPropagation();var nc=custOrders.filter(function(x){return x.id!==o.id;});setCustOrders(nc);persist(cellEdits,removedRows,payments,inventory,orders,nc);}}>Del</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
          {activeOrderObj&&<OrderDrawer order={activeOrderObj} supplier={activeOrderSup} onClose={function(){setActiveOrderId(null);}}/>}
          {orderToast&&<div className="toast">{orderToast}</div>}
        </div>
      );
    }

    return null;
  }

  if(screen==="menu"){
    const changedCount=Object.keys(priceHistory).reduce(function(a,sn){
      return a+Object.keys(priceHistory[sn]).filter(function(pn){
        const h=priceHistory[sn][pn];
        if(h.length<2)return false;
        // Change = latest purchase price differs from immediately previous purchase
        const diff=h[h.length-1].price-h[h.length-2].price;
        return Math.abs(diff)>=0.01;
      }).length;
    },0);
    const totalOut=supNames.reduce(function(a,sn){
      const prods=getSupProducts(SUPPLIERS[sn]);
      return a+prods.filter(function(p){const s=parseFloat(inventory[sn+"||"+p+"||stock"]);return!isNaN(s)&&s===0;}).length;
    },0);
    const totalLow=supNames.reduce(function(a,sn){
      const prods=getSupProducts(SUPPLIERS[sn]);
      return a+prods.filter(function(p){
        const s=parseFloat(inventory[sn+"||"+p+"||stock"]);
        const r=parseFloat(inventory[sn+"||"+p+"||reorder"]);
        return!isNaN(s)&&!isNaN(r)&&s>0&&s<=r;
      }).length;
    },0);

    const menuItems=[
      {key:"invoices",  icon:"🧾", label:"Invoices",     sub:"Browse supplier invoices",                         color:C.blue,   badge:null},
      {key:"payments",  icon:"💳", label:"Payments",     sub:"Payment methods & status",                         color:C.accent, badge:null},
      {key:"catalogue", icon:"📦", label:"Catalogue",    sub:"Full product list by supplier",                    color:C.warn,   badge:null},
      {key:"prices",    icon:"📊", label:"Price Tracker",sub:changedCount>0?changedCount+" change"+(changedCount!==1?"s":"")+" detected":"Monitor buying price changes", color:changedCount>0?C.warn:C.rec, badge:changedCount>0?changedCount:null, badgeColor:C.warn},
      {key:"inventory", icon:"📋", label:"Inventory",    sub:totalOut>0?totalOut+" out of stock"+(totalLow>0?", "+totalLow+" low":""):totalLow>0?totalLow+" low stock items":"Track stock & reorder levels", color:totalOut>0?C.danger:totalLow>0?C.warn:C.purple, badge:totalOut>0?totalOut:totalLow>0?totalLow:null, badgeColor:totalOut>0?C.danger:C.warn},
      {key:"order",     icon:"🛒", label:"Order",         sub:(function(){const p=custOrders.filter(function(o){return !o.ordered;}).length;return p>0?p+" order"+(p!==1?"s":"")+" pending":"Customer orders & weekly purchasing";}()), color:C.blue, badge:(function(){const p=custOrders.filter(function(o){return !o.ordered;}).length;return p>0?p:null;}()), badgeColor:C.warn},
    ];
    const totalInvoices=(function(){var t=0;supNames.forEach(function(sn){t+=SUPPLIERS[sn].invoices.length;});return t;})();
    const totalSKUs=(function(){var t=0;supNames.forEach(function(sn){t+=getSupProducts(SUPPLIERS[sn]).length;});return t;})();
    const payMethodSummary=(function(){var mc={};supNames.forEach(function(sn){var pv=(payments[sn+"||pay"]||SUPPLIERS[sn].meta.payment||"").trim()||"Unset";mc[pv]=(mc[pv]||0)+1;});return Object.entries(mc).slice(0,3);})();
    const pendingCustOrders=custOrders.filter(function(o){return !o.ordered;}).length;
    const todayLabel=(function(){var d=new Date();var days=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];var months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];return days[d.getDay()]+", "+d.getDate()+" "+months[d.getMonth()]+" "+d.getFullYear();})();

    return(
      <div className="home-wrap" onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}
        style={{paddingTop:"env(safe-area-inset-top)",paddingBottom:"max(40px,calc(40px + env(safe-area-inset-bottom)))"}}>
        {(pulling||refreshing)&&(
          <div style={{height:refreshing?50:pullY,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",transition:pulling?"none":"height 0.3s ease"}}>
            <div style={{width:26,height:26,borderRadius:"50%",border:"2px solid var(--border-strong)",borderTop:"2px solid var(--accent)",animation:refreshing?"spin 0.7s linear infinite":"none",transform:!refreshing?("rotate("+Math.min(pullY*3,270)+"deg)"):"none"}}></div>
          </div>
        )}

        <div className="home-appbar">
          <div className="home-appbar-inner">
            <div>
              <h1 className="home-brand">Fowdar Store</h1>
              <p className="home-sub">Veer Bisham Fowdar Trading Co. Ltd.</p>
            </div>
            <div className="home-meta">
              <div className="home-totals">
                <div className="ht-label">Total Spend · All time</div>
                <div className="ht-value">MUR {fmt(totalAll)}</div>
                <div className="ht-sub">{refreshing?"syncing\u2026":"\u2014 last sync just now"}</div>
              </div>
              <button className="home-refresh" onClick={refreshData} disabled={refreshing} title="Refresh">
                <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round">
                  <path d="M14 8a6 6 0 1 1-1.76-4.24"/><path d="M14 2v3.5h-3.5"/>
                </svg>
              </button>
            </div>
          </div>
        </div>

        {loading?(<div style={{padding:"60px 24px",textAlign:"center",color:"var(--text-muted)"}}>Loading…</div>):(
          <div className="home-page">
            <div className="slabel" style={{marginBottom:14}}>
              <span>Today</span><span className="rule"></span>
              <span className="meta">{todayLabel}</span>
            </div>

            <div className="kpis">
              <div className="kpi">
                <span className="kl">Total spend</span>
                <span className="kv">{fmt(totalAll).split(".")[0]}<span className="ku"> MUR</span></span>
                <span className="kd flat">— {totalInvoices} invoice{totalInvoices!==1?"s":""} across {supNames.length} suppliers</span>
                <svg className="kspark" viewBox="0 0 90 30" preserveAspectRatio="none">
                  <polyline fill="none" stroke="#8aff7a" strokeWidth="1.5" points="0,24 15,20 30,22 45,16 60,12 75,14 90,8"/>
                </svg>
              </div>
              <div className="kpi">
                <span className="kl">Catalogue size</span>
                <span className="kv">{totalSKUs}<span className="ku"> SKUs</span></span>
                <span className="kd flat">— {supNames.length} active suppliers</span>
                <svg className="kspark" viewBox="0 0 90 30" preserveAspectRatio="none">
                  <polyline fill="none" stroke="#a3a3a3" strokeWidth="1.5" points="0,16 20,14 40,12 60,14 80,12 90,10"/>
                </svg>
              </div>
              <div className="kpi">
                <span className="kl">Price changes (tracked)</span>
                <span className="kv" style={{color:changedCount>0?"var(--warn)":"var(--text)"}}>{changedCount}<span className="ku"> items</span></span>
                <span className={"kd "+(changedCount>0?"down":"flat")}>{changedCount>0?"\u25B2 detected since last sync":"\u2014 no changes detected"}</span>
                <svg className="kspark" viewBox="0 0 90 30" preserveAspectRatio="none">
                  <polyline fill="none" stroke={changedCount>0?"#f5b34a":"#6e6e6e"} strokeWidth="1.5" points="0,20 20,18 40,16 55,12 70,10 80,12 90,6"/>
                </svg>
              </div>
            </div>

            <div className="slabel" style={{marginBottom:14}}><span>Sections</span><span className="rule"></span></div>

            <div className="bento">
              <div className="tile col6" onClick={function(){setScreen("invoices");setSearch("");setSubScreen(null);}}>
                <div className="t-head">
                  <div className="t-glyph">🧾</div>
                  <div className="t-titles"><h3 className="t-title">Invoices</h3><div className="t-sub">Browse supplier invoices</div></div>
                  <span className="t-arrow"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M6 3l5 5-5 5"/></svg></span>
                </div>
                <div className="t-body">
                  <div className="t-stat"><span className="t-num">{totalInvoices}</span><span className="t-unit">invoices · {supNames.length} suppliers</span></div>
                  <div className="t-meta"><span>MUR {fmt(totalAll)}</span><span className="dot">·</span><span>all recorded</span></div>
                </div>
              </div>

              <div className="tile col6 tile-order" onClick={function(){setScreen("order");setSearch("");setSubScreen(null);}}>
                <div className="t-head">
                  <div className="t-glyph">🛒</div>
                  <div className="t-titles"><h3 className="t-title">Order</h3><div className="t-sub">Customer orders & weekly purchasing</div></div>
                  <span className="t-arrow"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M6 3l5 5-5 5"/></svg></span>
                </div>
                <div className="t-body">
                  <div className="t-stat">
                    <span className="t-num accent">{pendingCustOrders}</span>
                    <span className="t-unit">pending order{pendingCustOrders!==1?"s":""}</span>
                  </div>
                  <div className="t-actions">
                    <button className="tqa primary" onClick={function(e){e.stopPropagation();setScreen("order");}}>
                      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round"><path d="M8 3v10M3 8h10"/></svg>
                      New order
                    </button>
                    <button className="tqa" onClick={function(e){e.stopPropagation();setScreen("order");}}>View history</button>
                  </div>
                </div>
              </div>

              <div className={"tile col6"+(changedCount>0?" tile-alert":"")} onClick={function(){setScreen("prices");setSearch("");setSubScreen(null);}}>
                <div className="t-head">
                  <div className="t-glyph">📊</div>
                  <div className="t-titles">
                    <h3 className="t-title" style={{display:"flex",alignItems:"center",gap:10}}>
                      Price Tracker{changedCount>0&&<span className="tile-pulse"></span>}
                    </h3>
                    <div className="t-sub">Monitor buying-price changes across suppliers</div>
                  </div>
                  {changedCount>0
                    ?<span className="tile-badge">{changedCount} changes</span>
                    :<span className="t-arrow"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M6 3l5 5-5 5"/></svg></span>}
                </div>
                <div className="t-body">
                  <div className="t-meta"><span>{changedCount>0?changedCount+" price change"+(changedCount!==1?"s":"")+" detected":"No changes since last sync"}</span></div>
                </div>
              </div>

              <div className="tile col6" onClick={function(){setScreen("payments");setSearch("");setSubScreen(null);}}>
                <div className="t-head">
                  <div className="t-glyph">💳</div>
                  <div className="t-titles"><h3 className="t-title">Payments</h3><div className="t-sub">Payment methods & status</div></div>
                  <span className="t-arrow"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M6 3l5 5-5 5"/></svg></span>
                </div>
                <div className="t-body">
                  <div className="t-meta">
                    {payMethodSummary.map(function(e,i){return(
                      <React.Fragment key={i}>{i>0&&<span className="dot">·</span>}<span>{e[1]} via {e[0]}</span></React.Fragment>
                    );})}
                  </div>
                </div>
              </div>

              <div className="tile col6" onClick={function(){setScreen("catalogue");setSearch("");setSubScreen(null);}}>
                <div className="t-head">
                  <div className="t-glyph">📦</div>
                  <div className="t-titles"><h3 className="t-title">Catalogue</h3><div className="t-sub">Full product list by supplier</div></div>
                  <span className="t-arrow"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M6 3l5 5-5 5"/></svg></span>
                </div>
                <div className="t-body">
                  <div className="t-meta">
                    <span>{supNames.length} suppliers</span><span className="dot">·</span><span>{totalSKUs} SKUs</span>
                  </div>
                </div>
              </div>

              <div className={"tile col6"+(totalOut>0?" tile-alert":"")} onClick={function(){setScreen("inventory");setSearch("");setSubScreen(null);}}>
                <div className="t-head">
                  <div className="t-glyph">📋</div>
                  <div className="t-titles"><h3 className="t-title">Inventory</h3><div className="t-sub">Track stock & reorder levels</div></div>
                  <span className="t-arrow"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M6 3l5 5-5 5"/></svg></span>
                </div>
                <div className="t-body">
                  <div className="t-meta">
                    {totalOut>0?<span style={{color:"var(--danger)"}}>{totalOut} out of stock</span>:<span>all items in stock</span>}
                    {totalLow>0&&<React.Fragment><span className="dot">·</span><span style={{color:"var(--warn)"}}>{totalLow} low</span></React.Fragment>}
                  </div>
                </div>
              </div>
            </div>

            <div className="home-foot">
              <span>Fowdar Store Tracker · build 2026</span>
              <span>Synced with Supabase</span>
            </div>
          </div>
        )}
        {toast&&<div className="toast">{toast}</div>}
      </div>
    );
  }

  // ── SECTION SCREENS (invoices / payments / catalogue) ────────────
  // Derived vars for week strip
  const wIdx = dayFilter ? allDays.indexOf(dayFilter) : 0;
  const weekPage = Math.floor(Math.max(0, wIdx) / 7);
  const weekDays = allDays.slice(weekPage * 7, weekPage * 7 + 7);
  const totalWeekPages = Math.ceil(allDays.length / 7);
  const largestSup = daySuppliers.length > 0 ? Math.max.apply(null, daySuppliers.map(function(s){return s.total;})) : 0;
  const avgSup = daySuppliers.length > 0 ? dayTotal / daySuppliers.length : 0;

  // Derived vars for payment method cards
  const PMETHODS = ["Cash","Cheque","Credit","Bank Transfer"];
  const methodStats = (function(){
    const stats = {};
    PMETHODS.forEach(function(m){ stats[m] = {count:0, total:0}; });
    stats["Other"] = {count:0, total:0};
    supNames.forEach(function(sn){
      const sup = SUPPLIERS[sn];
      const pk = sn+"||pay";
      const pv = (payments[pk] !== undefined ? payments[pk] : (sup.meta.payment||"")).trim();
      const tot = sup.invoices.reduce(function(a,i){return a+i.total;},0);
      const key = PMETHODS.indexOf(pv) !== -1 ? pv : "Other";
      stats[key].count++;
      stats[key].total += tot;
    });
    return stats;
  })();
  const maxMethodTotal = Math.max.apply(null, Object.values(methodStats).map(function(s){return s.total;}).concat([1]));
  const screenTitle = screen==="invoices" ? "Invoices" : screen==="payments" ? "Payments" : "Catalogue";

  // ── Credit invoices data (for Credit Invoices tab) ────────────────────────
  const creditRows = (function(){
    var rows = [];
    supNames.forEach(function(sn){
      var pv = (payments[sn+"||pay"] !== undefined ? payments[sn+"||pay"] : (SUPPLIERS[sn].meta.payment||"")).trim();
      if (!pv.toLowerCase().includes("credit")) return;
      var sup = SUPPLIERS[sn];
      sup.invoices.forEach(function(inv){
        var norm = normalizeInv(inv);
        var amount = getInvGrandTotal(norm);
        var key = sn+"||"+(inv.id||inv.date);
        rows.push({sn:sn, inv:inv, amount:amount, key:key});
      });
    });
    rows.sort(function(a,b){
      var as = creditStatus[a.key]||"unpaid", bs = creditStatus[b.key]||"unpaid";
      if(as!==bs) return as==="unpaid"?-1:1;
      return toISODate(b.inv.date).localeCompare(toISODate(a.inv.date));
    });
    return rows;
  })();
  const creditUnpaidCount = creditRows.filter(function(r){return (creditStatus[r.key]||"unpaid")==="unpaid";}).length;

  return(
    <div style={{background:"var(--bg)",minHeight:"100%",paddingBottom:"max(60px,calc(60px + env(safe-area-inset-bottom)))"}}>

      {/* ── SECTION APPBAR ── */}
      <div className="sec-appbar">
        <div className="sec-appbar-inner">
          <button className="sec-back" onClick={goMenu}>
            <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 2L4 7l5 5"/></svg>
            Menu
          </button>
          <h1 className="sec-title">{screenTitle}</h1>
          <div className="sec-totals">
            <div className="stl">Total Spend</div>
            <div className="stv">MUR {fmt(totalAll)}</div>
          </div>
        </div>
      </div>

      {/* ── Floating back fab — iPad/tablet (≥600px) ── */}
      <button className="back-fab" onClick={goMenu} aria-label="Back to Menu">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 2L4 7l5 5"/></svg>
        Menu
      </button>

      {/* ══════════════════════════════════════════════════════════════
          INVOICES
      ══════════════════════════════════════════════════════════════ */}
      {screen==="invoices"&&(
        <div className="sec-page">

          {/* Search */}
          <input
            value={search}
            onChange={function(e){setSearch(e.target.value);}}
            placeholder="Search suppliers or products…"
            style={{display:"block",width:"100%",background:"var(--panel)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 14px",color:"var(--text)",fontSize:13,outline:"none",marginBottom:20}}
          />

          {/* Week strip */}
          <div className="week-strip">
            {/* Older weeks (left / prev) */}
            <button className="week-nav" disabled={weekPage >= totalWeekPages-1}
              onClick={function(){
                var prevFirst = allDays[Math.min((weekPage+1)*7, allDays.length-1)];
                if(prevFirst) setDayFilter(prevFirst);
              }}>
              <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 2L4 7l5 5"/></svg>
            </button>

            <div className="day-cards-grid">
              {weekDays.map(function(d){
                var dayData = getSupsForDay(d);
                var daySupCount = dayData.length;
                var dayT = dayData.reduce(function(a,s){return a+s.total;},0);
                var active = dayFilter===d;
                var parts = d.split("-");
                var dObj = new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
                var dow = ["SUN","MON","TUE","WED","THU","FRI","SAT"][dObj.getDay()];
                var dayNum = parts[2];
                var cls = "day-card" + (active?" dc-active":"") + (daySupCount===0?" dc-empty":"");
                return(
                  <div key={d} className={cls} onClick={function(){setDayFilter(d);setSortMode("received");}}>
                    <div className="dcn">{dow}</div>
                    <div className="dcnum">{dayNum}</div>
                    <div className="dct">{daySupCount>0 ? "MUR "+fmt(dayT) : "—"}</div>
                    <div className="dcc">{daySupCount>0 ? daySupCount+" sup" : ""}</div>
                  </div>
                );
              })}
            </div>

            {/* Newer weeks (right / next) */}
            <button className="week-nav" disabled={weekPage <= 0}
              onClick={function(){
                var nextFirst = allDays[Math.max((weekPage-1)*7, 0)];
                if(nextFirst) setDayFilter(nextFirst);
              }}>
              <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 2l5 5-5 5"/></svg>
            </button>
          </div>

          {/* Day summary */}
          {dayFilter&&(
            <div className="day-summary">
              <div className="dstat">
                <div className="dsl">Day Total</div>
                <div className="dsv accent">MUR {fmt(dayTotal)}</div>
                <div className="dsm">{getDayLabel(dayFilter)}</div>
              </div>
              <div className="dstat">
                <div className="dsl">Suppliers</div>
                <div className="dsv">{daySuppliers.length}</div>
                <div className="dsm">active</div>
              </div>
              <div className="dstat">
                <div className="dsl">Largest</div>
                <div className="dsv">MUR {fmt(largestSup)}</div>
                <div className="dsm">single supplier</div>
              </div>
              <div className="dstat">
                <div className="dsl">Average</div>
                <div className="dsv">MUR {fmt(avgSup)}</div>
                <div className="dsm">per supplier</div>
              </div>
            </div>
          )}

          {/* Sort controls */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:10}}>
            <div style={{fontSize:13,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>
              {filteredDaySups.length} supplier{filteredDaySups.length!==1?"s":""}
            </div>
            <div className="sort-grp">
              {[["received","Newest"],["az","A–Z"],["za","Z–A"],["high","$ High"],["low","$ Low"]].map(function(opt){
                return(
                  <button key={opt[0]} className={"sort-btn"+(sortMode===opt[0]?" sba":"")}
                    onClick={function(){setSortMode(opt[0]);}}>{opt[1]}</button>
                );
              })}
            </div>
          </div>

          {/* Invoice list */}
          {filteredDaySups.length===0 ? (
            <div style={{color:"var(--text-muted)",textAlign:"center",padding:"40px 0",fontSize:14}}>No suppliers for this day</div>
          ) : (
            <div className="inv-list">
              {filteredDaySups.map(function(s){
                var sup = SUPPLIERS[s.name];
                var invCount = (sup.invoices||[]).filter(function(inv){
                  return (inv.receivedAt ? inv.receivedAt.split("T")[0] : null) === dayFilter;
                }).length;
                var initials = s.name.substring(0,2).toUpperCase();
                return(
                  <div key={s.name} className="inv-row"
                    onClick={function(){setTab(s.name);setScreen("supplier");setSubScreen("invoices");setSearch("");setEditMode(false);}}>
                    <div className="inv-summ">
                      <div className="inv-av">{initials}</div>
                      <div className="inv-info">
                        <div className="inv-sup">{s.name}</div>
                        <div className="inv-meta">
                          <span>{sup.meta.supplier}</span>
                          <span className="dot">·</span>
                          <span className="inv-cnt">{invCount} invoice{invCount!==1?"s":""}</span>
                        </div>
                      </div>
                      <div className="inv-amt">
                        <span className="iau">Total</span>
                        MUR {fmt(s.total)}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {/* ══════════════════════════════════════════════════════════════
          PAYMENTS
      ══════════════════════════════════════════════════════════════ */}
      {screen==="payments"&&(
        <div className="sec-page">

          {/* Tab toggle — Overview / Credit Invoices */}
          <div className="pay-tab-row">
            <button className={"pay-tab-pill"+(payTab!=="credit"?" pta":"")}
              onClick={function(){setPayTab("methods");}}>
              📊 Overview
            </button>
            <button className={"pay-tab-pill"+(payTab==="credit"?" pta":"")}
              onClick={function(){setPayTab("credit");}}>
              💳 Credit Invoices
              {creditUnpaidCount>0&&<span className="pay-tab-badge">{creditUnpaidCount}</span>}
            </button>
          </div>

          {/* ── OVERVIEW TAB ── */}
          {payTab!=="credit"&&(
            <div>
              {/* Method summary cards */}
              <div className="method-cards">
                {[
                  {key:"Cash",          color:"var(--accent)", iconBg:"rgba(138,255,122,0.15)", icon:"💵"},
                  {key:"Cheque",        color:"var(--info)",   iconBg:"rgba(122,183,255,0.15)", icon:"📄"},
                  {key:"Credit",        color:"var(--warn)",   iconBg:"rgba(245,201,122,0.15)", icon:"💳"},
                  {key:"Bank Transfer", color:"var(--danger)", iconBg:"rgba(255,111,111,0.15)", icon:"🏦"}
                ].map(function(m){
                  var st = methodStats[m.key] || {count:0, total:0};
                  var pct = maxMethodTotal > 0 ? (st.total/maxMethodTotal)*100 : 0;
                  return(
                    <div key={m.key} className="method-card" style={{"--mc":m.color}}>
                      <div className="mc-head">
                        <div className="mc-icon" style={{background:m.iconBg}}>
                          <span style={{fontSize:16}}>{m.icon}</span>
                        </div>
                        <div className="mc-name">{m.key}</div>
                        <div className="mc-count">{st.count} sup</div>
                      </div>
                      <div className="mc-amount" style={{color:m.color}}>
                        MUR {fmt(st.total)}<span className="mcu">total</span>
                      </div>
                      <div className="mc-bar">
                        <div className="mc-fill" style={{width:pct+"%",background:m.color}}></div>
                      </div>
                      <div className="mc-foot">{st.count} supplier{st.count!==1?"s":""} · {pct.toFixed(0)}% of spend</div>
                    </div>
                  );
                })}
              </div>

              {/* Search */}
              <input
                value={search}
                onChange={function(e){setSearch(e.target.value);}}
                placeholder="Search suppliers…"
                style={{display:"block",width:"100%",background:"var(--panel)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 14px",color:"var(--text)",fontSize:13,outline:"none",marginBottom:16}}
              />

              {/* Pay list */}
              <div className="pay-list">
                {supNames.filter(function(sn){
                  if(!search) return true;
                  return sn.toLowerCase().includes(lq) || (SUPPLIERS[sn].meta.supplier||"").toLowerCase().includes(lq);
                }).map(function(sn){
                  var sup = SUPPLIERS[sn];
                  var total = sup.invoices.reduce(function(a,i){return a+i.total;},0);
                  var pk = sn+"||pay";
                  var pv = payments[pk] !== undefined ? payments[pk] : (sup.meta.payment||"");
                  var initials = sn.substring(0,2).toUpperCase();
                  var hasMethod = pv.trim().length > 0;
                  var METHODS = ["Cash","Cheque","Credit","Bank Transfer"];
                  return(
                    <div key={sn} className="pay-card" style={{borderColor:hasMethod?"var(--border)":"var(--warn)"}}>
                      <div className="pay-row">
                        <div className="pay-av">{initials}</div>
                        <div className="pay-info">
                          <div className="pay-name">{sn}</div>
                          <div className="pay-sub">{sup.meta.supplier}</div>
                        </div>
                        <div className="pay-right">
                          <div className="pay-tlbl">Invoice total</div>
                          <div className="pay-total">MUR {fmt(total)}</div>
                        </div>
                      </div>
                      <div className="pay-method-row">
                        <div className="pay-pills">
                          {METHODS.map(function(m){
                            var active = pv.trim() === m;
                            return(
                              <button key={m} className={"ppill"+(active?" ppa":"")}
                                onClick={function(){setPayVal(pk, active ? "" : m);}}>
                                {m}
                              </button>
                            );
                          })}
                        </div>
                        <input
                          className="pay-ref"
                          value={pv}
                          onChange={function(e){setPayVal(pk, e.target.value);}}
                          placeholder="Reference / notes…"
                        />
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* ── CREDIT INVOICES TAB ── */}
          {payTab==="credit"&&(
            <div>
              {creditRows.length===0?(
                <div style={{textAlign:"center",padding:"50px 0",color:"var(--text-muted)",fontSize:14,lineHeight:1.7}}>
                  No Credit suppliers found.<br/>
                  <span style={{fontSize:12.5}}>Go to <strong>Overview</strong> and set a supplier's payment method to <strong>Credit</strong>.</span>
                </div>
              ):(
                <div>
                  {/* Summary cards */}
                  <div className="credit-summary">
                    <div className="credit-sum-card" style={{borderColor:(creditUnpaidCount>0?"var(--warn)":"var(--border)")}}>
                      <div className="credit-sum-lbl">Unpaid</div>
                      <div className="credit-sum-val" style={{color:creditUnpaidCount>0?"var(--warn)":"var(--text-muted)"}}>{creditUnpaidCount}</div>
                      <div className="credit-sum-sub">MUR {fmt(creditRows.filter(function(r){return(creditStatus[r.key]||"unpaid")==="unpaid";}).reduce(function(a,r){return a+r.amount;},0))}</div>
                    </div>
                    <div className="credit-sum-card">
                      <div className="credit-sum-lbl">Paid</div>
                      <div className="credit-sum-val" style={{color:"var(--accent)"}}>{creditRows.length-creditUnpaidCount}</div>
                      <div className="credit-sum-sub">MUR {fmt(creditRows.filter(function(r){return(creditStatus[r.key]||"unpaid")==="paid";}).reduce(function(a,r){return a+r.amount;},0))}</div>
                    </div>
                  </div>

                  {/* Invoice cards */}
                  <div className="credit-list">
                    {creditRows.map(function(r){
                      var isPaid = (creditStatus[r.key]||"unpaid")==="paid";
                      var due = creditDue[r.key]||"";
                      return(
                        <div key={r.key} className={"credit-card"+(isPaid?" cc-paid":"")}>
                          <div className="credit-top">
                            <div className="credit-av">{r.sn.substring(0,2).toUpperCase()}</div>
                            <div className="credit-info">
                              <div className="credit-sup">{r.sn}</div>
                              <div className="credit-date">
                                Inv {r.inv.id||"—"} · {fmtDD(r.inv.date)}
                              </div>
                            </div>
                            <div style={{textAlign:"right",flexShrink:0}}>
                              <div className="credit-amtlbl">Amount</div>
                              <div className="credit-amt">MUR {fmt(r.amount)}</div>
                            </div>
                          </div>
                          <div className="credit-foot">
                            <div className="credit-due">
                              <span className="credit-due-lbl">Due:</span>
                              <input type="date" className="credit-due-in" value={due}
                                onChange={function(e){var v=e.target.value;setCreditDue(function(p){var n=Object.assign({},p);n[r.key]=v;return n;});}}
                              />
                              {due&&<span style={{fontSize:11.5,color:"var(--text-muted)",fontFamily:"var(--font-mono)"}}>{fmtDD(due)}</span>}
                            </div>
                            <button className={"credit-status-btn "+(isPaid?"csb-paid":"csb-unpaid")}
                              onClick={function(){var k=r.key;setCreditStatus(function(p){var n=Object.assign({},p);n[k]=isPaid?"unpaid":"paid";return n;});}}>
                              {isPaid?"✓ Paid":"Mark Paid"}
                            </button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </div>
          )}

        </div>
      )}

      {/* ══════════════════════════════════════════════════════════════
          CATALOGUE
      ══════════════════════════════════════════════════════════════ */}
      {screen==="catalogue"&&(
        <div className="sec-page">

          {/* Search + sort row */}
          <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:18,flexWrap:"wrap"}}>
            <input
              value={search}
              onChange={function(e){setSearch(e.target.value);}}
              placeholder="Search suppliers…"
              style={{flex:"1 1 200px",background:"var(--panel)",border:"1px solid var(--border)",borderRadius:10,padding:"10px 14px",color:"var(--text)",fontSize:13,outline:"none"}}
            />
            <div className="sort-grp">
              {[["az","A–Z"],["za","Z–A"],["count","Most SKUs"],["default","Default"]].map(function(opt){
                return(
                  <button key={opt[0]} className={"sort-btn"+(catSort===opt[0]?" sba":"")}
                    onClick={function(){setCatSort(opt[0]);}}>{opt[1]}</button>
                );
              })}
            </div>
          </div>

          {/* Cat grid */}
          {(function(){
            var CAT_GLYPHS = ["🛒","📦","🏪","🧺","🍵","🥬","🛍","🧃","🧴","🥐","🫙","🧂","🥩","🫒","🍶","🥫","🧁","🍬","🌿","🫐"];
            var list = supNames.map(function(sn){
              var sup = SUPPLIERS[sn];
              var prods = getSupProducts(sup);
              return {name:sn, sup:sup, count:prods.length};
            }).filter(function(s){
              // Guard: meta or supplier label may be absent for newly-added suppliers
              var supLabel = (s.sup&&s.sup.meta&&s.sup.meta.supplier)||"";
              if(!search) return s.count > 0;
              // When searching, include zero-count suppliers if name/meta matches
              return s.name.toLowerCase().includes(lq) || supLabel.toLowerCase().includes(lq);
            });
            if(catSort==="az") list = list.slice().sort(function(a,b){return a.name.localeCompare(b.name);});
            else if(catSort==="za") list = list.slice().sort(function(a,b){return b.name.localeCompare(a.name);});
            else if(catSort==="count") list = list.slice().sort(function(a,b){return b.count-a.count;});
            if(list.length===0){
              return(
                <div style={{textAlign:"center",padding:"48px 20px",color:"var(--text-muted)"}}>
                  <div style={{fontSize:32,marginBottom:12}}>🔎</div>
                  <div style={{fontSize:15,fontWeight:600,marginBottom:6}}>No suppliers match</div>
                  <div style={{fontSize:13}}>Try a different search term.</div>
                </div>
              );
            }
            return(
              <div className="cat-grid">
                {list.map(function(s,i){
                  var supLabel=(s.sup&&s.sup.meta&&s.sup.meta.supplier)||s.name;
                  return(
                    <div key={s.name} className="cat-card"
                      onClick={function(){setTab(s.name);setSubScreen("cat-supplier");setSearch("");}}>
                      <div className="cat-emoji">{CAT_GLYPHS[i % CAT_GLYPHS.length]}</div>
                      <div>
                        <div className="cat-name">{s.name}</div>
                        <div className="cat-meta">{supLabel}</div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div className="cat-count">{s.count}</div>
                        <div className="cat-clbl">SKUs</div>
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })()}
        </div>
      )}

      {toast&&(
        <div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",background:"var(--accent)",color:"#000",padding:"10px 20px",borderRadius:20,fontWeight:700,fontSize:13,zIndex:999,boxShadow:"0 4px 20px rgba(138,255,122,0.3)"}}>
          {toast}
        </div>
      )}
    </div>
  );
}
ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
</body>
</html>
